name: Release Windows (Universal)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project slug (e.g., ows-store)'
        required: true
        type: string
      version:
        description: 'Version (e.g., 2026.5.14-t0001)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve project directory
        id: resolve
        shell: pwsh
        run: |
          $slug = '${{ inputs.project }}'
          $dir = ''
          $targetRepo = 'owsdatabase'
          $isTauri = $false
          switch ($slug) {
            'ows-store'            { $dir = 'OWS Store';            $targetRepo = 'owsdatabase'; $isTauri = $true }
            'dinobox'              { $dir = 'DinoBox';              $targetRepo = 'owsdatabase' }
            'floretshop'           { $dir = 'Floret Shop';          $targetRepo = 'floretshop' }
            'wildtransfer'         { $dir = 'WildTransfer';         $targetRepo = 'wildtransfer' }
            'a-wild-question-game' { $dir = 'A Wild Question Game'; $targetRepo = 'a-wild-question-game' }
            default { $dir = ''; $targetRepo = '' }
          }
          if (-not $dir) { throw "Unknown project slug: $slug" }
          "project_dir=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_repo=$targetRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_tauri=$isTauri" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Electron projects ──────────────────────────────────────────────────
      - name: Install dependencies (Electron)
        if: steps.resolve.outputs.is_tauri != 'True'
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: npm ci --legacy-peer-deps

      - name: Build NSIS (Electron)
        if: steps.resolve.outputs.is_tauri != 'True'
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version
          npm run dist:nsis

      # ── Tauri projects ────────────────────────────────────────────────────
      - name: Setup Rust toolchain
        if: steps.resolve.outputs.is_tauri == 'True'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install Tauri CLI (cargo)
        if: steps.resolve.outputs.is_tauri == 'True'
        shell: pwsh
        run: cargo install tauri-cli --locked

      - name: Build Tauri (ows-store)
        if: steps.resolve.outputs.is_tauri == 'True'
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        shell: pwsh
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: cargo tauri build

      # ── Upload assets ─────────────────────────────────────────────────────
      - name: Create/Update GitHub release + upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $repo = "OceanandWild/${{ steps.resolve.outputs.target_repo }}"
          $tag  = "${{ steps.resolve.outputs.tag }}"
          $name = "${{ inputs.project }} ${{ inputs.version }}"
          $notes = "${{ inputs.release_notes }}"
          $isTauri = "${{ steps.resolve.outputs.is_tauri }}"

          $existing = gh release view $tag --repo $repo 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating release $tag in $repo"
            gh release create $tag --repo $repo --title $name --notes $notes
          } else {
            Write-Host "Release $tag already exists in $repo, uploading assets..."
          }

          # ── Collect assets ────────────────────────────────────────────────
          $files = @()

          if ($isTauri -eq 'True') {
            # Tauri build artifacts
            $nsisDir = "${{ steps.resolve.outputs.project_dir }}\src-tauri\target\release\bundle\nsis"
            $msiDir  = "${{ steps.resolve.outputs.project_dir }}\src-tauri\target\release\bundle\msi"
            if (Test-Path $nsisDir) { $files += (Get-ChildItem $nsisDir -Filter *.exe).FullName }
            if (Test-Path $msiDir)  { $files += (Get-ChildItem $msiDir -Filter *.msi).FullName }
          } else {
            # Electron build artifacts
            foreach ($pat in @("C:/builds/*/*.exe","C:/builds/*/*.appx","C:/builds/*/latest.yml","C:/builds/*/*.blockmap")) {
              $found = Get-Item $pat -ErrorAction SilentlyContinue
              if ($found) { $files += $found.FullName }
            }
          }

          if ($files.Count -eq 0) {
            Write-Warning "No build assets found to upload."
          } else {
            gh release upload $tag --repo $repo --clobber @files
          }

          gh release edit $tag --repo $repo --latest
          Write-Host "Done: https://github.com/$repo/releases/tag/$tag"
