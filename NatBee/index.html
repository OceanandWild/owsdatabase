      // ── 4. Opening interior – dark tunnel with amber inner light ─────────────
      // Clip to opening shape so interior stays inside
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(gateX - gateOW, gateY - gateOH / 2, gateOW * 2, gateOH, gateR);
      ctx.clip();

      // Dark void background
      ctx.fillStyle = '#070402';
      ctx.fillRect(gateX - gateOW, gateY - gateOH / 2, gateOW * 2, gateOH);

      // Warm inner bloom from deep inside
      const innerBloom = ctx.createRadialGradient(gateX + gateOW * 0.3, gateY + 8, 2, gateX + gateOW * 0.3, gateY + 8, gateOW * 1.6);
      innerBloom.addColorStop(0,   `rgba(255, 195, 90, ${0.38 * breathe_e})`);
      innerBloom.addColorStop(0.45,`rgba(200, 120, 30, ${0.20 * breathe_e})`);
      innerBloom.addColorStop(1,   'rgba(100, 50, 10, 0)');
      ctx.fillStyle = innerBloom;
      ctx.fillRect(gateX - gateOW, gateY - gateOH / 2, gateOW * 2, gateOH);

      // Left wall depth (visible inner edge)
      const edgeGrad = ctx.createLinearGradient(gateX - gateOW, gateY, gateX - gateOW + 16, gateY);
      edgeGrad.addColorStop(0, 'rgba(80, 44, 14, 0.70)');
      edgeGrad.addColorStop(1, 'rgba(40, 18, 4, 0)');
      ctx.fillStyle = edgeGrad;
      ctx.fillRect(gateX - gateOW, gateY - gateOH / 2, 16, gateOH);

      // Floor perspective line inside
      ctx.strokeStyle = 'rgba(180, 110, 30, 0.16)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(gateX - gateOW + 2, gateY + gateOH / 2 - 10);
      ctx.quadraticCurveTo(gateX + gateOW * 0.3, gateY + gateOH * 0.3, gateX + gateOW - 2, gateY + gateOH / 2 - 10);
      ctx.stroke();

      ctx.restore(); // end clip

      // ── 5. Wax honeycomb cells framing the entrance (on the hive wall) ────────
      const waxHexes = [
        { x: gateX + gateOW + 14, y: gateY - gateOH / 2 + 10, r: 8 },
        { x: gateX + gateOW + 14, y: gateY - gateOH / 2 + 28, r: 7 },
        { x: gateX + gateOW + 14, y: gateY + gateOH / 2 - 10, r: 8 },
        { x: gateX + gateOW + 14, y: gateY + gateOH / 2 - 28, r: 7 },
      ];
      for (const wh of waxHexes) {
        drawHex(wh.x, wh.y, wh.r, 'rgba(190, 130, 38, 0.50)', 'rgba(255, 190, 80, 0.28)');
      }

      // ── 6. Three floating dust motes inside the opening ──────────────────────
      for (let m = 0; m < 3; m++) {
        const mPhase = (t_e * 0.00032 + m * 2.094) % (Math.PI * 2);
        const mX = gateX + Math.sin(m * 2.1 + t_e * 0.00016) * (gateOW * 0.55);
        const mY = gateY + Math.sin(mPhase) * (gateOH * 0.38);
        if (mX > gateX - gateOW && mX < gateX + gateOW &&
            mY > gateY - gateOH / 2 && mY < gateY + gateOH / 2) {
          const mA = (0.14 + Math.sin(mPhase + m) * 0.07) * breathe_e;
          ctx.fillStyle = `rgba(255, 215, 140, ${mA})`;
          ctx.beginPath();
          ctx.arc(mX, mY, 1.4 + Math.sin(m * 1.9) * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Dynamic hive grid: active worker slots glow; inactive buffer slots are dimmer
      for (const c of hiveCells) {
        const fillC   = c.active ? '#c9902e' : 'rgba(120, 70, 14, 0.45)';
        const strokeC = c.active ? '#8a5e20' : 'rgba(80, 44, 10, 0.35)';
        drawHex(c.x, c.y, 18, fillC, strokeC);
        // Pulse on active slots that a worker is currently occupying
        if (c.active) {
          const workerNearby = workerBeesUnits.some(b =>
            b.hiveSlotIndex === c.slotIndex &&
            dist2(b.x, b.y, c.x, c.y) < 28 * 28
          );
          if (workerNearby) {
            const pAlpha = 0.28 + Math.sin(performance.now() * 0.004) * 0.14;
            ctx.fillStyle = `rgba(255, 220, 100, ${pAlpha})`;
            ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI * 2); ctx.fill();
          }
        }
      }

      drawAltarDelNectar(world.splitX + 108, world.h - 62);

      // Dynamic roof: covers the full hive area from field view, then dissipates in hive.
      const roofAlpha = 0.10 + state.hiveRoofFade * 0.68;
      if (roofAlpha > 0.02) {
        const roofGrad = ctx.createLinearGradient(world.splitX, 0, world.w, world.h);
        roofGrad.addColorStop(0, `rgba(52, 26, 14, ${roofAlpha})`);
        roofGrad.addColorStop(0.55, `rgba(33, 17, 11, ${roofAlpha * 0.95})`);
        roofGrad.addColorStop(1, `rgba(14, 8, 6, ${roofAlpha * 0.92})`);
        ctx.fillStyle = roofGrad;
        ctx.fillRect(world.splitX, 0, hiveW, world.h);

        ctx.strokeStyle = `rgba(255, 198, 118, ${roofAlpha * 0.45})`;
        ctx.lineWidth = 1;
        for (let i = 0; i < 9; i++) {
          const x = world.splitX + 16 + i * (hiveW - 32) / 8;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + Math.sin(i * 0.9) * 8, world.h);
          ctx.stroke();
        }

        // Beehive-cell texture over the full roof.
        const cellA = `rgba(255, 196, 108, ${roofAlpha * 0.16})`;
        const cellB = `rgba(255, 143, 61, ${roofAlpha * 0.09})`;
        for (let ry = -16; ry < world.h + 18; ry += 38) {
          for (let rx = world.splitX + 10; rx < world.w + 24; rx += 42) {
            drawHex(
              rx + ((Math.floor((ry + 16) / 38) % 2) ? 20 : 0),
              ry,
              12.5,
              (Math.floor((rx + ry) / 42) % 2) ? cellA : cellB,
              `rgba(255, 205, 126, ${roofAlpha * 0.18})`
            );
          }
        }
      }

      for (const b of hiveBees) drawTinyBee(b.x, b.y);
    }

    function hexToRgba(hex, a) {
      const h = hex.replace('#', '');
      const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
      const n = parseInt(full, 16);
      return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
    }

    function drawFxParticles() {
      for (const p of fxParticles) {
        const alpha = Math.max(0, p.life / 0.65);
        ctx.fillStyle = hexToRgba(p.color, alpha);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawExclamationMark2D(x, y, scale = 1, alpha = 1) {
      const s = Math.max(0.6, scale);
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);

      // Back glow badge
      const ring = ctx.createRadialGradient(0, 0, 0, 0, 0, 14);
      ring.addColorStop(0, `rgba(255, 214, 120, ${0.32 * alpha})`);
      ring.addColorStop(1, 'rgba(255, 214, 120, 0)');
      ctx.fillStyle = ring;
      ctx.beginPath();
      ctx.arc(0, 0, 14, 0, Math.PI * 2);
      ctx.fill();

      // Bubble plate
      ctx.fillStyle = `rgba(16, 26, 40, ${0.86 * alpha})`;
      ctx.strokeStyle = `rgba(255, 214, 120, ${0.95 * alpha})`;
      ctx.lineWidth = 1.7;
      ctx.beginPath();
      ctx.roundRect(-11, -12, 22, 24, 8);
      ctx.fill();
      ctx.stroke();

      // Exclamation mark body (custom 2D path)
      const eGrad = ctx.createLinearGradient(-1, -10, 2, 9);
      eGrad.addColorStop(0, `rgba(255, 238, 185, ${alpha})`);
      eGrad.addColorStop(1, `rgba(255, 191, 95, ${alpha})`);
      ctx.fillStyle = eGrad;
      ctx.beginPath();
      ctx.roundRect(-1.9, -8.8, 3.8, 12.8, 2.1);
      ctx.fill();

      ctx.fillStyle = eGrad;
      ctx.beginPath();
      ctx.arc(0, 8.6, 1.9, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawRaidAlerts() {
      if (enemies.length <= 0 && raidState.flash <= 0.02) return;
      const pulse = 0.5 + Math.sin(raidState.pulse * 2.4) * 0.5;
      const alpha = Math.max(0.35, Math.min(1, raidState.flash + pulse * 0.45));
      for (const b of offensiveBees) {
        drawExclamationMark2D(b.x, b.y - 19 - Math.sin((b.wobble || 0) * 2.1) * 3, 0.86 + pulse * 0.08, alpha);
      }
    }

    function drawRoundedRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
    }

    function drawHudCard(card, label, value) {
      drawRoundedRect(card.x, card.y, card.w, card.h, 8, 'rgba(7, 18, 30, 0.58)', 'rgba(255,255,255,0.14)');
      ctx.fillStyle = '#9bb8d4';
      ctx.font = '10px Segoe UI';
      ctx.fillText(label.toUpperCase(), card.x + 9, card.y + 14);
      ctx.fillStyle = '#edf6ff';
      ctx.font = 'bold 21px Segoe UI';
      ctx.fillText(value, card.x + 9, card.y + 32);
    }

    function drawUpgradeItem(x, y, w, key, title, desc) {
      const def = upgradeDefs[key];
      const lvl = state.upgrades[key];
      const maxed = lvl >= def.max;
      const cost = getUpgradeCost(key);
      const canBuy = !maxed && state.royalPollen >= cost;

      drawRoundedRect(x, y, w, 38, 7, 'rgba(0, 0, 0, 0.22)', 'rgba(255,255,255,0.12)');
      ctx.fillStyle = '#f2fbff';
      ctx.font = 'bold 13px Segoe UI';
      ctx.fillText(title, x + 10, y + 15);
      ctx.fillStyle = '#9db4cb';
      ctx.font = '10px Segoe UI';
      ctx.fillText(maxed ? `Nvl ${lvl}/${def.max} - MAX` : `Nvl ${lvl}/${def.max} - ${desc} - Costo ${cost}`, x + 10, y + 30);

      const bw = 72, bh = 22;
      const bx = x + w - bw - 10;
      const by = y + 8;
      const fill = maxed ? 'rgba(130,130,130,0.35)' : (canBuy ? 'rgba(255, 202, 43, 0.20)' : 'rgba(130,130,130,0.22)');
      const stroke = maxed ? 'rgba(180,180,180,0.35)' : (canBuy ? 'rgba(255, 220, 120, 0.6)' : 'rgba(180,180,180,0.25)');
      drawRoundedRect(bx, by, bw, bh, 7, fill, stroke);
      ctx.fillStyle = maxed ? '#d7d7d7' : '#ffe3a5';
      ctx.font = 'bold 11px Segoe UI';
      ctx.fillText(maxed ? 'MAX' : 'MEJORAR', bx + 9, by + 15);

      uiButtons.push({
        x: bx, y: by, w: bw, h: bh, disabled: false,
        action: () => {
          const result = buyUpgrade(key);
          if (result === 'insufficient') {
            AudioFx.blip(210, 0.06, 0.025, 'sawtooth');
            setUINotice(`Polen Real insuficiente para ${title}.`, 'warn');
          } else if (result === 'max') {
            AudioFx.blip(320, 0.05, 0.02, 'square');
            setUINotice(`${title} ya esta en MAX.`, 'info');
          } else if (result === 'ok') {
            setUINotice(`${title} mejorado.`, 'ok');
          }
        }
      });
    }

    function rarityColor(rarity) {
      if (rarity === 'Mitico') return '#ff4aa2';
      if (rarity === 'Legendario') return '#ffcb5a';
      if (rarity === 'Epico') return '#af7bff';
      if (rarity === 'Raro') return '#5cc7ff';
      if (rarity === 'Poco Comun') return '#82df94';
      return '#e2e2e2';

    function drawSpeciesPortrait(x, y, color, role) {
      drawRoundedRect(x, y, 38, 38, 8, 'rgba(8, 17, 28, 0.9)', 'rgba(255,255,255,0.2)');
      ctx.save();
      ctx.translate(x + 19, y + 20);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.ellipse(-6, -5, 6, 3, -0.5, 0, Math.PI * 2);
      ctx.ellipse(6, -5, 6, 3, 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f8bf35';
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(-5, 0, 2.2, 0, Math.PI * 2);
      ctx.fill();
      if (role === 'offensive') {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(5, 2);
        ctx.lineTo(10, -2);
        ctx.stroke();
      } else if (role === 'worker') {
        ctx.fillStyle = '#ffe2a8';
        ctx.fillRect(5, -3, 4, 6);
      } else {
        ctx.fillStyle = '#ffe58c';
        ctx.beginPath();
        ctx.arc(8, -2, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawFloatingPollen() {
      for (const p of floatingPollen) {
        const alpha = Math.min(1, p.life / 1.5) * 0.7;
        ctx.fillStyle = hexToRgba(p.color, alpha);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        // Tiny sparkle
        if (Math.random() > 0.7) {
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
          ctx.beginPath();
          ctx.arc(p.x + (Math.random() - 0.5) * 4, p.y + (Math.random() - 0.5) * 4, p.size * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, world.w, world.h);
      drawField();
      drawHiveArea();
      drawColonySystems();
      drawTopLabels();
      drawSovereignBee(player.x, player.y);
      drawFxParticles();
      drawFloatingPollen();

      // Foreground rain (layer 2) overlaying player/bees for 3D depth in Zone 1
      const area = getCurrentArea();
      if (area.id !== 2) {
        for (const d of rainDrops) {
          if (d.layer === 2 && d.x >= 0 && d.x <= world.splitX) {
            ctx.strokeStyle = `rgba(180, 200, 220, ${d.opacity})`;
            ctx.lineWidth = d.width;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            const dx = d.length * Math.sin(-0.1);
            ctx.lineTo(d.x + dx, d.y + d.length);
            ctx.stroke();
          }
        }
      }

      if (!BeeFx.enabled) {
        drawRaidAlerts();
        drawHud();
      }
    }

    let prev = performance.now();
    function frame(now) {
      const dt = Math.min(0.033, (now - prev) / 1000);
      prev = now;
      try {
        update(dt);
        BeeFx.update(dt);
        render();
      } catch (err) {
        console.error('Frame error NatBee:', err);
      }
      requestAnimationFrame(frame);
    }

    function pointInRect(px, py, r) {
      return px >= r.x && px <= (r.x + r.w) && py >= r.y && py <= (r.y + r.h);
    }

    function handleUIClick(x, y) {
      for (let i = uiButtons.length - 1; i >= 0; i--) {
        const b = uiButtons[i];
        if (pointInRect(x, y, b)) {
          b.action();
          return true;
        }
      }
      return false;
    }

    function refreshCursor(x, y) {
      let onButton = false;
      for (let i = uiButtons.length - 1; i >= 0; i--) {
        const b = uiButtons[i];
        if (pointInRect(x, y, b)) {
          onButton = true;
          break;
        }
      }
      canvas.style.cursor = onButton ? 'pointer' : 'default';
    }

    window.addEventListener('keydown', e => {
      if (e.code === 'KeyH') {
        uiState.colonyOpen = !uiState.colonyOpen;
        return;
      }
      if (e.code === 'KeyI') {
        uiState.inventoryOpen = !uiState.inventoryOpen;
        return;
      }
      if (e.code === 'KeyE') {
        const shopX = world.splitX * 0.495;
        const shopY = 220;
        const d = Math.hypot(player.x - shopX, player.y - shopY);
        if (d < 65 && state.areaIndex === 0) {
          uiState.shopOpen = !uiState.shopOpen;
          uiState.colonyOpen = false;
          uiState.inventoryOpen = false;
        }
        return;
      }
      if (e.code === 'KeyW' && e.ctrlKey) {
        e.preventDefault();
        const weathers = ['clear', 'rain', 'sunset'];
        const idx = weathers.indexOf(state.weather);
        state.weather = weathers[(idx + 1) % weathers.length];
        state.weatherTimer = 0;
        setUINotice(`Clima cambiado a: ${state.weather === 'rain' ? 'Lluvia' : (state.weather === 'sunset' ? 'Atardecer' : 'Soleado')}`, 'ok');
        return;
      }
      if (e.code === 'KeyJ') {
        cycleSpecies('offensive');
        return;
      }
      if (e.code === 'KeyK') {
        cycleSpecies('worker');
        return;
      }
      if (e.code === 'KeyL') {
        cycleSpecies('pollinator');
        return;
      }
      if (e.code === 'KeyB') {
        cycleAssignedBiome();
        return;
      }
      keys[e.code] = true;
      AudioFx.init();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });
    window.addEventListener('blur', () => Object.keys(keys).forEach(k => keys[k] = false));

    canvas.addEventListener('pointerdown', e => {
      lastPointerDownAt = performance.now();
      AudioFx.init();
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const clickedUI = handleUIClick(x, y);
      if (!clickedUI) {
        let pickedEnemy = null;
        for (let i = enemies.length - 1; i >= 0; i--) {
          const en = enemies[i];
          if (dist2(x, y, en.x, en.y) <= (en.size + 10) * (en.size + 10)) {
            pickedEnemy = en;
            break;
          }
        }
        if (pickedEnemy) {
          colony.assignedEnemyId = pickedEnemy.id;
          setUINotice('Objetivo asignado a las Ofensivas.', 'info');
        }
      }
    });

    canvas.addEventListener('click', e => {
      if (performance.now() - lastPointerDownAt < 220) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      handleUIClick(x, y);
    });

    canvas.addEventListener('pointermove', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      refreshCursor(x, y);
    });

    canvas.addEventListener('pointerleave', () => {
      canvas.style.cursor = 'default';
    });

    window.addEventListener('resize', fitCanvas);

    try { BeeFx.init(); } catch (err) { console.error('BeeFx startup error:', err); }
    fitCanvas();
    resetGame();
    loadGame();
    initSplash();
    setInterval(saveGame, 10000);
    requestAnimationFrame(frame);

    function initSplash() {
      const splash = document.getElementById('splash-screen');
      const icon = document.getElementById('splash-icon');
      const card = document.getElementById('credentials-card');
      const ripples = document.getElementById('splash-ripples');

      // Logout: clear auth flag then reload so all animations/state start completely fresh
      function doLogout() {
        state.isOceanPayAuthed = false;
        state.username = '';
        saveGame();
        location.reload();
      }

      const logoutBtn = document.getElementById('btn-logout-overlay');
      logoutBtn.addEventListener('click', doLogout);

      if (state.isOceanPayAuthed) {
        // Skip splash screen — already authenticated, just show logout button
        splash.classList.add('fade-out');
        logoutBtn.style.display = 'flex';
        return;
      }

      // Normal splash flow:
      // 1. Icon centered, ripples centered
      // 2. Wait 1200ms, then move icon to top-left, hide ripples, show credentials card
      setTimeout(() => {
        icon.classList.remove('centered');
        icon.classList.add('moved');
        if (ripples) ripples.style.display = 'none';

        setTimeout(() => {
          card.classList.add('visible');
        }, 300);
      }, 1200);

      // Handle Submit Login
      const btnSubmit = document.getElementById('btn-submit-login');
      const loginError = document.getElementById('login-error');
      let loginData = null;

      btnSubmit.addEventListener('click', async () => {
        // Guarantee audio context starts
        AudioFx.init();

        const usernameInput = document.getElementById('input-username');
        const passwordInput = document.getElementById('input-password');
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
          loginError.innerText = 'Por favor ingresa usuario y contraseña.';
          loginError.style.display = 'block';
          return;
        }

        loginError.style.display = 'none';
        btnSubmit.innerText = 'CONECTANDO...';
        btnSubmit.disabled = true;

        try {
          const res = await fetch(OWS_API_BASE + '/ocean-pay/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            loginError.innerText = errData.error || 'Error al conectar cuenta.';
            loginError.style.display = 'block';
            btnSubmit.innerText = 'CONECTAR CUENTA';
            btnSubmit.disabled = false;
            return;
          }

          loginData = await res.json();

          // Successful login!
          AudioFx.blip(520, 0.08, 0.03, 'sine');
          setTimeout(() => AudioFx.blip(660, 0.12, 0.03, 'sine'), 100);

          // Hide inputs view, show username choice view
          document.getElementById('view-inputs').style.display = 'none';
          const choiceView = document.getElementById('view-username-choice');
          choiceView.style.display = 'flex';

          const oceanUser = loginData.user?.username || username;
          document.getElementById('username-question').innerText = `¿Quieres usar tu usuario de Ocean Pay "${oceanUser}" como tu usuario de NatBee, o prefieres colocar uno diferente?`;

        } catch (err) {
          console.error(err);
          loginError.innerText = 'Error de conexión con el servidor.';
          loginError.style.display = 'block';
          btnSubmit.innerText = 'CONECTAR CUENTA';
          btnSubmit.disabled = false;
        }
      });

      // Handle Username Choice: USAR EL MISMO
      document.getElementById('btn-use-ocean-user').addEventListener('click', () => {
        AudioFx.init();
        const oceanUser = loginData?.user?.username || 'Usuario';
        state.username = oceanUser;
        state.isOceanPayAuthed = true;
        saveGame();
        showSuccessView();
      });

      // Handle Username Choice: ELEGIR OTRO
      document.getElementById('btn-use-diff-user').addEventListener('click', () => {
        AudioFx.init();
        document.getElementById('custom-user-form').style.display = 'flex';
      });

      // Handle Custom Username submit
      document.getElementById('btn-submit-custom-user').addEventListener('click', () => {
        AudioFx.init();
        const customUsername = document.getElementById('input-custom-username').value.trim();
        if (!customUsername) {
          alert('Por favor ingresa un nombre de usuario válido.');
          return;
        }
        state.username = customUsername;
        state.isOceanPayAuthed = true;
        saveGame();
        showSuccessView();
      });

      function showSuccessView() {
        document.getElementById('view-username-choice').style.display = 'none';
        const successView = document.getElementById('view-success');

        // --- Inject a brand-new .check element so the CSS keyframe always starts at 0 ---
        const circle = document.getElementById('checkmark-circle');
        const oldCheck = circle.querySelector('.check');
        if (oldCheck) oldCheck.remove();
        const freshCheck = document.createElement('div');
        freshCheck.className = 'check';

        // --- Recreate success-text so its popIn animation also starts fresh ---
        const oldText = document.getElementById('success-text');
        const freshText = document.createElement('div');
        freshText.className = 'success-text';
        freshText.id = 'success-text';
        freshText.textContent = '¡Listo!';
        if (oldText) oldText.replaceWith(freshText);

        // Show the view THEN append the check so the browser schedules a new animation
        successView.style.display = 'flex';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            circle.appendChild(freshCheck);
          });
        });

        // Play victory sound!
        AudioFx.blip(660, 0.15, 0.04, 'sine');
        setTimeout(() => AudioFx.blip(880, 0.25, 0.04, 'sine'), 150);

        // Fade out splash, then reveal logout button
        setTimeout(() => {
          splash.classList.add('fade-out');
          setTimeout(() => {
            document.getElementById('btn-logout-overlay').style.display = 'flex';
          }, 900);
        }, 2400);
      }
    }
  </script>
</body>
</html>
