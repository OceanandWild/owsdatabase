name: Build Windows Universal

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Slug del proyecto'
        required: true
        type: choice
        options:
          - ows-store
          - wildweapon-mayhem
          - savagespaceanimals
          - oceanpay
          - floretshop
          - wildtransfer
          - a-wild-question-game
          - velocity-surge
          - wildwave
          - wildshorts
          - ecoxion
          - dinobox
          - ocean-cinemas
          - incremental-cosmic-odyssey
          - ocean-ai
      version:
        description: 'Version (formato: YYYY.M.D-tHHMM)'
        required: true
        default: '2026.3.20-t1400'
      release_notes:
        description: 'Notas del release'
        required: false
        default: 'Nueva version disponible para Windows'

