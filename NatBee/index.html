<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NatBee - Trono del Nectar</title>
  <style>
    :root {
      --bg: #070f16;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Segoe UI", Tahoma, sans-serif;
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #102131;
      cursor: default;
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #bee-layer {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 4;
    }

    #bee-layer canvas {
      background: transparent !important;
      pointer-events: none;
    }

    /* Splash Screen Styles */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #0a1120 0%, #050810 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s;
      overflow: hidden;
    }

    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .splash-icon-wrapper {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
    }

    /* Initial state centered */
    .splash-icon-wrapper.centered {
      transform: scale(0);
      animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Moved state (top-left) */
    .splash-icon-wrapper.moved {
      top: 10%;
      left: 10%;
      transform: scale(0.6) translate(0, 0);
    }

    .splash-icon {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 0 20px rgba(80, 255, 120, 0.35));
    }

    /* Ripple lines */
    .ripple-ring {
      position: absolute;
      border: 2px solid rgba(80, 255, 120, 0.45);
      border-radius: 50%;
      animation: rippleEffect 2.8s infinite cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
      width: 140px;
      height: 140px;
    }
    .ripple-ring:nth-child(2) { animation-delay: 0.8s; }
    .ripple-ring:nth-child(3) { animation-delay: 1.6s; }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes rippleEffect {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(3.5); opacity: 0; }
    }

    /* Credentials Form Card */
    .credentials-card {
      position: absolute;
      width: 460px;
      padding: 32px;
      background: rgba(8, 16, 28, 0.88);
      border: 1px solid rgba(80, 255, 120, 0.28);
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 30px rgba(80, 255, 120, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .credentials-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .credentials-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .credentials-title {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .credentials-hr {
      flex-grow: 1;
      height: 1px;
      border: none;
      background: linear-gradient(to right, rgba(80, 255, 120, 0.4), rgba(80, 255, 120, 0.05));
      margin: 0 16px;
    }

    .credentials-brand {
      font-size: 15px;
      font-weight: 900;
      color: #50ff78;
      letter-spacing: 0.05em;
      text-shadow: 0 0 10px rgba(80, 255, 120, 0.3);
    }

    .form-group {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      padding: 12px 16px;
      background: rgba(4, 8, 14, 0.6);
      border: 1px solid rgba(80, 255, 120, 0.18);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    .form-input:focus {
      border-color: #50ff78;
      box-shadow: 0 0 12px rgba(80, 255, 120, 0.2);
      background: rgba(4, 8, 14, 0.85);
    }

    .btn-login {
      margin-top: 10px;
      padding: 14px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.35);
      filter: brightness(1.1);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Option Dialog View */
    .option-dialog {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      text-align: center;
    }

    .option-question {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .option-buttons-row {
      display: flex;
      gap: 16px;
      width: 100%;
    }

    .btn-option {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-option-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn-option-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e2efff;
    }

    .btn-option:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    /* Success Checkmark View */
    .success-view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .success-text {
      font-size: 22px;
      font-weight: 800;
      color: #50ff78;
      margin-top: 16px;
      letter-spacing: 0.05em;
      text-shadow: 0 0 15px rgba(80, 255, 120, 0.45);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .checkmark-circle {
      width: 80px;
      height: 80px;
      position: relative;
      display: inline-block;
    }

    .checkmark-circle .background {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(80, 255, 120, 0.12);
      border: 3px solid #50ff78;
      box-shadow: 0 0 20px rgba(80, 255, 120, 0.25);
    }

    .checkmark-circle .check {
      width: 40px;
      height: 20px;
      position: absolute;
      border-left: 5px solid #50ff78;
      border-bottom: 5px solid #50ff78;
      left: 33px;
      top: 41px;
      transform: rotate(-45deg);
      transform-origin: left bottom;
      animation: checkAnim 0.6s ease forwards;
      opacity: 0;
    }

    @keyframes checkAnim {
      0% { width: 0; height: 0; opacity: 0; }
      40% { width: 0; height: 20px; opacity: 1; }
      100% { width: 40px; height: 20px; opacity: 1; }
    }

    /* Logout Button Overlay */
    #btn-logout-overlay {
      position: fixed;
      bottom: 10px;
      right: 12px;
      z-index: 500;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: rgba(4, 8, 18, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: rgba(180, 210, 240, 0.55);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: color 0.25s, background 0.25s, border-color 0.25s, opacity 0.25s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      user-select: none;
    }
    #btn-logout-overlay:hover {
      color: rgba(180, 210, 255, 0.95);
      background: rgba(8, 18, 38, 0.82);
      border-color: rgba(80, 168, 255, 0.35);
    }
    #btn-logout-overlay .logout-icon {
      font-size: 11px;
      opacity: 0.75;
    }
    /* ── Toast Notification System ─────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      pointer-events: none;
      width: max-content;
      max-width: min(580px, 90vw);
    }

    .toast-item {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
      background: rgba(5, 11, 22, 0.84);
      border-radius: 11px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 28px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: #ddeeff;
      letter-spacing: 0.02em;
      white-space: nowrap;
      animation: toastSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .toast-item.toast-ok  { border-color: rgba(80, 255, 120, 0.30); box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 22px rgba(80,255,120,0.10), inset 0 1px 0 rgba(255,255,255,0.06); }
    .toast-item.toast-warn { border-color: rgba(255, 155, 50, 0.32); box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 22px rgba(255,140,40,0.10), inset 0 1px 0 rgba(255,255,255,0.06); }
    .toast-item.toast-info { border-color: rgba(100, 170, 255, 0.26); box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 22px rgba(80,160,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06); }

    .toast-accent {
      width: 4px;
      align-self: stretch;
      flex-shrink: 0;
    }
    .toast-ok   .toast-accent { background: linear-gradient(to bottom, #50ff78, #10b981); }
    .toast-warn .toast-accent { background: linear-gradient(to bottom, #ffa040, #ff6020); }
    .toast-info .toast-accent { background: linear-gradient(to bottom, #64aaff, #3366cc); }

    .toast-body {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 16px 9px 12px;
    }
    .toast-icon { font-size: 14px; line-height: 1; }
    .toast-text { color: inherit; }

    .toast-item.toast-hiding {
      animation: toastSlideOut 0.28s ease forwards;
    }

    @keyframes toastSlideIn {
      0%   { opacity: 0; transform: translateY(-16px) scale(0.92); }
      100% { opacity: 1; transform: translateY(0)    scale(1);    }
    }
    @keyframes toastSlideOut {
      0%   { opacity: 1; transform: translateY(0)    scale(1);    }
      100% { opacity: 0; transform: translateY(-10px) scale(0.96); }
    }
  </style>
<base target="_blank">

<body>
  <canvas id="game"></canvas>
  <div id="bee-layer"></div>

  <!-- Logout overlay button (shown after Ocean Pay auth) -->
  <button id="btn-logout-overlay" title="Cerrar sesión de Ocean Pay">
    <span class="logout-icon">↩</span>
    <span>Cerrar sesión</span>
  </button>

  <!-- Toast notification container -->
  <div id="toast-container"></div>

  <!-- Splash Screen with Ocean Pay credentials -->
  <div id="splash-screen">
    <div class="splash-container">
      <!-- Ripple rings -->
      <div id="splash-ripples" style="position: absolute; display: flex; justify-content: center; align-items: center; pointer-events: none;">
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
      </div>

      <!-- NatBee Icon -->
      <div class="splash-icon-wrapper centered" id="splash-icon">
        <img src="build/natbee-icon.png" class="splash-icon" alt="NatBee Icon">
      </div>

      <!-- Credentials Card / Ocean Pay Interface -->
      <div class="credentials-card" id="credentials-card">
        <!-- View 1: Input form -->
        <div id="view-inputs">
          <div class="credentials-header">
            <span class="credentials-title">Credenciales de Ocean Pay</span>
            <hr class="credentials-hr">
            <span class="credentials-brand">Ocean Pay</span>
          </div>
          <div class="form-group">
            <label class="form-label">Usuario</label>
            <input type="text" id="input-username" class="form-input" placeholder="Ingresa tu usuario" autocomplete="off">
          </div>
          <div class="form-group" style="margin-bottom: 24px;">
            <label class="form-label">Contraseña</label>
            <input type="password" id="input-password" class="form-input" placeholder="Ingresa tu contraseña" autocomplete="off">
          </div>
          <div id="login-error" style="color: #ff9494; font-size: 11px; margin-bottom: 14px; display: none; font-weight: bold; text-align: center;"></div>
          <button class="btn-login" id="btn-submit-login">CONECTAR CUENTA</button>
        </div>

        <!-- View 2: Username choice -->
        <div id="view-username-choice" class="option-dialog">
          <div class="option-question" id="username-question"></div>
          <div class="option-buttons-row">
            <button class="btn-option btn-option-primary" id="btn-use-ocean-user">USAR EL MISMO</button>
            <button class="btn-option btn-option-secondary" id="btn-use-diff-user">ELEGIR OTRO</button>
          </div>
          <div id="custom-user-form" style="display: none; width: 100%; margin-top: 20px; flex-direction: column;">
            <div class="form-group" style="text-align: left;">
              <label class="form-label">Nombre de Usuario de NatBee</label>
              <input type="text" id="input-custom-username" class="form-input" placeholder="Escribe tu nuevo usuario">
            </div>
            <button class="btn-login" id="btn-submit-custom-user">CONFIRMAR USUARIO</button>
          </div>
        </div>

        <!-- View 3: Checkmark and Listo! (check injected dynamically by JS) -->
        <div id="view-success" class="success-view">
          <div class="checkmark-circle" id="checkmark-circle">
            <div class="background"></div>
            <!-- .check is injected fresh by showSuccessView() each time -->
          </div>
          <div class="success-text" id="success-text">¡Listo!</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
  <script>
    const OWS_API_BASE = 'https://owsdatabase.onrender.com';
    (function initOwsProjectGuard() {
      const mountGuard = () => {
        if (!window.OWSProjectRestrictionGuard || typeof window.OWSProjectRestrictionGuard.mount !== 'function') return;
        window.OWSProjectRestrictionGuard.mount({
          apiBaseUrl: OWS_API_BASE,
          projectSlug: 'natbee',
          projectName: 'NatBee',
          checkIntervalMs: 30000
        });
      };
      if (window.OWSProjectRestrictionGuard) {
        mountGuard();
        return;
      }
      const s = document.createElement('script');
      s.src = 'https://owsdatabase.onrender.com/shared/ows-project-guard.js';
      s.async = true;
      s.onload = mountGuard;
      document.head.appendChild(s);
    })();

    const canvas = document.getElementById('game');
    let ctx = canvas.getContext('2d');

    function fitCanvas() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const w = Math.floor(window.innerWidth);
      const h = Math.floor(window.innerHeight);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      world.w = w;
      world.h = h;
      world.splitX = Math.floor(world.w * 0.72);
      recalcHudRects();
      resetPlayerInsideBounds();
      BeeFx.resize();
    }

    const world = { w: 1280, h: 720, splitX: 920 };

    const AREAS = [
      {
        id: 1,
        name: 'Area 1: Jardin de las Coronas',
        fieldName: 'Pradera de Orquideas',
        fieldsLabel: 'Orquideas • Margaritas • Camelias • Rosas Solares',
        biomes: [
          { id: 'orquidea', name: 'Terrazas de Orquideas', x0: 0.00, x1: 0.28, quota: 16, type: 'orchid' },
          { id: 'margarita', name: 'Claro de Margaritas', x0: 0.28, x1: 0.52, quota: 15, type: 'daisy' },
          { id: 'camelia', name: 'Linde de Camelias', x0: 0.52, x1: 0.76, quota: 14, type: 'camellia' },
          { id: 'sunrose', name: 'Jardin de Rosas Solares', x0: 0.76, x1: 1.00, quota: 10, type: 'sunrose' }
        ]
      },
      {
        id: 2,
        name: 'Area 2: Matorral Oscuro',
        fieldName: 'Matorral Oscuro',
        fieldsLabel: 'Flores de Sombra',
        biomes: [
          { id: 'sombra', name: 'Matorral Oscuro', x0: 0.00, x1: 1.00, quota: 25, type: 'shadowflower' }
        ]
      }
    ];

    const FLOWER_TYPES = {
      orchid: { name: 'Orquidea', petalsA: '#8f78ff', petalsB: '#c39bff', center: '#ffe6a6', pollenMin: 3, pollenMax: 6, royalBonus: 2 },
      daisy: { name: 'Margarita', petalsA: '#f9f9f2', petalsB: '#f0efe3', center: '#ffcc4d', pollenMin: 2, pollenMax: 5, royalBonus: 1 },
      camellia: { name: 'Camelia', petalsA: '#ff6f93', petalsB: '#ff3f72', center: '#ffd8c6', pollenMin: 4, pollenMax: 8, royalBonus: 2 },
      shadowflower: { name: 'Flor de Sombra', petalsA: '#4a2c5a', petalsB: '#21132e', center: '#ffd870', pollenMin: 3, pollenMax: 7, royalBonus: 3 },
      sunrose: { name: 'Rosa Solar', petalsA: '#ffaa00', petalsB: '#ff6600', center: '#ffff88', pollenMin: 5, pollenMax: 10, royalBonus: 4 }
    };

    const state = {
      areaIndex: 0,
      zone: 'field',
      hiveRoofFade: 1,
      pollen: 0,
      pollenCap: 25,
      royalPollen: 0,
      honey: 0,
      upgrades: { cap: 0, speed: 0, refine: 0 },
      eggPurchasesCount: 0,
      lastPurchaseDay: '',
      boughtEggBoosters: [],
      username: '',
      isOceanPayAuthed: false,
      weather: 'clear', // clear, rain, sunset
      weatherTimer: 0
    };

    const player = {
      x: 220,
      y: 320,
      vx: 0,
      vy: 0,
      speed: 220,
      bob: 0
    };

    const keys = Object.create(null);
    const flowers = [];
    const hiveCells = [];
    const hiveBees = [];
    const fxParticles = [];
    const floatingPollen = [];
    const rainDrops = [];
    const rainSplashes = [];
    const uiButtons = [];
    const uiNotice = { text: '', kind: 'info', timer: 0 };
    let lastPointerDownAt = 0;
    const uiState = {
      colonyOpen: false,
      inventoryOpen: false,
      selectedRole: 'offensive',
      colonyTab: 'bees',
      shopOpen: false,
      selectedShopBoost: 'Ninguno',
      adminPanelOpen: false
    };
    const BeeFx = {
      enabled: false,
      app: null,
      stage: null,
      queenLayer: null,
      hiveLayer: null,
      unitLayer: null,
      alertLayer: null,
      hudLayer: null,
      textures: {},
      queen: null,
      hiveSprites: [],
      unitSprites: new Map(),
      glowFilter: null,
      layerEl: null,
      async init() {
        if (this.enabled || !window.PIXI) return;
        this.layerEl = document.getElementById('bee-layer');
        if (!this.layerEl) return;

        try {
          this.app = new PIXI.Application({
            width: Math.max(1, window.innerWidth),
            height: Math.max(1, window.innerHeight),
            antialias: true,
            transparent: true,
            backgroundAlpha: 0,
            backgroundColor: 0x000000,
            resolution: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
            autoDensity: true,
            clearBeforeRender: true
          });
        } catch (err) {
          console.error('BeeFx init failed:', err);
          this.enabled = false;
          return;
        }
        this.layerEl.innerHTML = '';
        this.layerEl.appendChild(this.app.view);
        this.app.view.style.width = '100%';
        this.app.view.style.height = '100%';
        this.app.view.style.pointerEvents = 'none';
        this.app.view.style.background = 'transparent';

        try {
          if (this.app.renderer?.background) {
            this.app.renderer.background.alpha = 0;
            this.app.renderer.background.color = 0x000000;
          }
          if (this.app.renderer?.gl?.clearColor) {
            this.app.renderer.gl.clearColor(0, 0, 0, 0);
          }
        } catch (_) {}

        this.stage = new PIXI.Container();
        this.queenLayer = new PIXI.Container();
        this.hiveLayer = new PIXI.Container();
        this.unitLayer = new PIXI.Container();
        this.alertLayer = new PIXI.Container();
        this.hudLayer = new PIXI.Container();
        this.stage.addChild(this.hiveLayer, this.unitLayer, this.queenLayer, this.alertLayer, this.hudLayer);
        this.app.stage.addChild(this.stage);

        try {
          this.glowFilter = new PIXI.BlurFilter(0.3);
          this.unitLayer.filters = [this.glowFilter];
        } catch (_) {}

        this.queenCanvas = document.createElement('canvas');
        this.queenCanvas.width = 160;
        this.queenCanvas.height = 160;
        this.queenCtx = this.queenCanvas.getContext('2d');

        this.textures.worker = this.createBeeTexture('#ffd88d', '#1f1f24', '#fff2cb', 31, false);

      resize() {

      },
      createBeeTexture(mainColor, stripeColor, wingColor, size, crowned = false) {
        const g = new PIXI.Graphics();
        const half = size * 0.5;
        const bodyW = size * 0.72;
        const bodyH = size * 0.48;

        // Wing details (layered, translucent wings)
        const parsedWingCol = this.toColor(wingColor);
        // Left wings
        g.lineStyle(0.7, 0xffffff, 0.25);
        g.beginFill(parsedWingCol, 0.65);
        g.drawEllipse(-size * 0.15, -size * 0.22, size * 0.18, size * 0.09);
        g.beginFill(parsedWingCol, 0.45);
        g.drawEllipse(-size * 0.10, -size * 0.16, size * 0.12, size * 0.07);
        // Right wings
        g.beginFill(parsedWingCol, 0.65);
        g.drawEllipse(size * 0.15, -size * 0.22, size * 0.18, size * 0.09);
        g.beginFill(parsedWingCol, 0.45);
        g.drawEllipse(size * 0.10, -size * 0.16, size * 0.12, size * 0.07);
        g.endFill();
        g.lineStyle(0); // reset

        // Stinger
        g.lineStyle(Math.max(1.1, size * 0.045), this.toColor(stripeColor), 0.95);
        g.moveTo(bodyW * 0.42, 0);
        g.quadraticCurveTo(bodyW * 0.65, -size * 0.02, bodyW * 0.74, size * 0.06);
        g.lineStyle(0);

        // Thorax/Abdomen Body (3D Spherical Effect using layered ellipses)
        // Outer dark base shell
        const parsedMain = this.toColor(mainColor);
        g.beginFill(0x1a1510, 0.15);
        g.drawEllipse(0, 0, bodyW * 0.54, bodyH * 0.54);
        g.endFill();

        // Main body color
        g.beginFill(parsedMain, 1);
        g.drawEllipse(0, 0, bodyW * 0.5, bodyH * 0.5);
        g.endFill();

        // Darker shadow on lower body half
        g.beginFill(0x000000, 0.16);
        g.drawEllipse(0, bodyH * 0.1, bodyW * 0.42, bodyH * 0.32);
        g.endFill();

        // Specular/Glow highlight
        g.beginFill(0xffffff, 0.25);
        g.drawEllipse(-bodyW * 0.08, -bodyH * 0.12, bodyW * 0.20, bodyH * 0.10);
        g.endFill();

        // Stripes (curved, rounded rectangles)
        g.beginFill(this.toColor(stripeColor), 0.90);
        g.drawRoundedRect(-bodyW * 0.28, -bodyH * 0.42, bodyW * 0.11, bodyH * 0.84, 2.5);
        g.drawRoundedRect(-bodyW * 0.06, -bodyH * 0.46, bodyW * 0.11, bodyH * 0.92, 2.5);
        g.drawRoundedRect(bodyW * 0.16, -bodyH * 0.40, bodyW * 0.09, bodyH * 0.80, 2);
        g.endFill();

        // Head
        const headColor = 0x24201c;
        g.beginFill(headColor, 1);
        g.drawCircle(-bodyW * 0.34, -bodyH * 0.02, size * 0.095);
        g.endFill();

        // Compound Eye
        const eyeColor = crowned ? 0x4af0ff : 0xffbe33;
        g.beginFill(eyeColor, 1);
        g.drawEllipse(-bodyW * 0.38, -bodyH * 0.06, size * 0.045, size * 0.035);
        g.endFill();
        // Eye specular highlight
        g.beginFill(0xffffff, 0.75);
        g.drawCircle(-bodyW * 0.40, -bodyH * 0.08, size * 0.012);
        g.endFill();

        // Crown
        if (crowned) {
          g.beginFill(0xf2c438, 1);
          g.drawRoundedRect(-size * 0.1, -size * 0.36, size * 0.2, size * 0.05, 1.5);
          g.drawPolygon([
            -size * 0.1, -size * 0.36,
            -size * 0.08, -size * 0.48,
            -size * 0.03, -size * 0.38,
            0, -size * 0.52,
            size * 0.03, -size * 0.38,
            size * 0.08, -size * 0.48,
            size * 0.1, -size * 0.36
          ]);
          g.endFill();

          g.beginFill(0xff3366, 1);
          g.drawCircle(0, -size * 0.42, size * 0.025);
          g.endFill();
        }

        return this.app.renderer.generateTexture(g, {
          region: new PIXI.Rectangle(-half, -half, size, size),
          resolution: 2
        });
      },
      getUnitTexture(role) {
        if (role === 'offensive') return this.textures.offensive;
        if (role === 'worker') return this.textures.worker;
        return this.textures.pollinator;
      },
      ensureHiveSprites() {
        if (!this.enabled) return;
        while (this.hiveSprites.length < hiveBees.length) {
          const sp = new PIXI.Sprite(this.textures.hive);
          sp.anchor.set(0.5);
          sp.alpha = 0.9;
          this.hiveLayer.addChild(sp);
          this.hiveSprites.push(sp);
        }
        while (this.hiveSprites.length > hiveBees.length) {
          const sp = this.hiveSprites.pop();
          this.hiveLayer.removeChild(sp);
          sp.destroy();
        }
      },
      ensureUnitSprites() {
        if (!this.enabled) return;
        const allUnits = [...offensiveBees, ...workerBeesUnits, ...pollinatorBees];
        const alive = new Set();
        for (const u of allUnits) {
          alive.add(u.id);
          let sp = this.unitSprites.get(u.id);
          if (!sp) {
            sp = new PIXI.Sprite(this.getUnitTexture(u.role));
            sp.anchor.set(0.5);
            sp.alpha = 0.95;
            this.unitLayer.addChild(sp);
            this.unitSprites.set(u.id, sp);
          }
          const species = getSpecies(u.role, u.speciesId || colony.species[u.role]);
          sp.tint = this.toColor(species.color);
        }
        for (const [id, sp] of this.unitSprites.entries()) {
          if (alive.has(id)) continue;
          this.unitLayer.removeChild(sp);
          sp.destroy();
          this.unitSprites.delete(id);
        }
      },
      clearLayer(layer) {
        if (!layer) return;
        const children = layer.removeChildren();
        for (const child of children) {
          child.destroy({ children: true });
        }
      },
      toColor(value, fallback = 0xffffff) {
        try {
          if (typeof value === 'number') return value;
          return PIXI.utils.string2hex(value || '#ffffff');
        } catch (_) {
          return fallback;
        }
      },
      addRoundedRect(layer, x, y, w, h, r, fillColor, fillAlpha = 1, strokeColor = null, strokeAlpha = 1, lineWidth = 1) {
        const g = new PIXI.Graphics();
        if (fillColor !== null && fillColor !== undefined) {
          g.beginFill(this.toColor(fillColor), fillAlpha);
          g.drawRoundedRect(x, y, w, h, r);
          g.endFill();
        }
        if (strokeColor !== null && strokeColor !== undefined && lineWidth > 0) {
          g.lineStyle(lineWidth, this.toColor(strokeColor), strokeAlpha);
          g.drawRoundedRect(x, y, w, h, r);
        }
        layer.addChild(g);
        return g;
      },
      addText(layer, text, x, y, opts = {}) {
        const t = new PIXI.Text(text, new PIXI.TextStyle({
          fontFamily: opts.fontFamily || 'Segoe UI',
          fontSize: opts.fontSize || 12,
          fill: this.toColor(opts.fill || '#ffffff'),
          fontWeight: opts.fontWeight || 'normal'
        }));
        t.x = x;
        t.y = y;
        layer.addChild(t);
        return t;
      },
      drawExclamationMarkPixi(x, y, scale = 1, alpha = 1) {
        const s = Math.max(0.6, scale);
        const g = new PIXI.Graphics();
        g.x = x;
        g.y = y;
        g.scale.set(s);
        g.alpha = Math.max(0, Math.min(1, alpha));

        g.beginFill(0xffd678, 0.30);
        g.drawCircle(0, 0, 14);
        g.endFill();

        g.lineStyle(1.7, 0xffd678, 0.95);
        g.beginFill(0x101a28, 0.88);
        g.drawRoundedRect(-11, -12, 22, 24, 8);
        g.endFill();

        g.beginFill(0xfff0c4, 1);
        g.drawRoundedRect(-2, -9, 4, 13, 2);
        g.endFill();
        g.beginFill(0xffcf7e, 1);
        g.drawCircle(0, 8.6, 1.9);
        g.endFill();
        this.alertLayer.addChild(g);
      },
      drawEggIconPixi(layer, x, y, size, itemDef, alpha = 1) {
        const r = size * 0.48;
        const container = new PIXI.Container();
        container.x = x;
        container.y = y;
        container.alpha = alpha;

        const shell = new PIXI.Graphics();
        shell.beginFill(this.toColor(itemDef.colorA), 1);
        shell.drawEllipse(0, 0, r * 0.82, r);
        shell.endFill();
        shell.beginFill(this.toColor(itemDef.colorB), 0.34);
        shell.drawEllipse(r * 0.08, r * 0.1, r * 0.66, r * 0.84);
        shell.endFill();
        container.addChild(shell);

        const symbol = new PIXI.Graphics();
        symbol.lineStyle(Math.max(1.4, size * 0.1), this.toColor(itemDef.accent), 1);
        if (itemDef.hatchRole === 'offensive') {
          symbol.moveTo(-r * 0.18, -r * 0.1);
          symbol.lineTo(r * 0.05, -r * 0.34);
          symbol.lineTo(r * 0.3, -r * 0.08);
          symbol.lineTo(r * 0.04, r * 0.12);
          symbol.lineTo(r * 0.26, r * 0.36);
        } else if (itemDef.hatchRole === 'worker') {
          symbol.drawCircle(0, 0, r * 0.26);
          symbol.moveTo(0, -r * 0.26);
          symbol.lineTo(0, r * 0.26);
          symbol.moveTo(-r * 0.26, 0);
          symbol.lineTo(r * 0.26, 0);
        } else {
          symbol.moveTo(-r * 0.26, r * 0.12);
          symbol.quadraticCurveTo(0, -r * 0.36, r * 0.26, r * 0.12);
          symbol.quadraticCurveTo(0, r * 0.34, -r * 0.26, r * 0.12);
        }
        container.addChild(symbol);
        layer.addChild(container);
      },
      renderRaidAlertsPixi() {
        this.clearLayer(this.alertLayer);
        if (enemies.length <= 0 && raidState.flash <= 0.02) return;
        const pulse = 0.5 + Math.sin(raidState.pulse * 2.4) * 0.5;

        for (const b of offensiveBees) {
          this.drawExclamationMarkPixi(
            b.x,
            b.y - 19 - Math.sin((b.wobble || 0) * 2.1) * 3,
            0.86 + pulse * 0.08,
            alpha
          );
        }
      },

    const AudioFx = {
      ctx: null,
      started: false,
      lastFlutterAt: 0,
      init() {
        if (this.started) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.started = true;
      },
      flutter(v) {
        if (!this.started || v < 0.25) return;
        const now = performance.now();
        if (now - this.lastFlutterAt < 95) return;
        this.lastFlutterAt = now;
        this.blip(130 + Math.random() * 45, 0.022, 0.008, 'sine');
      },
      blip(freq = 700, dur = 0.06, vol = 0.06, type = 'triangle') {
        if (!this.started) return;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g);
        g.connect(this.ctx.destination);
        o.start(t);
        o.stop(t + dur);
      }
    };

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function createRainDrop(randomY = false) {
      const layer = Math.random() < 0.65 ? 0 : (Math.random() < 0.90 ? 1 : 2); // 0: bg, 1: mid, 2: fg
      let speed, opacity, width, length;
      if (layer === 0) {
        speed = rand(600, 800);
        opacity = rand(0.10, 0.20);
        width = rand(0.5, 0.8);
        length = rand(10, 18);
      } else if (layer === 1) {
        speed = rand(900, 1150);
        opacity = rand(0.22, 0.34);
        width = rand(0.9, 1.3);
        length = rand(18, 28);
      } else {
        speed = rand(1300, 1600);
        opacity = rand(0.38, 0.50);
        width = rand(1.4, 2.0);
        length = rand(28, 38);
      }
      
      const angle = rand(-0.15, -0.05); // slight tilt to the left
      const vx = speed * Math.sin(angle);
      const vy = speed * Math.cos(angle);
      
      const y = randomY ? rand(-40, world.h) : rand(-40, -10);
      const x = rand(0, world.splitX + 40);
      
      return {
        x,
        y,
        vx,
        vy,
        length,
        width,
        opacity,
        layer,
        groundY: rand(world.h - 90, world.h - 15)
      };
    }

    function dist2(ax, ay, bx, by) { const dx = ax - bx; const dy = ay - by; return dx * dx + dy * dy; }

      const list = BEE_SPECIES[role] || [];
      if (!list.length) return;
      const currentIdx = Math.max(0, list.findIndex(s => s.id === colony.species[role]));
      for (let i = 1; i <= list.length; i++) {
        const s = list[(currentIdx + i) % list.length];
        if (isSpeciesUnlocked(role, s.id)) {
          colony.species[role] = s.id;
          setUINotice(`${role}: ${s.name}`, 'ok');
          return;
        }
      }
      setUINotice(`No hay variantes desbloqueadas para ${role}.`, 'warn');
    }

    function cycleAssignedBiome() {
      const area = getCurrentArea();
      if (!area.biomes.length) return;
      const idx = Math.max(0, area.biomes.findIndex(b => b.id === colony.assignedBiomeId));
      const next = area.biomes[(idx + 1) % area.biomes.length];
      colony.assignedBiomeId = next.id;
      setUINotice(`Polinizadoras asignadas a ${next.name}.`, 'info');
      for (const b of pollinatorBees) b.targetFlowerId = null;
    }

    function getUpgradeCost(key) {
      const d = upgradeDefs[key];
      const lvl = state.upgrades[key] || 0;
      return Math.floor(d.base * Math.pow(d.scale, lvl));
    }

    /* ── Toast notification engine ───────────────────────── */
    const TOAST_ICONS = { ok: '✦', warn: '⚠', info: '◈' };
    const TOAST_MAX = 4;

    function showToast(text, kind) {
      const container = document.getElementById('toast-container');
      if (!container) return;

      // If already at max visible, dismiss the oldest
      const visible = container.querySelectorAll('.toast-item:not(.toast-hiding)');
      if (visible.length >= TOAST_MAX) dismissToast(visible[0]);

      const item = document.createElement('div');
      item.className = `toast-item toast-${kind}`;

      const accent = document.createElement('div');
      accent.className = 'toast-accent';

      const body = document.createElement('div');
      body.className = 'toast-body';

      const icon = document.createElement('span');
      icon.className = 'toast-icon';
      icon.textContent = TOAST_ICONS[kind] || '◈';

      const label = document.createElement('span');
      label.className = 'toast-text';
      label.textContent = text;

      body.appendChild(icon);
      body.appendChild(label);
      item.appendChild(accent);
      item.appendChild(body);
      container.appendChild(item);

      const duration = kind === 'warn' ? 4500 : 3200;
      item._toastTimer = setTimeout(() => dismissToast(item), duration);
    }

    function dismissToast(item) {
      if (!item || item.classList.contains('toast-hiding')) return;
      clearTimeout(item._toastTimer);
      item.classList.add('toast-hiding');
      setTimeout(() => { if (item.parentNode) item.parentNode.removeChild(item); }, 280);
    }

    function setUINotice(text, kind = 'info') {
      // Drive the HTML toast system
      showToast(text, kind);
      // Keep uiNotice state but prevent canvas rendering
      uiNotice.text = text;
      uiNotice.kind = kind;
      uiNotice.timer = 0;
    }

    function buyUpgrade(key) {
      const d = upgradeDefs[key];
      if (!d) return 'invalid';
      if ((state.upgrades[key] || 0) >= d.max) return 'max';
      const cost = getUpgradeCost(key);
      if (state.royalPollen < cost) return 'insufficient';
      state.royalPollen -= cost;
      state.upgrades[key] += 1;
      d.apply();
      AudioFx.blip(520, 0.08, 0.03, 'triangle');
      return 'ok';
    }

    function countInventoryItem(itemId) {
      return Math.max(0, inventory.items[itemId] || 0);
    }

    function getInventoryOccupiedSlots() {
      return Object.values(inventory.items).filter(v => v > 0).length;
    }

    function getInventoryTotalItems() {
      let total = 0;
      for (const v of Object.values(inventory.items)) total += Math.max(0, v || 0);
      return total;
    }

    function getInventoryItemsList() {
      const out = [];
      for (const [itemId, qty] of Object.entries(inventory.items)) {
        if (qty <= 0) continue;
        const def = ITEM_DEFS[itemId];
        if (!def) continue;
        out.push({ itemId, qty, def });
      }
      out.sort((a, b) => a.def.name.localeCompare(b.def.name, 'es'));
      return out;
    }

    function addInventoryItem(itemId, amount = 1, silent = false) {
      const def = ITEM_DEFS[itemId];
      if (!def || amount <= 0) return false;
      const cur = countInventoryItem(itemId);
      const occupied = getInventoryOccupiedSlots();
      if (cur <= 0 && occupied >= inventory.slots) {
        if (!silent) setUINotice('Inventario lleno. Incuba o libera espacio.', 'warn');
        return false;
      }
      const next = Math.min(inventory.maxStack, cur + amount);
      const gained = next - cur;
      if (gained <= 0) return false;
      inventory.items[itemId] = next;
      if (!silent) {
        setUINotice(`Conseguiste ${gained} ${def.name}.`, 'ok');
      }
      return true;
    }

    function removeInventoryItem(itemId, amount = 1) {
      const cur = countInventoryItem(itemId);
      if (amount <= 0 || cur < amount) return false;
      inventory.items[itemId] = cur - amount;
      return true;
    }

    function roleLabel(role) {
      if (role === 'offensive') return 'Ofensivas';
      if (role === 'worker') return 'Trabajadoras';
      if (role === 'pollinator') return 'Polinizadoras';
      return role;
    }

    function drawEggIcon(x, y, size, itemDef, alpha = 1) {
      const r = size * 0.48;
      ctx.save();
      ctx.translate(x, y);
      const shell = ctx.createLinearGradient(-r, -r, r, r);
      shell.addColorStop(0, itemDef.colorA);
      shell.addColorStop(1, itemDef.colorB);
      ctx.fillStyle = shell;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.82, r, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = Math.max(1.2, size * 0.08);
      ctx.beginPath();
      ctx.arc(-r * 0.18, -r * 0.1, r * 0.48, Math.PI * 1.2, Math.PI * 1.9);
      ctx.stroke();

      ctx.strokeStyle = itemDef.accent;
      ctx.lineWidth = Math.max(1.4, size * 0.1);
      if (itemDef.hatchRole === 'offensive') {
        ctx.beginPath();
        ctx.moveTo(-r * 0.18, -r * 0.1);
        ctx.lineTo(r * 0.05, -r * 0.34);
        ctx.lineTo(r * 0.3, -r * 0.08);
        ctx.lineTo(r * 0.04, r * 0.12);
        ctx.lineTo(r * 0.26, r * 0.36);
        ctx.stroke();
      } else if (itemDef.hatchRole === 'worker') {
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.26, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.26);
        ctx.lineTo(0, r * 0.26);
        ctx.moveTo(-r * 0.26, 0);
        ctx.lineTo(r * 0.26, 0);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(-r * 0.26, r * 0.12);
        ctx.quadraticCurveTo(0, -r * 0.36, r * 0.26, r * 0.12);
        ctx.quadraticCurveTo(0, r * 0.34, -r * 0.26, r * 0.12);
        ctx.stroke();
      }
      ctx.restore();
    }

    function incubateEgg(itemId) {
      const def = ITEM_DEFS[itemId];
      if (!def || def.kind !== 'egg' || !def.hatchRole) return false;
      if (!removeInventoryItem(itemId, 1)) {
        setUINotice('No tienes ese huevo disponible.', 'warn');
        return false;
      }

      // Check if we have a booster for this hatch role
      let boosterType = 'Ninguno';
      if (state.boughtEggBoosters && state.boughtEggBoosters.length > 0) {
        const idx = state.boughtEggBoosters.findIndex(b => b.role === def.hatchRole);
        if (idx !== -1) {
          boosterType = state.boughtEggBoosters[idx].boost;
          state.boughtEggBoosters.splice(idx, 1);
        }
      }

      // Probability matrix based on selected booster
      const matrix = {
        'Ninguno':    { 'Comun': 0.70, 'Poco Comun': 0.20, 'Raro': 0.08, 'Epico': 0.016, 'Legendario': 0.003, 'Mitico': 0.001 },
        'Raro':       { 'Comun': 0.35, 'Poco Comun': 0.30, 'Raro': 0.25, 'Epico': 0.08,  'Legendario': 0.018, 'Mitico': 0.002 },
        'Epico':      { 'Comun': 0.15, 'Poco Comun': 0.20, 'Raro': 0.25, 'Epico': 0.34,  'Legendario': 0.05,  'Mitico': 0.01 },
        'Legendario': { 'Comun': 0.05, 'Poco Comun': 0.10, 'Raro': 0.15, 'Epico': 0.25,  'Legendario': 0.40,  'Mitico': 0.05 },
        'Mitico':     { 'Comun': 0.01, 'Poco Comun': 0.03, 'Raro': 0.06, 'Epico': 0.15,  'Legendario': 0.35,  'Mitico': 0.40 }
      };

      const weights = matrix[boosterType] || matrix['Ninguno'];
      const r = Math.random();
      let cumulative = 0;
      let rolledRarity = 'Comun';

      for (const [rarity, prob] of Object.entries(weights)) {
        cumulative += prob;
        if (r <= cumulative) {
          rolledRarity = rarity;
          break;
        }
      }

      // Find available species matching this rarity in the given hatchRole
      const speciesList = BEE_SPECIES[def.hatchRole] || [];
      let matches = speciesList.filter(s => s.rarity === rolledRarity);
      if (matches.length === 0) {
        // Fallback: pick any species for this role
        matches = speciesList;
      }

      const chosenSpecies = matches[Math.floor(Math.random() * matches.length)];

      // Check if unlocked
      let isNew = false;
      if (!colony.unlockedSpecies) colony.unlockedSpecies = {};
      if (!colony.unlockedSpecies[chosenSpecies.id]) {
        colony.unlockedSpecies[chosenSpecies.id] = true;
        isNew = true;
      }

      if (!colony.ownedBees) colony.ownedBees = [];
      const ownedForRole = colony.ownedBees.filter(b => b.role === def.hatchRole);
      if (ownedForRole.length >= 22) {
        setUINotice(`Límite de abejas para el rol ${roleLabel(def.hatchRole)} alcanzado (máx. 22).`, 'warn');
        return false;
      }

      colony.ownedBees.push({ role: def.hatchRole, speciesId: chosenSpecies.id });
      syncColonyPopulation();

      if (isNew) {
        setUINotice(`✨ NUEVA ESPECIE DESCUBIERTA: ${chosenSpecies.name} (${chosenSpecies.rarity})! ✨`, 'ok');
        AudioFx.blip(880, 0.12, 0.05, 'sine');
      } else {
        setUINotice(`${def.name} incubado. Conseguiste: ${chosenSpecies.name} (${chosenSpecies.rarity}). +1 ${roleLabel(def.hatchRole)}.`, 'ok');
        AudioFx.blip(660, 0.07, 0.026, 'triangle');
      }

      saveGame();
      return true;
    }

    function spawnFlowerInBiome(biome) {
      const t = FLOWER_TYPES[biome.type];
      const xMin = 35 + (world.splitX - 70) * biome.x0;
      const xMax = 35 + (world.splitX - 70) * biome.x1;

        x: rand(xMin, xMax),
        y: rand(70, world.h - 40),
        pollen: Math.floor(rand(t.pollenMin, t.pollenMax + 1)),

    function saveGame() {
      try {
        const saveData = {
          state: {
            areaIndex: state.areaIndex,
            pollen: state.pollen,
            pollenCap: state.pollenCap,
            royalPollen: state.royalPollen,
            honey: state.honey,
            upgrades: state.upgrades,
            eggPurchasesCount: state.eggPurchasesCount || 0,
            lastPurchaseDay: state.lastPurchaseDay || "",
            boughtEggBoosters: state.boughtEggBoosters || [],
            username: state.username || "",
            isOceanPayAuthed: state.isOceanPayAuthed || false,
            weather: state.weather || 'clear',
            weatherTimer: state.weatherTimer || 0
          },
          colony: {
            counts: colony.counts,
            species: colony.species,
            unlockedSpecies: colony.unlockedSpecies || {},
            ownedBees: colony.ownedBees || []
          },
          inventory: {
            items: inventory.items
          }
        };
        localStorage.setItem('natbee_save_v1', JSON.stringify(saveData));
      } catch (err) {

    function loadGame() {
      const dataStr = localStorage.getItem('natbee_save_v1');
      if (!dataStr) return;
      try {
        const saveData = JSON.parse(dataStr);
        if (saveData.state) {
          state.areaIndex = saveData.state.areaIndex ?? 0;
          state.pollen = saveData.state.pollen ?? 0;
          state.pollenCap = saveData.state.pollenCap ?? 25;
          state.royalPollen = saveData.state.royalPollen ?? 0;
          state.honey = saveData.state.honey ?? 0;
          if (saveData.state.upgrades) {
            state.upgrades.cap = saveData.state.upgrades.cap ?? 0;
            state.upgrades.speed = saveData.state.upgrades.speed ?? 0;
            state.upgrades.refine = saveData.state.upgrades.refine ?? 0;
          }
          state.eggPurchasesCount = saveData.state.eggPurchasesCount ?? 0;
          state.lastPurchaseDay = saveData.state.lastPurchaseDay ?? "";
          state.boughtEggBoosters = saveData.state.boughtEggBoosters ?? [];
          state.username = saveData.state.username ?? "";
          state.isOceanPayAuthed = saveData.state.isOceanPayAuthed ?? false;
          state.weather = saveData.state.weather ?? 'clear';
          state.weatherTimer = saveData.state.weatherTimer ?? 0;
        }
        if (saveData.colony) {
          if (saveData.colony.counts) {
            colony.counts.offensive = saveData.colony.counts.offensive ?? 4;
            colony.counts.worker = saveData.colony.counts.worker ?? 3;
            colony.counts.pollinator = saveData.colony.counts.pollinator ?? 4;
          }
          if (saveData.colony.species) {
            colony.species.offensive = saveData.colony.species.offensive ?? 'sting-guard';
            colony.species.worker = saveData.colony.species.worker ?? 'amber-hauler';
            colony.species.pollinator = saveData.colony.species.pollinator ?? 'lavender-scout';
          }
          colony.unlockedSpecies = saveData.colony.unlockedSpecies ?? {
            'sting-guard': true,
            'amber-hauler': true,
            'lavender-scout': true
          };
          if (saveData.colony.ownedBees) {
            colony.ownedBees = saveData.colony.ownedBees;
          } else {
            // Generate ownedBees based on counts/equipped species for old saves
            colony.ownedBees = [];
            for (let i = 0; i < colony.counts.offensive; i++) {
              colony.ownedBees.push({ role: 'offensive', speciesId: colony.species.offensive });
            }
            for (let i = 0; i < colony.counts.worker; i++) {
              colony.ownedBees.push({ role: 'worker', speciesId: colony.species.worker });
            }
            for (let i = 0; i < colony.counts.pollinator; i++) {
              colony.ownedBees.push({ role: 'pollinator', speciesId: colony.species.pollinator });
            }
          }
        }
        if (saveData.inventory && saveData.inventory.items) {
          inventory.items = saveData.inventory.items;
        }
        // Sync structures after load
        initField();
        initHive();
        initColonySystems();
      } catch (err) {
        console.error('Error loading game:', err);
      }
    }

    function initField() {

    function initHive() {
      syncDynamicHive();

      hiveBees.length = 0;
      for (let i = 0; i < 7; i++) {
        hiveBees.push({
          x: rand(world.splitX + 36, world.w - 42),

        });

    // Rebuild hive cell grid based on current worker count.
    // Each worker gets their own dedicated slot; extras are "pending" visual cells.
    function syncDynamicHive() {
      const workerN = Math.max(1, colony.counts.worker || 1);
      // Determine grid shape: grow columns first, then add rows
      const cellR = 18;
      const colStep = 42;
      const rowStep = 36;
      const maxCols = 7;
      const cols = Math.min(maxCols, workerN);
      const rows = Math.ceil(workerN / cols) + 1; // +1 buffer row of ambient cells
      const totalCells = cols * rows;

      hiveCells.length = 0;
      hiveSlots.length = 0;

      const originX = world.splitX + 88;
      const originY = 82;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const slotIndex = row * cols + col;
          const cx = originX + col * colStep + (row % 2) * (colStep / 2);
          const cy = originY + row * rowStep;
          const isWorkerSlot = slotIndex < workerN;
          hiveCells.push({ x: cx, y: cy, active: isWorkerSlot, slotIndex });
          if (isWorkerSlot) {
            hiveSlots.push({ x: cx, y: cy, slotIndex, workerId: null });
          }
        }
      }

      // Reassign worker units to slots (round-robin)
      for (let i = 0; i < workerBeesUnits.length; i++) {
        const b = workerBeesUnits[i];
        b.hiveSlotIndex = i % Math.max(1, hiveSlots.length);
      }
    }

    function makeBeeUnit(role, i, total) {
      const angle = (Math.PI * 2 / Math.max(1, total)) * i;
      return {
        id: `${role}-${i}-${Math.floor(Math.random() * 9999)}`,
        role,
        x: world.splitX + 84 + Math.cos(angle) * 34,
        y: world.h - 92 + Math.sin(angle) * 24,
        vx: 0,
        vy: 0,
        hp: 100,
        maxHp: 100,
        cooldown: rand(0, 0.5),
        skillCooldown: rand(4, 10),
        cargo: null,
        targetId: null,
        targetFlowerId: null,
        pollinationTimer: 0,
        wobble: rand(0, Math.PI * 2)
      };
    }

    function initColonySystems() {
      enemies.length = 0;
      rewardDrops.length = 0;
      offensiveBees.length = 0;
      workerBeesUnits.length = 0;
      pollinatorBees.length = 0;
      colony.assignedEnemyId = null;
      colony.deliveredLoot = 0;
      colony.spawnTimer = 2.5;

      if (!colony.ownedBees) {
        colony.ownedBees = [];
        for (let i = 0; i < colony.counts.offensive; i++) {
          colony.ownedBees.push({ role: 'offensive', speciesId: colony.species.offensive });
        }
        for (let i = 0; i < colony.counts.worker; i++) {
          colony.ownedBees.push({ role: 'worker', speciesId: colony.species.worker });
        }
        for (let i = 0; i < colony.counts.pollinator; i++) {
          colony.ownedBees.push({ role: 'pollinator', speciesId: colony.species.pollinator });
        }
      }

      // Sync roles counters
      colony.counts.offensive = colony.ownedBees.filter(b => b.role === 'offensive').length;
      colony.counts.worker = colony.ownedBees.filter(b => b.role === 'worker').length;
      colony.counts.pollinator = colony.ownedBees.filter(b => b.role === 'pollinator').length;

      const roles = ['offensive', 'worker', 'pollinator'];
      const arrays = { offensive: offensiveBees, worker: workerBeesUnits, pollinator: pollinatorBees };

      for (const role of roles) {
        const owned = colony.ownedBees.filter(b => b.role === role);
        const arr = arrays[role];
        for (let i = 0; i < owned.length; i++) {
          const unit = makeBeeUnit(role, i, owned.length);
          unit.speciesId = owned[i].speciesId;
          arr.push(unit);
        }
      }
    }

    function syncColonyPopulation() {
      if (!colony.ownedBees) return;

      // Sync roles counters
      colony.counts.offensive = colony.ownedBees.filter(b => b.role === 'offensive').length;
      colony.counts.worker = colony.ownedBees.filter(b => b.role === 'worker').length;
      colony.counts.pollinator = colony.ownedBees.filter(b => b.role === 'pollinator').length;

      const roles = ['offensive', 'worker', 'pollinator'];
      const arrays = { offensive: offensiveBees, worker: workerBeesUnits, pollinator: pollinatorBees };
      const prevWorker = workerBeesUnits.length;

      for (const role of roles) {
        const owned = colony.ownedBees.filter(b => b.role === role);
        const arr = arrays[role];

        while (arr.length < owned.length) {
          arr.push(makeBeeUnit(role, arr.length, Math.max(1, owned.length)));
        }
        while (arr.length > owned.length) {
          arr.pop();
        }

        // Keep speciesId in sync
        for (let i = 0; i < arr.length; i++) {
          arr[i].speciesId = owned[i].speciesId;
        }
      }

      // Rebuild hive grid whenever worker count changes
      if (workerBeesUnits.length !== prevWorker || hiveSlots.length === 0) {
        syncDynamicHive();
      }
    }

    function spawnEnemy() {
      const area = getCurrentArea();
      const biome = area.biomes[Math.floor(rand(0, area.biomes.length))];
      const startX = 35 + (world.splitX - 70) * rand(biome.x0, biome.x1);
      const baseY  = rand(78, world.h - 64);
      
      let arch;
      if (area.id === 2) {
        arch = ENEMY_ARCHETYPES.find(a => a.kind === 'spider') || ENEMY_ARCHETYPES[0];
      } else {
        const choices = ENEMY_ARCHETYPES.filter(a => a.kind !== 'spider');
        arch = choices[Math.floor(rand(0, choices.length))];
      }
      spawnEnemyFromArch(arch, startX, baseY, biome.name);
    }

    function moveToward(unit, tx, ty, speed, dt) {
      const dx = tx - unit.x;
      const dy = ty - unit.y;
      const d = Math.hypot(dx, dy) || 1;
      unit.vx = dx / d * speed;
      unit.vy = dy / d * speed;
      unit.x += unit.vx * dt;
      unit.y += unit.vy * dt;
      unit.wobble += dt * 4;
    }

    function updateEnemyWaves(dt) {
      // ── Workers-in-field gate: enemies only spawn while at least 1 worker is outside the hive ──
      const workersInField = workerBeesUnits.filter(b => b.x < world.splitX).length;
      const maxEnemies = Math.min(6, 2 + Math.floor(workersInField * 1.2));

      // ── Main spawn timer ──
      if (workersInField > 0) {
        colony.spawnTimer -= dt;
        if (colony.spawnTimer <= 0 && enemies.length < maxEnemies) {
          spawnEnemy();
          colony.spawnTimer = rand(14, 22); // longer window between waves
        }
      } else {
        // Reset timer while no workers are exposed so first wave still has a delay
        colony.spawnTimer = Math.max(colony.spawnTimer, rand(12, 18));
      }

      // ── Process pending respawns ──
      for (let r = colony.enemyRespawnQueue.length - 1; r >= 0; r--) {
        const entry = colony.enemyRespawnQueue[r];
        entry.timer -= dt;
        if (entry.timer <= 0 && enemies.length < maxEnemies && workersInField > 0) {
          spawnEnemyFromArch(entry.arch, entry.startX, entry.baseY, entry.biomeName);
          colony.enemyRespawnQueue.splice(r, 1);
        }
      }

      const altarX = world.splitX + 108;
      const altarY = world.h - 74;
      const gateX  = world.splitX + 76; // 76 = gateOW (38) * 2, portal center X
      const gateY  = world.h * 0.50;
      const area = getCurrentArea();

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const prevX = e.x;
        const prevY = e.y;
        e.t += dt * 3.2;
        e.bodyPulse += dt * 2.8;

        const isTargetSeeker = (e.kind === 'spider' || area.id === 2);
        let activeTargetBee = null;

        if (isTargetSeeker) {
          if (offensiveBees.length > 0) {
            let closest = offensiveBees[0];
            let minDist = dist2(e.x, e.y, closest.x, closest.y);
            for (const b of offensiveBees) {
              const d = dist2(e.x, e.y, b.x, b.y);
              if (d < minDist) {
                minDist = d;
                closest = b;
              }
            }
            activeTargetBee = closest;
          } else if (workerBeesUnits.length > 0) {
            let closest = workerBeesUnits[0];
            let minDist = dist2(e.x, e.y, closest.x, closest.y);
            for (const b of workerBeesUnits) {
              const d = dist2(e.x, e.y, b.x, b.y);
              if (d < minDist) {
                minDist = d;
                closest = b;
              }
            }
            activeTargetBee = closest;
          }
        }

        if (activeTargetBee) {
          const dx = activeTargetBee.x - e.x;
          const dy = activeTargetBee.y - e.y;
          const d = Math.hypot(dx, dy) || 1;
          // Fireflies have erratic zigzag movement
          const speedMod = (e.kind === 'firefly') ? 1.3 : 1;
          const zigzagX = (e.kind === 'firefly') ? Math.sin(e.t * 4) * 18 * dt : 0;
          const zigzagY = (e.kind === 'firefly') ? Math.cos(e.t * 3.2) * 12 * dt : 0;
          e.x += (dx / d) * e.speed * speedMod * dt + zigzagX;
          e.y += (dy / d) * e.speed * speedMod * dt + zigzagY;

          if (d < 22) {
            activeTargetBee.hp -= 22 * dt;
            if (activeTargetBee.hp <= 0) {
              const isOffensive = activeTargetBee.role === 'offensive';
              if (colony.ownedBees) {
                const oIdx = colony.ownedBees.findIndex(b => b.role === activeTargetBee.role && b.speciesId === activeTargetBee.speciesId);
                if (oIdx >= 0) {
                  colony.ownedBees.splice(oIdx, 1);
                }
              }
              if (isOffensive) {
                colony.counts.offensive = Math.max(0, colony.counts.offensive - 1);
                const idx = offensiveBees.findIndex(b => b.id === activeTargetBee.id);
                if (idx >= 0) offensiveBees.splice(idx, 1);
                setUINotice('¡Una Abeja Ofensiva fue eliminada por la Araña!', 'warn');
              } else {
                colony.counts.worker = Math.max(0, colony.counts.worker - 1);
                const idx = workerBeesUnits.findIndex(b => b.id === activeTargetBee.id);
                if (idx >= 0) workerBeesUnits.splice(idx, 1);
                setUINotice('¡Una Abeja Trabajadora fue eliminada por la Araña!', 'warn');
              }
              syncColonyPopulation();
              spawnPollenBurst(activeTargetBee.x, activeTargetBee.y, 8);
              AudioFx.blip(90, 0.15, 0.05, 'sawtooth');
            }
          }
        } else {
          if (e.state === 'approach') {
            const dx = gateX - e.x;
            const dy = gateY - e.y;
            const d = Math.hypot(dx, dy) || 1;
            e.x += (dx / d) * e.speed * dt;
            e.y += (dy / d) * e.speed * dt;
            if (d < 22) e.state = 'raid';
          } else {
            const dx = altarX - e.x;
            const dy = altarY - e.y;
            const d = Math.hypot(dx, dy) || 1;
            const weave = (e.kind === 'hornet') ? Math.sin(e.t * 2.4) * 6 : Math.sin(e.t) * 3;
            e.x += (dx / d) * (e.speed * 0.88) * dt;
            e.y += (dy / d) * (e.speed * 0.88) * dt + weave * dt;
          }
        }

        e.vx = (e.x - prevX) / Math.max(0.0001, dt);
        e.vy = (e.y - prevY) / Math.max(0.0001, dt);
        const groundFactor = (e.kind === 'stinger' || e.kind === 'hornet') ? 0.35 : 1;
        e.walkPhase += dt * (2.8 + Math.min(3.7, Math.hypot(e.vx, e.vy) / 34) * groundFactor);

        // ── Altar raid ──
        if (e.x < altarX + 22 && Math.abs(e.y - altarY) < 80) {
          state.honey = Math.max(0, state.honey - e.raidDamage);
          spawnHoneyBurst(altarX, altarY, 3);
          raidState.flash = Math.max(raidState.flash, 0.9);
          // Queue respawn after theft
          const areaCurrent = getCurrentArea();
          const biomeCurrent = areaCurrent.biomes[Math.floor(rand(0, areaCurrent.biomes.length))];
          const respawnDelay = (e.archetype?.respawnBase || 24) + rand(0, e.archetype?.respawnVar || 8);
          colony.enemyRespawnQueue.push({
            arch: e.archetype || ENEMY_ARCHETYPES[0],
            startX: 35 + (world.splitX - 70) * rand(biomeCurrent.x0, biomeCurrent.x1),
            baseY: rand(78, world.h - 64),
            biomeName: biomeCurrent.name,
            timer: respawnDelay
          });
          enemies.splice(i, 1);
          setUINotice('An enemy raided the hive — will return!', 'warn');
          continue;
        }

        // ── Killed by offensive bees ──
        if (e.hp <= 0) {
          rewardDrops.push({
            id: `drop-${Math.floor(Math.random() * 1e7)}`,
            x: e.x, y: e.y,
            claimWorkerId: null,
            honeyReward: (e.kind === 'firefly' ? 18 : 12) + Math.floor(rand(0, 18)),
            royalReward: (e.kind === 'firefly' ? 12 : 5) + Math.floor(rand(0, 11)),
            iconSpin: rand(0, Math.PI * 2)
          });
          spawnPollenBurst(e.x, e.y, e.kind === 'firefly' ? 10 : 6);
          if (e.kind === 'firefly') {
            // Fireflies drop pollinator eggs with higher chance
            if (Math.random() < 0.35) addInventoryItem('egg-pollinator', 1, false);
          } else if (Math.random() < 0.17) {
            addInventoryItem('egg-offensive', 1, false);
          }
          // Schedule respawn
          const areaCurrent = getCurrentArea();
          const biomeCurrent = areaCurrent.biomes[Math.floor(rand(0, areaCurrent.biomes.length))];
          const respawnDelay2 = (e.archetype?.respawnBase || 24) + rand(0, e.archetype?.respawnVar || 8);
          colony.enemyRespawnQueue.push({
            arch: e.archetype || ENEMY_ARCHETYPES[0],
            startX: 35 + (world.splitX - 70) * rand(biomeCurrent.x0, biomeCurrent.x1),
            baseY: rand(78, world.h - 64),
            biomeName: biomeCurrent.name,
            timer: respawnDelay2
          });
          enemies.splice(i, 1);
          if (colony.assignedEnemyId === e.id) colony.assignedEnemyId = null;
        }
      }
    }

    function findEnemyById(id) {
      return enemies.find(e => e.id === id) || null;
    }

    function updateOffensiveBees(dt) {
      const species = getActiveSpecies('offensive');
      const homeX = world.splitX + 114;
      const homeY = world.h - 80;
      for (const b of offensiveBees) {
        b.cooldown -= dt;
        b.skillCooldown -= dt;
        let target = null;
        if (colony.assignedEnemyId) {
          target = findEnemyById(colony.assignedEnemyId);
        }
        if (!target) {
          let best = null;
          let bestD = Infinity;
          for (const e of enemies) {
            const d = dist2(b.x, b.y, e.x, e.y);
            if (d < bestD) { best = e; bestD = d; }
          }
          target = best;
        }

        if (target) {
          moveToward(b, target.x, target.y, species.speed, dt);
          const d2v = dist2(b.x, b.y, target.x, target.y);
          if (d2v < species.range * species.range && b.cooldown <= 0) {
            target.hp -= species.damage;
            b.cooldown = species.atkCd;
            spawnPollenBurst(target.x, target.y, 1);
            AudioFx.blip(190 + Math.random() * 70, 0.03, 0.013, 'square');
          }

          // Mythic active skill: 7 thorn strikes every 14.5s if battle requirements are met.
          if (
            species.id === 'sting-king' &&
            species.thornCooldown &&
            b.skillCooldown <= 0 &&
            d2v < (species.range + 28) * (species.range + 28) &&
            enemies.length > 0
          ) {
            for (let i = 0; i < 7; i++) {
              const ang = (Math.PI * 2 / 7) * i;
              const sx = target.x + Math.cos(ang) * 18;
              const sy = target.y + Math.sin(ang) * 18;
              spawnPollenBurst(sx, sy, 2);
              target.hp -= 11;
            }
            AudioFx.blip(120, 0.10, 0.045, 'sawtooth');
            AudioFx.blip(240, 0.06, 0.03, 'square');
            b.skillCooldown = species.thornCooldown;
            setUINotice('Abeja Rey: Lluvia de 7 Aguijones activada.', 'warn');
          }
        } else {
          const ox = Math.cos(b.wobble * 0.7) * 26;
          const oy = Math.sin(b.wobble) * 18;
          moveToward(b, homeX + ox, homeY + oy, species.speed * 0.55, dt);
        }
      }
    }

    function findClosestUnclaimedDrop(x, y) {
      let best = null;
      let bestD = Infinity;
      for (const d of rewardDrops) {
        if (d.claimWorkerId) continue;
        const dd = dist2(x, y, d.x, d.y);
        if (dd < bestD) {
          best = d;
          bestD = dd;
        }
      }
      return best;
    }

    function updateWorkerBees(dt) {
      const species  = getActiveSpecies('worker');
      const offensive = getActiveSpecies('offensive');
      const speedBuff = (offensive.id === 'sting-king' && enemies.length > 0) ? 1.5 : 1;
      const altarX = world.splitX + 106;
      const altarY = world.h - 74;

      for (let wi = 0; wi < workerBeesUnits.length; wi++) {
        const b = workerBeesUnits[wi];

        // Ensure each worker has an assigned hive slot
        if (b.hiveSlotIndex === undefined || b.hiveSlotIndex >= hiveSlots.length) {
          b.hiveSlotIndex = wi % Math.max(1, hiveSlots.length);
        }
        const slot = hiveSlots[b.hiveSlotIndex];
        const destX = slot ? slot.x : altarX;
        const destY = slot ? slot.y : altarY;

        if (b.cargo) {
          // Deliver cargo to this worker's dedicated hive slot
          moveToward(b, destX, destY, species.speed * speedBuff, dt);
          if (dist2(b.x, b.y, destX, destY) < 24 * 24) {
            state.honey += b.cargo.honeyReward;
            state.royalPollen += b.cargo.royalReward;
            colony.deliveredLoot += 1;
            spawnHoneyBurst(destX, destY, 4);
            if (Math.random() < 0.13) addInventoryItem('egg-worker', 1, false);
            AudioFx.blip(420, 0.06, 0.022, 'triangle');
            const idx = rewardDrops.findIndex(r => r.id === b.cargo.id);
            if (idx >= 0) rewardDrops.splice(idx, 1);
            b.cargo = null;
            b.targetId = null;
          }
          continue;
        }

        let targetDrop = b.targetId ? rewardDrops.find(r => r.id === b.targetId) : null;
        if (!targetDrop || (targetDrop.claimWorkerId && targetDrop.claimWorkerId !== b.id)) {
          targetDrop = findClosestUnclaimedDrop(b.x, b.y);
          b.targetId = targetDrop ? targetDrop.id : null;
          if (targetDrop) targetDrop.claimWorkerId = b.id;
        }

        if (targetDrop) {
          moveToward(b, targetDrop.x, targetDrop.y, species.speed * speedBuff, dt);
          if (dist2(b.x, b.y, targetDrop.x, targetDrop.y) < 20 * 20) {
            b.cargo = targetDrop;
          }
        } else {
          // If no enemy drop is available, workers go gather pollen directly from the flower fields
          if (!b.harvestFlowerId) {
            const choices = flowers.filter(f => f.pollen > 0 && f.x < world.splitX);
            if (choices.length > 0) {
              let closest = choices[0];
              let minDist = dist2(b.x, b.y, closest.x, closest.y);
              for (const f of choices) {
                const d = dist2(b.x, b.y, f.x, f.y);
                if (d < minDist) {
                  minDist = d;
                  closest = f;
                }
              }
              b.harvestFlowerId = closest._id;
              b.harvestTimer = 0;
            }
          }

          const flower = b.harvestFlowerId ? flowers.find(f => f._id === b.harvestFlowerId && f.pollen > 0) : null;
          if (flower) {
            moveToward(b, flower.x, flower.y, species.speed * speedBuff, dt);
            if (dist2(b.x, b.y, flower.x, flower.y) < 18 * 18) {
              b.harvestTimer = (b.harvestTimer || 0) + dt;
              if (b.harvestTimer >= 1.0) {
                const take = Math.min(flower.pollen, 4);
                flower.pollen -= take;
                b.cargo = {
                  id: `harvest-${Math.floor(Math.random() * 1e7)}`,
                  x: flower.x, y: flower.y,
                  honeyReward: take * 2,
                  royalReward: Math.ceil(take * 0.8)
                };
                b.harvestFlowerId = null;
                b.harvestTimer = 0;
                spawnPollenBurst(flower.x, flower.y, 2);
                AudioFx.blip(350, 0.05, 0.015, 'sine');
              }
            }
          } else {
            b.harvestFlowerId = null;
            // Idle at or near the assigned hive slot
            b.wobble += dt * 1.4;
            moveToward(
              b,
              destX + Math.cos(b.wobble) * 18,
              destY + Math.sin(b.wobble * 1.1) * 12,
              species.speed * 0.38 * speedBuff,
              dt
            );
          }
        }
      }
    }

    function updatePollinatorBees(dt) {
      const species = getActiveSpecies('pollinator');
      const altarX = world.splitX + 96;
      const altarY = world.h - 78;
      for (const b of pollinatorBees) {
        if (!b.cargo) b.cargo = { pollen: 0 };
        if (b.targetFlowerId) {
          const flower = flowers.find(f => f._id === b.targetFlowerId);
          if (!flower || flower.pollen <= 0 || flower.biomeId !== colony.assignedBiomeId) {
            b.targetFlowerId = null;
          }
        }
        if (!b.targetFlowerId && b.cargo.pollen <= 0) {
          const choices = flowers.filter(f => f.biomeId === colony.assignedBiomeId && f.pollen > 0);
          if (choices.length) {
            const chosen = choices[Math.floor(rand(0, choices.length))];
            b.targetFlowerId = chosen._id;
          }
        }

        if (b.cargo.pollen > 0 && !b.targetFlowerId) {
          moveToward(b, altarX, altarY, species.speed, dt);
          if (dist2(b.x, b.y, altarX, altarY) < 24 * 24) {
            const gain = b.cargo.pollen;
            const room = Math.max(0, state.pollenCap - state.pollen);
            const toBag = Math.min(room, gain);
            state.pollen += toBag;
            state.royalPollen += Math.ceil(gain * 0.7);
            const eggChance = Math.min(0.25, 0.08 + gain * 0.018);
            if (Math.random() < eggChance) addInventoryItem('egg-pollinator', 1, false);
            b.cargo.pollen = 0;
            spawnPollenBurst(altarX, altarY, 2);
          }
          continue;
        }

        const flower = flowers.find(f => f._id === b.targetFlowerId);
        if (flower) {
          moveToward(b, flower.x, flower.y, species.speed, dt);
          if (dist2(b.x, b.y, flower.x, flower.y) < 18 * 18) {
            b.pollinationTimer += dt;
            if (b.pollinationTimer > 0.52) {
              const take = Math.min(flower.pollen, Math.max(1, Math.floor(species.gather)));
              flower.pollen -= take;
              b.cargo.pollen += Math.max(1, Math.floor(take * species.gather));
              b.targetFlowerId = null;
              b.pollinationTimer = 0;
              spawnPollenBurst(flower.x, flower.y, 1);
            }
          }
        } else {
          b.targetFlowerId = null;
          moveToward(b, altarX, altarY, species.speed * 0.7, dt);
        }
      }
    }

    function resetPlayerInsideBounds() {
      player.x = Math.max(20, Math.min(world.w - 20, player.x));
      player.y = Math.max(28, Math.min(world.h - 20, player.y));
    }

    function resetGame() {
      state.pollen = 0;
      state.royalPollen = 0;
      state.pollenCap = 25;
      state.honey = 0;
      state.upgrades.cap = 0;
      state.upgrades.speed = 0;
      state.upgrades.refine = 0;
      colony.counts.offensive = 4;
      colony.counts.worker = 3;
      colony.counts.pollinator = 4;
      for (const id of Object.keys(inventory.items)) inventory.items[id] = 0;
      player.speed = 220;
      player.x = Math.max(220, world.w * 0.18);
      player.y = world.h * 0.5;
      initField();
      initHive();
      initColonySystems();
    }

    function recalcHudRects() {
      hud.x = 14;
      hud.y = 14;
      hud.w = Math.min(340, Math.max(280, world.w * 0.25));
      hud.cards = [];
      const pad = 10;
      const gap = 8;
      const cardH = 40;
      const cardW = Math.floor((hud.w - pad * 2 - gap) / 2);
      const y = hud.y + 52;
      for (let i = 0; i < 4; i++) {
        const col = i % 2;
        const row = Math.floor(i / 2);
        hud.cards.push({
          x: hud.x + pad + col * (cardW + gap),
          y: y + row * (cardH + gap),
          w: cardW,
          h: cardH
        });
      }
      hud.upgradesTitleY = y + cardH * 2 + gap + 12;
      hud.footerY = hud.upgradesTitleY + 132;
      hud.h = hud.footerY + 56 - hud.y;
    }

    function spawnPollenBurst(x, y, amount) {
      const count = Math.min(16, 5 + amount * 2);
      for (let i = 0; i < count; i++) {
        fxParticles.push({
          x, y,
          vx: rand(-60, 60),
          vy: rand(-90, -15),
          g: 95,
          life: rand(0.22, 0.48),
          color: Math.random() > 0.45 ? '#f5d469' : (Math.random() > 0.5 ? '#12161f' : '#ffeaa8'),
          size: rand(1.8, 3.4)
        });
      }
    }

    function spawnHoneyBurst(x, y, amount) {
      const count = Math.min(26, 8 + amount);
      for (let i = 0; i < count; i++) {
        fxParticles.push({
          x, y,
          vx: rand(-120, 120),
          vy: rand(-130, -35),
          g: 145,
          life: rand(0.28, 0.65),
          color: Math.random() > 0.3 ? '#ffb347' : '#ffd27a',
          size: rand(2.2, 4.8)
        });
      }
    }

    function update(dt) {
      const area = getCurrentArea();

      // Weather system
      state.weatherTimer += dt;
      if (state.weatherTimer > 45) {
        state.weatherTimer = 0;
        const weathers = ['clear', 'rain', 'sunset'];
        state.weather = weathers[Math.floor(Math.random() * weathers.length)];
        if (state.weather !== 'clear') {
          setUINotice(`El clima cambio: ${state.weather === 'rain' ? 'Lluvia' : 'Atardecer'}`, 'info');
        }
      }

      // Rain particles update
      if (area.id !== 2) {
        if (state.weather === 'rain') {
          const targetCount = 120;
          if (rainDrops.length === 0) {
            for (let i = 0; i < targetCount; i++) {
              rainDrops.push(createRainDrop(true));
            }
          } else if (rainDrops.length < targetCount) {
            const toSpawn = Math.min(5, targetCount - rainDrops.length);
            for (let i = 0; i < toSpawn; i++) {
              rainDrops.push(createRainDrop(false));
            }
          }
        }

        // Update drops
        for (let i = rainDrops.length - 1; i >= 0; i--) {
          const d = rainDrops[i];
          d.x += d.vx * dt;
          d.y += d.vy * dt;
          
          if (d.y >= d.groundY || d.x < -20 || d.x > world.splitX + 20) {
            if (d.y >= d.groundY && d.x >= 0 && d.x <= world.splitX) {
              rainSplashes.push({
                x: d.x,
                y: d.groundY,
                radius: 0.5,
                maxRadius: d.layer === 0 ? rand(2, 4) : (d.layer === 1 ? rand(4, 6) : rand(6, 8)),
                opacity: d.opacity * 1.2,
                life: rand(0.08, 0.12),
                maxLife: rand(0.08, 0.12),
                layer: d.layer
              });
            }
            rainDrops.splice(i, 1);
          }
        }
      } else {
        // Clear rain when in Zone 2 (underground/cave)
        if (rainDrops.length > 0) rainDrops.length = 0;
        if (rainSplashes.length > 0) rainSplashes.length = 0;
      }

      // Splashes update
      for (let i = rainSplashes.length - 1; i >= 0; i--) {
        const s = rainSplashes[i];
        s.life -= dt;
        if (s.life <= 0) {
          rainSplashes.splice(i, 1);
        } else {
          const t = 1 - (s.life / s.maxLife);
          s.radius = s.maxRadius * t;
          s.opacity = (1 - t) * (s.opacity || 0.4);
        }
      }

      // Floating pollen particles
      if (Math.random() < 0.08 && state.weather !== 'rain') {
        floatingPollen.push({
          x: Math.random() * world.splitX,
          y: Math.random() * world.h,
          vx: (Math.random() - 0.5) * 15,
          vy: -Math.random() * 8 - 2,
          life: Math.random() * 3 + 2,
          size: Math.random() * 2 + 1,
          color: Math.random() > 0.5 ? '#f5d469' : '#ffeaa8'
        });
      }
      for (let i = floatingPollen.length - 1; i >= 0; i--) {
        const p = floatingPollen[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0 || p.y < -10) floatingPollen.splice(i, 1);
      }

      const xDir = (keys.KeyD || keys.ArrowRight ? 1 : 0) - (keys.KeyA || keys.ArrowLeft ? 1 : 0);
      const yDir = (keys.KeyS || keys.ArrowDown ? 1 : 0) - (keys.KeyW || keys.ArrowUp ? 1 : 0);
      const moveIntensity = Math.min(1, Math.hypot(xDir, yDir));
      AudioFx.flutter(moveIntensity);

      const len = Math.hypot(xDir, yDir) || 1;
      const nx = xDir / len;
      const ny = yDir / len;
      player.vx = nx * player.speed;
      player.vy = ny * player.speed;
      player.x += player.vx * dt;
      player.y += player.vy * dt;
      player.x = Math.max(18, Math.min(world.w - 18, player.x));
      player.y = Math.max(26, Math.min(world.h - 20, player.y));
      player.bob += dt * 8;
      state.zone = player.x < world.splitX ? 'field' : 'hive';
      const roofTarget = state.zone === 'hive' ? 0 : 1;
      state.hiveRoofFade += (roofTarget - state.hiveRoofFade) * Math.min(1, dt * 5.2);

      if (player.x < world.splitX && state.pollen < state.pollenCap) {
        for (let i = flowers.length - 1; i >= 0; i--) {
          const f = flowers[i];
          const dx = player.x - f.x;
          const dy = player.y - f.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < (f.radius + 18) * (f.radius + 18)) {
            const canTake = Math.min(f.pollen, state.pollenCap - state.pollen);
            const flowerType = FLOWER_TYPES[f.type] || FLOWER_TYPES.orchid;
            state.pollen += canTake;
            state.royalPollen += canTake * flowerType.royalBonus;
            f.pollen -= canTake;
            spawnPollenBurst(f.x, f.y, canTake);
            AudioFx.blip(760 + Math.random() * 140, 0.04, 0.018, 'triangle');
            if (f.pollen <= 0) flowers.splice(i, 1);
            if (state.pollen >= state.pollenCap) break;
          }
        }
      }

      if (player.x >= world.splitX + 36 && state.pollen > 0) {
        spawnHoneyBurst(player.x + 22, player.y - 8, state.pollen);
        AudioFx.blip(280, 0.12, 0.035, 'sine');
        AudioFx.blip(420, 0.10, 0.028, 'triangle');
