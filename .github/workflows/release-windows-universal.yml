name: Release Windows (Universal)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project slug (e.g., ows-store)'
        required: true
        type: string
      version:
        description: 'Version (e.g., 2026.5.14-t0001)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve project directory
        id: resolve
        shell: pwsh
        run: |
          $slug = '${{ inputs.project }}'
          $dir = ''
          $targetRepo = 'owsdatabase'
          switch ($slug) {
            'ows-store'            { $dir = 'OWS Store';            $targetRepo = 'owsdatabase' }
            'dinobox'              { $dir = 'DinoBox';              $targetRepo = 'owsdatabase' }
            'floretshop'           { $dir = 'Floret Shop';          $targetRepo = 'floretshop' }
            'wildtransfer'         { $dir = 'WildTransfer';         $targetRepo = 'wildtransfer' }
            'a-wild-question-game' { $dir = 'A Wild Question Game'; $targetRepo = 'a-wild-question-game' }
            default { $dir = ''; $targetRepo = '' }
          }
          if (-not $dir) { throw "Unknown project slug: $slug" }
          "project_dir=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_repo=$targetRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: npm ci

      - name: Build (NSIS)
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version
          npm run dist:nsis

      - name: Create/Update GitHub release + upload assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $repo = "OceanandWild/${{ steps.resolve.outputs.target_repo }}"
          $tag  = "${{ steps.resolve.outputs.tag }}"
          $name = "${{ inputs.project }} ${{ inputs.version }}"
          $notes = "${{ inputs.release_notes }}"

          # Create or update release (--clobber updates if already exists)
          $existing = gh release view $tag --repo $repo 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating release $tag in $repo"
            gh release create $tag --repo $repo --title $name --notes $notes
          } else {
            Write-Host "Release $tag already exists in $repo, uploading assets..."
          }

          # Collect and upload assets
          $files = @()
          foreach ($pat in @("C:/builds/*/*.exe","C:/builds/*/*.appx","C:/builds/*/latest.yml","C:/builds/*/*.blockmap")) {
            $found = Get-Item $pat -ErrorAction SilentlyContinue
            if ($found) { $files += $found.FullName }
          }

          if ($files.Count -eq 0) {
            Write-Warning "No build assets found to upload."
          } else {
            gh release upload $tag --repo $repo --clobber @files
          }
          Write-Host "Done: https://github.com/$repo/releases/tag/$tag"
