name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2026.5.15-t1530)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (NSIS)
        run: npm run dist:nsis

      - name: Create/Update GitHub release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: oceanpay ${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          prerelease: false
          make_latest: true
          files: |
            C:/builds/*/*.exe
            C:/builds/*/*.appx
            C:/builds/*/latest.yml
            C:/builds/*/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
