name: Deploy Ecoxion App
on:
  workflow_dispatch: # Permite que tú o la IA activen el proceso manualmente

jobs:
  build-and-release:
    runs-on: windows-latest # Usamos Windows para que coincida con tus rutas y Electron
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run dist # Aquí se genera el .exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # El token que permite a la IA usar 'gh'
        run: |
          # La IA ya no necesita la ruta C:\Program Files, solo usa 'gh' directamente
          gh release create v2026.3.15-t1500 `
            "./dist/Ecoxion.Setup.exe" `
            "./dist/latest.yml" `
            --title "Ecoxion 2026.3.15-t1500" `
            --notes "Primera release oficial de Ecoxion para Windows" `
            --repo ${{ github.repository }}
