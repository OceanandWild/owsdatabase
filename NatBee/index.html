        const multiplier = 1 + (state.upgrades.refine * 0.2);
        state.honey += Math.floor(state.pollen * multiplier);
        state.pollen = 0;
      }

      updateEnemyWaves(dt);
      syncColonyPopulation();
      updateOffensiveBees(dt);
      updateWorkerBees(dt);
      updatePollinatorBees(dt);
      raidState.flash = Math.max(0, raidState.flash - dt * 0.55);
      raidState.pulse += dt * 3.2;
      if (enemies.length > 0) {
        raidState.sirenTimer -= dt;
        if (raidState.sirenTimer <= 0) {
          AudioFx.blip(140, 0.06, 0.03, 'sawtooth');
          AudioFx.blip(210, 0.08, 0.028, 'triangle');
          raidState.sirenTimer = 1.8;
        }
      } else {
        raidState.sirenTimer = 0.4;
      }

      for (const b of hiveBees) {
        b.t += dt;
        b.x += Math.cos(b.t * 1.4) * b.dx * dt;
        b.y += Math.sin(b.t * 1.8) * b.dy * dt;
        b.x = Math.max(world.splitX + 25, Math.min(world.w - 20, b.x));
        b.y = Math.max(30, Math.min(world.h - 24, b.y));
      }

      for (const biome of area.biomes) {
        const count = flowers.filter(f => f.biomeId === biome.id).length;
        if (count < Math.max(5, Math.floor(biome.quota * 0.45))) {
          flowers.push(spawnFlowerInBiome(biome));
        }
      }

      for (let i = flowers.length - 1; i >= 0; i--) {
        if (flowers[i].pollen <= 0) flowers.splice(i, 1);
      }

      for (let i = fxParticles.length - 1; i >= 0; i--) {
        const p = fxParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += p.g * dt;
        p.life -= dt;
        if (p.life <= 0) fxParticles.splice(i, 1);
      }

      if (uiNotice.timer > 0) uiNotice.timer -= dt;
    }

    function drawHex(x, y, r, fill, stroke) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i + Math.PI / 6;
        const px = x + Math.cos(a) * r;
        const py = y + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawTinyBee(x, y) {
      if (BeeFx.enabled) return;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(0.75, 0.75);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(-6, -5, 7, 4, -0.4, 0, Math.PI * 2);
      ctx.ellipse(6, -5, 7, 4, 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f5b027';
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1b1b1b';
      ctx.lineWidth = 2;
      for (let i = -4; i <= 4; i += 4) {
        ctx.beginPath();
        ctx.moveTo(i, -6);
        ctx.lineTo(i, 6);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRoleBee(unit, styleColor, wingColor) {
      if (BeeFx.enabled) return;
      const wing = Math.sin(unit.wobble * 4) * 0.3;
      ctx.save();
      ctx.translate(unit.x, unit.y);
      ctx.fillStyle = wingColor;
      ctx.beginPath();
      ctx.ellipse(-5, -4, 6.5, 3.2, -0.7 + wing, 0, Math.PI * 2);
      ctx.ellipse(5, -4, 6.5, 3.2, 0.7 - wing, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f5be32';
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 5.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1d1916';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-2, -4);
      ctx.lineTo(-2, 4);
      ctx.moveTo(2, -4);
      ctx.lineTo(2, 4);
      ctx.stroke();
      ctx.fillStyle = styleColor;
      ctx.beginPath();
      ctx.arc(-5.2, 0, 2.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemy(enemy) {
      const pulse   = 0.92 + Math.sin(enemy.bodyPulse) * 0.06;
      const heading = Math.atan2(enemy.vy || Math.sin(enemy.t) * 0.2, enemy.vx || 1);
      const sz      = enemy.size;
      const wp      = enemy.walkPhase || 0;

      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(heading * (enemy.kind === 'stinger' || enemy.kind === 'hornet' ? 0.55 : 0.22));
      ctx.scale(pulse, pulse);

      // ── CRAWLER: stocky spider-like wasp ──────────────────────────────────────
      if (enemy.kind === 'crawler') {
        // Glow aura
        const aura = ctx.createRadialGradient(0, 0, sz * 0.3, 0, 0, sz * 1.4);
        aura.addColorStop(0, 'rgba(200, 40, 60, 0.18)');
        aura.addColorStop(1, 'rgba(200, 40, 60, 0)');
        ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(0, 0, sz * 1.4, 0, Math.PI * 2); ctx.fill();

        // 6 thick segmented legs
        ctx.strokeStyle = '#1a0a0d'; ctx.lineWidth = sz * 0.13;
        for (let side = -1; side <= 1; side += 2) {
          for (let li = 0; li < 3; li++) {
            const baseY = (li - 1) * sz * 0.55;
            const swing = Math.sin(wp + li * 2.1 + (side > 0 ? Math.PI : 0)) * sz * 0.28;
            ctx.beginPath();
            ctx.moveTo(side * sz * 0.5, baseY);
            ctx.quadraticCurveTo(side * (sz * 0.9 + Math.abs(swing) * 0.4), baseY + swing * 0.5,
                                  side * (sz * 1.1), baseY + swing + sz * 0.2);
            ctx.stroke();
          }
        }

        // Abdomen (rear rounded body)
        const abdGrad = ctx.createRadialGradient(-sz * 0.22, -sz * 0.18, sz * 0.1, 0, 0, sz);
        abdGrad.addColorStop(0, '#c84060'); abdGrad.addColorStop(0.6, '#7a1a28'); abdGrad.addColorStop(1, '#3a0a12');
        ctx.fillStyle = abdGrad;
        ctx.beginPath(); ctx.ellipse(0, sz * 0.12, sz * 0.78, sz * 0.62, 0, 0, Math.PI * 2); ctx.fill();
        // Dark cross-bands
        ctx.strokeStyle = 'rgba(18, 6, 10, 0.80)'; ctx.lineWidth = sz * 0.15;
        for (let b = -1; b <= 1; b++) {
          ctx.beginPath();
          ctx.moveTo(-sz * 0.72, b * sz * 0.28 + sz * 0.12);
          ctx.lineTo(sz * 0.72, b * sz * 0.28 + sz * 0.12);
          ctx.stroke();
        }

        // Thorax (front lighter body)
        const thxGrad = ctx.createRadialGradient(-sz * 0.15, -sz * 0.22, sz * 0.06, 0, -sz * 0.32, sz * 0.5);
        thxGrad.addColorStop(0, '#d05070'); thxGrad.addColorStop(1, '#5a1520');
        ctx.fillStyle = thxGrad;
        ctx.beginPath(); ctx.ellipse(0, -sz * 0.46, sz * 0.48, sz * 0.40, 0, 0, Math.PI * 2); ctx.fill();

        // Head
        ctx.fillStyle = '#2e0e16';
        ctx.beginPath(); ctx.arc(0, -sz * 0.96, sz * 0.30, 0, Math.PI * 2); ctx.fill();
        // Mandibles
        ctx.strokeStyle = '#c03050'; ctx.lineWidth = sz * 0.09;
        ctx.beginPath(); ctx.moveTo(-sz * 0.14, -sz * 1.14); ctx.lineTo(-sz * 0.32, -sz * 1.32); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( sz * 0.14, -sz * 1.14); ctx.lineTo( sz * 0.32, -sz * 1.32); ctx.stroke();
        // Eyes
        ctx.fillStyle = '#ff9060';
        ctx.beginPath(); ctx.arc(-sz * 0.14, -sz * 0.96, sz * 0.10, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc( sz * 0.14, -sz * 0.96, sz * 0.10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1a0a0c';
        ctx.beginPath(); ctx.arc(-sz * 0.14, -sz * 0.96, sz * 0.05, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc( sz * 0.14, -sz * 0.96, sz * 0.05, 0, Math.PI * 2); ctx.fill();
      }

      // ── STINGER: sleek fast flying wasp ──────────────────────────────────────
      else if (enemy.kind === 'stinger') {
        const flap = Math.sin(wp * 3.8) * 0.38;
        // Wings (iridescent, semi-transparent)
        ctx.save();
        const wingGrad = ctx.createLinearGradient(0, -sz * 0.6, 0, sz * 0.1);
        wingGrad.addColorStop(0, 'rgba(255, 180, 160, 0.52)');
        wingGrad.addColorStop(1, 'rgba(200, 80, 100, 0.22)');
        ctx.fillStyle = wingGrad;
        ctx.beginPath();
        ctx.ellipse(-sz * 0.32, -sz * 0.42, sz * 0.58, sz * 0.20, -0.7 + flap, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath();
        ctx.ellipse( sz * 0.20, -sz * 0.38, sz * 0.55, sz * 0.18,  0.6 - flap, 0, Math.PI * 2); ctx.fill();
        // Small hind wings
        ctx.globalAlpha = 0.55;
        ctx.beginPath();
        ctx.ellipse(-sz * 0.18, -sz * 0.22, sz * 0.30, sz * 0.11, -0.4 + flap * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath();
        ctx.ellipse( sz * 0.12, -sz * 0.20, sz * 0.28, sz * 0.10,  0.4 - flap * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1; ctx.restore();

        // Segmented body – 3 tapered sections
        const segColors = ['#ff5878', '#b52038', '#6a1025'];
        const segLens   = [0.42, 0.38, 0.28];
        let sy2 = -sz * 0.52;
        for (let s = 0; s < 3; s++) {
          const sgGrad = ctx.createLinearGradient(-sz * 0.3, sy2, sz * 0.3, sy2 + sz * segLens[s]);
          sgGrad.addColorStop(0, segColors[s]); sgGrad.addColorStop(1, '#250810');
          ctx.fillStyle = sgGrad;
          ctx.beginPath();
          ctx.ellipse(0, sy2 + sz * segLens[s] * 0.5, sz * (0.32 - s * 0.05), sz * segLens[s] * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
          sy2 += sz * segLens[s] * 0.9;
        }
        // Stinger tip
        ctx.fillStyle = '#c0c0c0';
        ctx.beginPath();
        ctx.moveTo(-sz * 0.06, sy2 - sz * 0.04);
        ctx.lineTo( sz * 0.06, sy2 - sz * 0.04);
        ctx.lineTo(0, sy2 + sz * 0.26);
        ctx.closePath(); ctx.fill();

        // Head
        ctx.fillStyle = '#1e0810';
        ctx.beginPath(); ctx.arc(0, -sz * 0.76, sz * 0.24, 0, Math.PI * 2); ctx.fill();
        // Compound eyes
        ctx.fillStyle = '#ff8860';
        ctx.beginPath(); ctx.arc(-sz * 0.12, -sz * 0.78, sz * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc( sz * 0.12, -sz * 0.78, sz * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0a0406';
        ctx.beginPath(); ctx.arc(-sz * 0.12, -sz * 0.78, sz * 0.04, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc( sz * 0.12, -sz * 0.78, sz * 0.04, 0, Math.PI * 2); ctx.fill();
        // Antennae
        ctx.strokeStyle = '#b03050'; ctx.lineWidth = sz * 0.06;
        ctx.beginPath(); ctx.moveTo(-sz * 0.08, -sz * 0.95); ctx.quadraticCurveTo(-sz * 0.3, -sz * 1.2, -sz * 0.18, -sz * 1.38); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( sz * 0.08, -sz * 0.95); ctx.quadraticCurveTo( sz * 0.3, -sz * 1.2,  sz * 0.18, -sz * 1.38); ctx.stroke();
      }

      // ── BRUTE: massive armored beetle-wasp ───────────────────────────────────
      else if (enemy.kind === 'brute') {
        // Heavy aura
        const aura = ctx.createRadialGradient(0, 0, sz * 0.5, 0, 0, sz * 1.8);
        aura.addColorStop(0, 'rgba(160, 30, 50, 0.22)'); aura.addColorStop(1, 'rgba(160,30,50,0)');
        ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(0, 0, sz * 1.8, 0, Math.PI * 2); ctx.fill();

        // 4 thick armored legs
        ctx.strokeStyle = '#180a0e'; ctx.lineWidth = sz * 0.18;
        for (let side = -1; side <= 1; side += 2) {
          for (let li = 0; li < 2; li++) {
            const baseY = (li - 0.5) * sz * 0.7;
            const swing = Math.sin(wp + li * 1.8 + (side > 0 ? Math.PI : 0)) * sz * 0.20;
            ctx.beginPath();
            ctx.moveTo(side * sz * 0.56, baseY);
            ctx.quadraticCurveTo(side * (sz + Math.abs(swing) * 0.5), baseY + swing,
                                  side * (sz * 1.24), baseY + swing + sz * 0.28);
            ctx.stroke();
          }
        }

        // Shell / elytra
        const shellGrad = ctx.createRadialGradient(-sz * 0.3, -sz * 0.4, sz * 0.2, 0, 0, sz * 1.1);
        shellGrad.addColorStop(0, '#d0304c'); shellGrad.addColorStop(0.55, '#7e1828'); shellGrad.addColorStop(1, '#280810');
        ctx.fillStyle = shellGrad;
        ctx.beginPath(); ctx.ellipse(0, 0, sz * 1.0, sz * 0.78, 0, 0, Math.PI * 2); ctx.fill();
        // Shell seam line
        ctx.strokeStyle = 'rgba(10, 4, 6, 0.85)'; ctx.lineWidth = sz * 0.08;
        ctx.beginPath(); ctx.moveTo(0, -sz * 0.75); ctx.lineTo(0, sz * 0.75); ctx.stroke();
        // Armor ribs
        for (let r = -2; r <= 2; r++) {
          ctx.strokeStyle = 'rgba(10, 4, 6, 0.45)'; ctx.lineWidth = sz * 0.06;
          ctx.beginPath();
          ctx.ellipse(0, r * sz * 0.22, sz * 0.95, sz * 0.12, 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Head with horns
        const headGrad = ctx.createRadialGradient(-sz * 0.14, -sz * 0.98, sz * 0.06, 0, -sz * 1.0, sz * 0.38);
        headGrad.addColorStop(0, '#c02840'); headGrad.addColorStop(1, '#220a12');
        ctx.fillStyle = headGrad;
        ctx.beginPath(); ctx.arc(0, -sz * 1.0, sz * 0.35, 0, Math.PI * 2); ctx.fill();
        // Horns
        ctx.strokeStyle = '#8c1e30'; ctx.lineWidth = sz * 0.10;
        ctx.beginPath(); ctx.moveTo(-sz * 0.16, -sz * 1.28); ctx.lineTo(-sz * 0.40, -sz * 1.65); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( sz * 0.16, -sz * 1.28); ctx.lineTo( sz * 0.40, -sz * 1.65); ctx.stroke();
        // Eyes (glowing red)
        const eyeGrad = ctx.createRadialGradient(-sz * 0.15, -sz * 1.02, 0, -sz * 0.15, -sz * 1.02, sz * 0.13);
        eyeGrad.addColorStop(0, '#ff4060'); eyeGrad.addColorStop(1, '#800010');
        ctx.fillStyle = eyeGrad;
        ctx.beginPath(); ctx.arc(-sz * 0.15, -sz * 1.02, sz * 0.12, 0, Math.PI * 2); ctx.fill();
        const eyeGrad2 = ctx.createRadialGradient( sz * 0.15, -sz * 1.02, 0,  sz * 0.15, -sz * 1.02, sz * 0.13);
        eyeGrad2.addColorStop(0, '#ff4060'); eyeGrad2.addColorStop(1, '#800010');
        ctx.fillStyle = eyeGrad2;
        ctx.beginPath(); ctx.arc( sz * 0.15, -sz * 1.02, sz * 0.12, 0, Math.PI * 2); ctx.fill();
      }

      // ── HORNET: fast aerial predator with vibrant yellow-black banding ───────
      else if (enemy.kind === 'hornet') {
        const flap2 = Math.sin(wp * 4.6) * 0.50;
        // Large translucent wings
        ctx.save();
        const wg1 = ctx.createLinearGradient(-sz * 0.8, -sz * 0.5, sz * 0.2, sz * 0.1);
        wg1.addColorStop(0, 'rgba(255, 220, 100, 0.48)'); wg1.addColorStop(1, 'rgba(200, 140, 40, 0.14)');
        ctx.fillStyle = wg1;
        ctx.beginPath(); ctx.ellipse(-sz * 0.42, -sz * 0.38, sz * 0.72, sz * 0.22, -0.62 + flap2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( sz * 0.24, -sz * 0.34, sz * 0.68, sz * 0.20,  0.54 - flap2, 0, Math.PI * 2); ctx.fill();
        // Hind wings
        ctx.globalAlpha = 0.50;
        ctx.beginPath(); ctx.ellipse(-sz * 0.24, -sz * 0.18, sz * 0.38, sz * 0.12, -0.45 + flap2 * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( sz * 0.16, -sz * 0.16, sz * 0.34, sz * 0.11,  0.40 - flap2 * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1; ctx.restore();

        // Abdomen – yellow-black banding
        const bandColors = ['#f4c430', '#1a1000', '#e8b020', '#1a1000', '#cc9010'];
        const bandH = sz * 0.24;
        for (let bi = 0; bi < bandColors.length; bi++) {
          const by3 = -sz * 0.52 + bi * bandH * 0.9;
          ctx.fillStyle = bandColors[bi];
          ctx.beginPath();
          ctx.ellipse(0, by3 + bandH * 0.45, sz * (0.42 - bi * 0.04), bandH * 0.52, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        // Stinger
        const stingerY = -sz * 0.52 + 5 * bandH * 0.9 + bandH * 0.9;
        ctx.fillStyle = '#888';
        ctx.beginPath();
        ctx.moveTo(-sz * 0.05, stingerY - sz * 0.04);
        ctx.lineTo( sz * 0.05, stingerY - sz * 0.04);
        ctx.lineTo(0, stingerY + sz * 0.22);
        ctx.closePath(); ctx.fill();

        // Thorax
        const thGrad = ctx.createRadialGradient(-sz * 0.12, -sz * 0.68, sz * 0.06, 0, -sz * 0.72, sz * 0.34);
        thGrad.addColorStop(0, '#f0b010'); thGrad.addColorStop(1, '#1c1000');
        ctx.fillStyle = thGrad;
        ctx.beginPath(); ctx.ellipse(0, -sz * 0.72, sz * 0.32, sz * 0.26, 0, 0, Math.PI * 2); ctx.fill();

        // Head
        ctx.fillStyle = '#0e0a00';
        ctx.beginPath(); ctx.arc(0, -sz * 1.06, sz * 0.22, 0, Math.PI * 2); ctx.fill();
        // Compound eyes (bright yellow-green)
        const egH = ctx.createRadialGradient(-sz * 0.13, -sz * 1.08, 0, -sz * 0.13, -sz * 1.08, sz * 0.10);
        egH.addColorStop(0, '#c8ff40'); egH.addColorStop(1, '#405000');
        ctx.fillStyle = egH;
        ctx.beginPath(); ctx.arc(-sz * 0.13, -sz * 1.08, sz * 0.10, 0, Math.PI * 2); ctx.fill();
        const egH2 = ctx.createRadialGradient( sz * 0.13, -sz * 1.08, 0,  sz * 0.13, -sz * 1.08, sz * 0.10);
        egH2.addColorStop(0, '#c8ff40'); egH2.addColorStop(1, '#405000');
        ctx.fillStyle = egH2;
        ctx.beginPath(); ctx.arc( sz * 0.13, -sz * 1.08, sz * 0.10, 0, Math.PI * 2); ctx.fill();
        // Antennae
        ctx.strokeStyle = '#c8a010'; ctx.lineWidth = sz * 0.055;
        ctx.beginPath(); ctx.moveTo(-sz * 0.07, -sz * 1.22); ctx.quadraticCurveTo(-sz * 0.26, -sz * 1.45, -sz * 0.16, -sz * 1.62); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( sz * 0.07, -sz * 1.22); ctx.quadraticCurveTo( sz * 0.26, -sz * 1.45,  sz * 0.16, -sz * 1.62); ctx.stroke();
      }
      else if (enemy.kind === 'spider') {
        const aura = ctx.createRadialGradient(0, 0, sz * 0.4, 0, 0, sz * 1.7);
        aura.addColorStop(0, 'rgba(128, 40, 200, 0.22)');
        aura.addColorStop(1, 'rgba(128, 40, 200, 0)');
        ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(0, 0, sz * 1.7, 0, Math.PI * 2); ctx.fill();

        ctx.strokeStyle = '#12051a'; ctx.lineWidth = sz * 0.12;
        for (let side = -1; side <= 1; side += 2) {
          for (let li = 0; li < 4; li++) {
            const swing = Math.sin(wp * 1.4 + li * 1.6 + (side > 0 ? Math.PI : 0)) * sz * 0.32;
            const targetX = side * (sz * 1.25 + Math.abs(swing) * 0.2);
            const targetY = (li - 1.5) * sz * 0.46 + swing;
            ctx.beginPath();
            ctx.moveTo(side * sz * 0.4, (li - 1.5) * sz * 0.3);
            ctx.quadraticCurveTo(side * sz * 0.95, (li - 1.5) * sz * 0.6 + swing * 0.5, targetX, targetY);
            ctx.stroke();
          }
        }

        const abdGrad = ctx.createRadialGradient(-sz * 0.2, sz * 0.2, sz * 0.1, 0, sz * 0.2, sz * 0.9);
        abdGrad.addColorStop(0, '#3e1a6b'); abdGrad.addColorStop(0.7, '#1b0533'); abdGrad.addColorStop(1, '#0b001a');
        ctx.fillStyle = abdGrad;
        ctx.beginPath(); ctx.ellipse(0, sz * 0.25, sz * 0.72, sz * 0.88, 0, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = '#dfa8ff';
        ctx.beginPath(); ctx.ellipse(0, sz * 0.25, sz * 0.12, sz * 0.48, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(0, sz * 0.25, sz * 0.42, sz * 0.12, 0, 0, Math.PI * 2); ctx.fill();

        const cephGrad = ctx.createRadialGradient(-sz * 0.1, -sz * 0.4, sz * 0.05, 0, -sz * 0.45, sz * 0.45);
        cephGrad.addColorStop(0, '#5e2e9b'); cephGrad.addColorStop(1, '#1b0533');
        ctx.fillStyle = cephGrad;
        ctx.beginPath(); ctx.ellipse(0, -sz * 0.45, sz * 0.48, sz * 0.42, 0, 0, Math.PI * 2); ctx.fill();

        ctx.strokeStyle = '#dfa8ff'; ctx.lineWidth = sz * 0.11;
        ctx.beginPath(); ctx.moveTo(-sz * 0.14, -sz * 0.88); ctx.quadraticCurveTo(-sz * 0.22, -sz * 1.1, -sz * 0.05, -sz * 1.25); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( sz * 0.14, -sz * 0.88); ctx.quadraticCurveTo( sz * 0.22, -sz * 1.1,  sz * 0.05, -sz * 1.25); ctx.stroke();

        ctx.fillStyle = '#ff3344';
        const eyeX = [-0.18, -0.06, 0.06, 0.18, -0.12, 0.12, -0.04, 0.04];
        const eyeY = [-0.78, -0.80, -0.80, -0.78, -0.74, -0.74, -0.70, -0.70];
        for (let eIdx = 0; eIdx < 8; eIdx++) {
          ctx.beginPath();
          ctx.arc(sz * eyeX[eIdx], -sz * 0.45 + sz * eyeY[eIdx], sz * 0.038, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      else if (enemy.kind === 'firefly') {
        const glowPulse = 0.65 + Math.sin(enemy.bodyPulse * 2.2) * 0.35;
        const wingFlap = Math.sin(wp * 5.5) * 0.55;

        // Bioluminescent glow aura
        const glowAura = ctx.createRadialGradient(0, 0, sz * 0.2, 0, 0, sz * 2.8);
        glowAura.addColorStop(0, `rgba(120, 255, 180, ${0.28 * glowPulse})`);
        glowAura.addColorStop(0.4, `rgba(80, 220, 160, ${0.14 * glowPulse})`);
        glowAura.addColorStop(1, 'rgba(40, 180, 120, 0)');
        ctx.fillStyle = glowAura;
        ctx.beginPath();
        ctx.arc(0, 0, sz * 2.8, 0, Math.PI * 2);
        ctx.fill();

        // Translucent wings with green tint
        ctx.save();
        const wingGrad = ctx.createLinearGradient(0, -sz * 0.5, 0, sz * 0.1);
        wingGrad.addColorStop(0, `rgba(160, 255, 200, ${0.42 * glowPulse})`);
        wingGrad.addColorStop(1, `rgba(80, 200, 140, ${0.12 * glowPulse})`);
        ctx.fillStyle = wingGrad;
        ctx.beginPath();
        ctx.ellipse(-sz * 0.35, -sz * 0.35, sz * 0.65, sz * 0.22, -0.72 + wingFlap, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sz * 0.25, -sz * 0.32, sz * 0.62, sz * 0.20, 0.68 - wingFlap, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Body segments – 3 glowing sections
        const segColors = ['#88ffaa', '#55dd88', '#33bb66'];
        const segLens = [0.38, 0.34, 0.26];
        let sy2 = -sz * 0.48;
        for (let s = 0; s < 3; s++) {
          const sgGrad = ctx.createRadialGradient(-sz * 0.1, sy2, 0, 0, sy2 + sz * segLens[s] * 0.5, sz * (0.28 - s * 0.04));
          sgGrad.addColorStop(0, segColors[s]);
          sgGrad.addColorStop(1, '#114422');
          ctx.fillStyle = sgGrad;
          ctx.beginPath();
          ctx.ellipse(0, sy2 + sz * segLens[s] * 0.5, sz * (0.28 - s * 0.04), sz * segLens[s] * 0.48, 0, 0, Math.PI * 2);
          ctx.fill();
          // Glow overlay on segments
          ctx.fillStyle = `rgba(150, 255, 190, ${0.25 * glowPulse})`;
          ctx.beginPath();
          ctx.ellipse(0, sy2 + sz * segLens[s] * 0.5, sz * (0.18 - s * 0.03), sz * segLens[s] * 0.28, 0, 0, Math.PI * 2);
          ctx.fill();
          sy2 += sz * segLens[s] * 0.85;
        }

        // Head
        const headGrad = ctx.createRadialGradient(-sz * 0.12, -sz * 0.82, 0, 0, -sz * 0.82, sz * 0.22);
        headGrad.addColorStop(0, '#aaffcc');
        headGrad.addColorStop(1, '#226644');
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.arc(0, -sz * 0.82, sz * 0.22, 0, Math.PI * 2);
        ctx.fill();

        // Glowing compound eyes
        const eyeGlow = `rgba(180, 255, 220, ${0.9 * glowPulse})`;
        ctx.fillStyle = eyeGlow;
        ctx.beginPath();
        ctx.ellipse(-sz * 0.12, -sz * 0.84, sz * 0.09, sz * 0.11, -0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sz * 0.12, -sz * 0.84, sz * 0.09, sz * 0.11, 0.15, 0, Math.PI * 2);
        ctx.fill();

        // Eye pupils (dark)
        ctx.fillStyle = '#0a2218';
        ctx.beginPath();
        ctx.arc(-sz * 0.12, -sz * 0.84, sz * 0.04, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sz * 0.12, -sz * 0.84, sz * 0.04, 0, Math.PI * 2);
        ctx.fill();

        // Antennae with glow tips
        ctx.strokeStyle = '#44aa66';
        ctx.lineWidth = sz * 0.055;
        ctx.beginPath();
        ctx.moveTo(-sz * 0.08, -sz * 1.0);
        ctx.quadraticCurveTo(-sz * 0.28, -sz * 1.28 + antWave * 0.3, -sz * 0.18, -sz * 1.48 + antWave);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sz * 0.08, -sz * 1.0);
        ctx.quadraticCurveTo(sz * 0.28, -sz * 1.28 + antWave * 0.3, sz * 0.18, -sz * 1.48 + antWave * 0.8);
        ctx.stroke();

        // Glowing antenna tips
        ctx.fillStyle = `rgba(160, 255, 200, ${glowPulse})`;
        ctx.beginPath();
        ctx.arc(-sz * 0.18, -sz * 1.48 + antWave, sz * 0.035, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sz * 0.18, -sz * 1.48 + antWave * 0.8, sz * 0.035, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      // ── HP bar ────────────────────────────────────────────────────────────────
      const hpRatio = Math.max(0, enemy.hp / enemy.maxHp);
      const barW = Math.max(28, sz * 2.8);
      const barX = enemy.x - barW / 2;
      const barY = enemy.y - sz * 1.7 - 6;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.roundRect(barX, barY, barW, 5, 2); ctx.fill();
      const hpColor = hpRatio > 0.55 ? '#44ee66' : hpRatio > 0.28 ? '#ffcc22' : '#ff3344';
      ctx.fillStyle = hpColor;
      ctx.beginPath(); ctx.roundRect(barX, barY, barW * hpRatio, 5, 2); ctx.fill();
      // Kind label
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = `bold ${Math.max(7, sz * 0.62)}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.fillText(enemy.kind.toUpperCase(), enemy.x, barY - 2);
      ctx.textAlign = 'left';
    }

    function drawRewardIcon(x, y, spin = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(spin);
      const core = ctx.createRadialGradient(-1, -1, 1, 0, 0, 8);
      core.addColorStop(0, '#ffeaa8');
      core.addColorStop(0.7, '#f5c84b');
      core.addColorStop(1, '#cc9830');
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1a1f2b';
      ctx.lineWidth = 1.35;
      for (let i = -2; i <= 2; i += 2) {
        ctx.beginPath();
        ctx.moveTo(i - 1, -5.4);
        ctx.lineTo(i + 1, 5.4);
        ctx.stroke();
      }
      ctx.fillStyle = '#0f131c';
      ctx.beginPath();
      ctx.arc(-4.2, 0.4, 1.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawColonySystems() {
      for (const d of rewardDrops) {
        d.iconSpin += 0.03;
        drawRewardIcon(d.x, d.y - 3, d.iconSpin * 0.18);
      }
      for (const e of enemies) drawEnemy(e);

      for (const b of offensiveBees) {
        const style = getSpecies(b.role, b.speciesId || colony.species[b.role]).color;
        drawRoleBee(b, style, 'rgba(255, 192, 192, 0.52)');
      }
      for (const b of workerBeesUnits) {
        const style = getSpecies(b.role, b.speciesId || colony.species[b.role]).color;
        drawRoleBee(b, style, 'rgba(255, 241, 202, 0.50)');
        if (b.cargo) drawRewardIcon(b.x + 6, b.y - 7, 0.15);
      }
      for (const b of pollinatorBees) {
        const style = getSpecies(b.role, b.speciesId || colony.species[b.role]).color;
        drawRoleBee(b, style, 'rgba(200, 218, 255, 0.55)');
        if (b.cargo && b.cargo.pollen > 0) {
          ctx.fillStyle = 'rgba(255, 220, 120, 0.85)';
          ctx.beginPath();
          ctx.arc(b.x + 7, b.y - 4, 2.3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawSovereignBee(x, y, isOffscreen = false) {
      const t = performance.now();
      const bob = player.bob;
      const speedPulse = Math.min(1, Math.hypot(player.vx, player.vy) / (player.speed + 1));
      const isMoving = speedPulse > 0.05;

      // Direction: flip to face movement. Persist last direction when idle.
      if (Math.abs(player.vx) > 8) player._facingRight = player.vx > 0;
      const facing = player._facingRight ? -1 : 1; // -1 = right (flipped), 1 = left (default)

      // If PIXI is enabled and we are drawing on the main canvas (not offscreen),
      // we only draw the shadow and speed-dust aura, then return early.
      if (BeeFx.enabled && !isOffscreen) {
        // Ground shadow
        ctx.save();
        ctx.fillStyle = `rgba(12, 8, 4, ${0.14 + speedPulse * 0.18})`;
        ctx.beginPath();
        ctx.ellipse(x, y + 26, 22 + speedPulse * 6, 6 + speedPulse * 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Speed-dust aura
        if (speedPulse > 0.35) {
          const lift = Math.sin(bob * 0.72) * 2.2;
          const dustA = (speedPulse - 0.35) * 0.55;
          const dustR = 28 + speedPulse * 14;
          const dustG = ctx.createRadialGradient(x, y, 2, x, y, dustR);
          dustG.addColorStop(0, `rgba(255, 215, 80, ${dustA * 0.55})`);
          dustG.addColorStop(1, 'rgba(255, 160, 30, 0)');
          ctx.fillStyle = dustG;
          ctx.beginPath();
          ctx.ellipse(x, y + lift, dustR, dustR * 0.7, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        return;
      }

      // Vertical pitch: tilt nose up/down based on vy
      const pitchTilt = Math.max(-0.28, Math.min(0.28, player.vy / 540));

      // Hover bob: vertical float + gentle roll
      const lift    = Math.sin(bob * 0.72) * 2.2;
      const roll    = Math.sin(bob * 0.38) * 0.04 * (1 - speedPulse * 0.5);

      // Wing flap – faster when moving
      const flapSpeed = 2.8 + speedPulse * 3.4;
      const flapTop   = Math.sin(bob * flapSpeed) * 0.42;
      const flapBotL  = Math.sin(bob * flapSpeed + 0.9) * 0.28;
      const flapBotR  = Math.sin(bob * flapSpeed + 0.6) * 0.28;

      // Draw shadow and dust ONLY when not offscreen
      if (!isOffscreen) {
        // ── Ground shadow ──────────────────────────────────────────────────────
        ctx.save();
        ctx.fillStyle = `rgba(12, 8, 4, ${0.14 + speedPulse * 0.18})`;
        ctx.beginPath();
        ctx.ellipse(x, y + 26, 22 + speedPulse * 6, 6 + speedPulse * 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // ── Speed-dust aura ────────────────────────────────────────────────────
        if (speedPulse > 0.35) {
          const dustA = (speedPulse - 0.35) * 0.55;
          const dustR = 28 + speedPulse * 14;
          const dustG = ctx.createRadialGradient(x, y, 2, x, y, dustR);
          dustG.addColorStop(0, `rgba(255, 215, 80, ${dustA * 0.55})`);
          dustG.addColorStop(1, 'rgba(255, 160, 30, 0)');
          ctx.fillStyle = dustG;
          ctx.beginPath();
          ctx.ellipse(x, y + lift, dustR, dustR * 0.7, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.save();
      ctx.translate(x, y + lift);
      ctx.rotate(roll + pitchTilt * 0.5);
      ctx.scale(facing, 1); // flip horizontally to face direction

      // ─────────────────────────────────────────────────────────────────────
      // LOWER WINGS (drawn behind body)
      // ─────────────────────────────────────────────────────────────────────
      const wingLoGrad = (ox, oy) => {
        const g = ctx.createRadialGradient(ox, oy, 2, ox, oy, 14);
        g.addColorStop(0, 'rgba(210, 245, 255, 0.55)');
        g.addColorStop(1, 'rgba(140, 200, 240, 0.08)');
        return g;
      };
      ctx.strokeStyle = 'rgba(180, 220, 255, 0.30)';
      ctx.lineWidth = 0.8;

      // Lower-left wing
      ctx.fillStyle = wingLoGrad(-10, 6);
      ctx.beginPath();
      ctx.ellipse(-10, 6, 13, 5.5, -0.65 + flapBotL, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // Lower-right wing
      ctx.fillStyle = wingLoGrad(10, 6);
      ctx.beginPath();
      ctx.ellipse(10, 6, 13, 5.5, 0.65 - flapBotR, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // ─────────────────────────────────────────────────────────────────────
      // UPPER WINGS (iridescent, larger, double-layered)
      // ─────────────────────────────────────────────────────────────────────
      const iridShift = Math.sin(t * 0.0018) * 0.15;
      const makeWingGrad = (ox, oy, side) => {
        const g = ctx.createRadialGradient(ox * 0.4, oy * 0.4, 1, ox, oy, 22);
        g.addColorStop(0,   `rgba(230, 250, 255, 0.86)`);
        g.addColorStop(0.35,`rgba(${side > 0 ? 170 : 190}, 220, 255, 0.62)`);
        g.addColorStop(0.7, `rgba(140, 180, 255, ${0.28 + iridShift})`);
        g.addColorStop(1,   'rgba(100, 140, 240, 0.05)');
        return g;
      };

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.38)';
      ctx.lineWidth = 1.1;

      // Upper-left back wing (smaller, offset)
      ctx.fillStyle = makeWingGrad(-10, -16, -1);
      ctx.beginPath();
      ctx.ellipse(-12, -15, 15, 6.5, -0.98 + flapTop * 0.8, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // Upper-left main wing
      ctx.fillStyle = makeWingGrad(-14, -14, -1);
      ctx.beginPath();
      ctx.ellipse(-15, -13, 20, 8.5, -0.78 + flapTop, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // Wing venation left
      ctx.strokeStyle = 'rgba(180, 220, 255, 0.22)';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(-6, -10);
      ctx.quadraticCurveTo(-18, -16, -30, -13);
      ctx.moveTo(-8, -8);
      ctx.quadraticCurveTo(-18, -9, -28, -7);
      ctx.stroke();

      // Upper-right back wing (smaller, offset)
      ctx.fillStyle = makeWingGrad(10, -16, 1);
      ctx.beginPath();
      ctx.ellipse(12, -15, 15, 6.5, 0.98 - flapTop * 0.8, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // Upper-right main wing
      ctx.fillStyle = makeWingGrad(14, -14, 1);
      ctx.beginPath();
      ctx.ellipse(15, -13, 20, 8.5, 0.78 - flapTop, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();

      // Wing venation right
      ctx.strokeStyle = 'rgba(180, 220, 255, 0.22)';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(6, -10);
      ctx.quadraticCurveTo(18, -16, 30, -13);
      ctx.moveTo(8, -8);
      ctx.quadraticCurveTo(18, -9, 28, -7);
      ctx.stroke();

      // ─────────────────────────────────────────────────────────────────────
      // ABDOMEN (stinger tip)
      // ─────────────────────────────────────────────────────────────────────
      const stingerWag = Math.sin(bob * 1.8) * 1.6 * speedPulse;
      const stingGrad = ctx.createLinearGradient(16, 0, 34, 0);
      stingGrad.addColorStop(0, '#2a2420');
      stingGrad.addColorStop(0.6, '#1a1510');
      stingGrad.addColorStop(1, '#0d0a07');
      ctx.fillStyle = stingGrad;
      ctx.beginPath();
      ctx.moveTo(18, -3.5);
      ctx.quadraticCurveTo(28, -4 + stingerWag, 34, stingerWag * 0.5);
      ctx.quadraticCurveTo(28, 4 + stingerWag, 18, 3.5);
      ctx.closePath();
      ctx.fill();

      // ─────────────────────────────────────────────────────────────────────
      // BODY
      // ─────────────────────────────────────────────────────────────────────
      // Outer body shell
      const bodyGrad = ctx.createLinearGradient(-18, -13, 20, 13);
      bodyGrad.addColorStop(0,    '#ffe98a');
      bodyGrad.addColorStop(0.28, '#f9ce40');
      bodyGrad.addColorStop(0.62, '#e8a818');
      bodyGrad.addColorStop(1,    '#b87010');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(2, 0, 20, 13, 0.04, 0, Math.PI * 2);
      ctx.fill();

      // Body outline
      ctx.strokeStyle = '#251e0f';
      ctx.lineWidth = 1.8;
      ctx.stroke();

      // Body top specular
      const specGrad = ctx.createLinearGradient(-14, -11, 10, -3);
      specGrad.addColorStop(0, 'rgba(255, 255, 220, 0.42)');
      specGrad.addColorStop(1, 'rgba(255, 255, 220, 0)');
      ctx.fillStyle = specGrad;
      ctx.beginPath();
      ctx.ellipse(-2, -5, 14, 6, 0.1, 0, Math.PI * 2);
      ctx.fill();

      // Stripes (4 bands)
      ctx.strokeStyle = 'rgba(28, 20, 8, 0.82)';
      ctx.lineWidth = 2.1;
      [-8, 0, 7, 14].forEach(sx => {
        ctx.beginPath();
        ctx.moveTo(sx, -Math.sqrt(Math.max(0, 169 - (sx - 2) ** 2)) * 0.9 + 0.5);
        ctx.lineTo(sx + 1,  Math.sqrt(Math.max(0, 169 - (sx - 2) ** 2)) * 0.9 - 0.5);
        ctx.stroke();
      });

      // Hairy texture hint (fine lines on sides)
      ctx.strokeStyle = 'rgba(255, 210, 100, 0.18)';
      ctx.lineWidth = 0.7;
      for (let h = -3; h <= 3; h += 3) {
        ctx.beginPath();
        ctx.moveTo(-18, h);
        ctx.lineTo(-22, h - 1);
        ctx.moveTo(18, h);
        ctx.lineTo(22, h - 1);
        ctx.stroke();
      }

      // ─────────────────────────────────────────────────────────────────────
      // THORACIC FLUFF COLLAR (fuzzy royal collar)
      // ─────────────────────────────────────────────────────────────────────
      ctx.fillStyle = '#f5f0e6';
      ctx.strokeStyle = '#dcd6ca';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(-11, -5, 4.8, 0, Math.PI * 2);
      ctx.arc(-9, 0, 5.6, 0, Math.PI * 2);
      ctx.arc(-11, 5, 4.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(-10.5, -4, 3.2, 0, Math.PI * 2);
      ctx.arc(-9.2, 0, 3.8, 0, Math.PI * 2);
      ctx.arc(-10.5, 4, 3.2, 0, Math.PI * 2);
      ctx.fill();

      // ─────────────────────────────────────────────────────────────────────
      // HEAD
      // ─────────────────────────────────────────────────────────────────────
      const headGrad = ctx.createRadialGradient(-18, -3, 1.5, -16, -1, 11);
      headGrad.addColorStop(0, '#46423e');
      headGrad.addColorStop(0.6, '#2c2824');
      headGrad.addColorStop(1, '#141210');
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.arc(-17, 0, 9.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#1a1612';
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // Head sheen
      ctx.fillStyle = 'rgba(255, 240, 200, 0.12)';
      ctx.beginPath();
      ctx.ellipse(-20, -4, 5, 3, -0.5, 0, Math.PI * 2);
      ctx.fill();

      // Compound eyes – faceted look
      // Eye 1
      const eye1G = ctx.createRadialGradient(-22, -2, 0.5, -22, -2, 4.2);
      eye1G.addColorStop(0, '#4af0ff');
      eye1G.addColorStop(0.45, '#12b8d8');
      eye1G.addColorStop(1, '#061820');
      ctx.fillStyle = eye1G;
      ctx.beginPath();
      ctx.ellipse(-22, -2, 4.2, 4.8, -0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0, 180, 220, 0.5)';
      ctx.lineWidth = 0.7;
      ctx.stroke();

      // Eye 2 (smaller, slightly behind)
      const eye2G = ctx.createRadialGradient(-15, -2, 0.4, -15, -2, 3.4);
      eye2G.addColorStop(0, '#35e8ff');
      eye2G.addColorStop(0.5, '#0fa8c8');
      eye2G.addColorStop(1, '#061820');
      ctx.fillStyle = eye2G;
      ctx.beginPath();
      ctx.ellipse(-15, -2, 3.4, 4, 0.1, 0, Math.PI * 2);
      ctx.fill();

      // Eye highlights
      ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
      ctx.beginPath();
      ctx.arc(-23.2, -3.5, 1.3, 0, Math.PI * 2);
      ctx.arc(-16.0, -3.4, 1.1, 0, Math.PI * 2);
      ctx.fill();

      // ─────────────────────────────────────────────────────────────────────
      // ANTENNAS (animated)
      // ─────────────────────────────────────────────────────────────────────
      const antWave = Math.sin(bob * 1.9) * 2.2 * (0.4 + speedPulse * 0.6);
      ctx.strokeStyle = '#201c18';
      ctx.lineWidth = 1.4;
      ctx.lineCap = 'round';

      // Antenna 1
      ctx.beginPath();
      ctx.moveTo(-22, -7);
      ctx.quadraticCurveTo(-29, -17 + antWave * 0.4, -32, -22 + antWave);
      ctx.stroke();

      // Antenna 2
      ctx.beginPath();
      ctx.moveTo(-14, -8);
      ctx.quadraticCurveTo(-14, -17 + antWave * 0.3, -11, -22 + antWave * 0.8);
      ctx.stroke();

      // Antenna tips (glowing)
      const tipGlow = 0.8 + Math.sin(bob * 2.4) * 0.15;
      ctx.fillStyle = `rgba(90, 235, 255, ${tipGlow})`;
      ctx.beginPath();
      ctx.arc(-32, -22 + antWave, 2.4, 0, Math.PI * 2);
      ctx.arc(-11, -22 + antWave * 0.8, 2.1, 0, Math.PI * 2);
      ctx.fill();
      // Tip outer glow
      const tipAuraG = ctx.createRadialGradient(-32, -22 + antWave, 0, -32, -22 + antWave, 7);
      tipAuraG.addColorStop(0, `rgba(80, 230, 255, ${tipGlow * 0.38})`);
      tipAuraG.addColorStop(1, 'rgba(80, 230, 255, 0)');
      ctx.fillStyle = tipAuraG;
      ctx.beginPath();
      ctx.arc(-32, -22 + antWave, 7, 0, Math.PI * 2);
      ctx.fill();

      // ─────────────────────────────────────────────────────────────────────
      // CROWN (shadowed & detailed)
      // ─────────────────────────────────────────────────────────────────────
      ctx.save();
      ctx.shadowColor = 'rgba(0, 0, 0, 0.32)';
      ctx.shadowBlur = 3.8;
      ctx.shadowOffsetY = 1.8;

      // Crown base band
      const bandGrad = ctx.createLinearGradient(-10, -14, 10, -11);
      bandGrad.addColorStop(0, '#d4a020');
      bandGrad.addColorStop(0.5, '#f8d050');
      bandGrad.addColorStop(1, '#c08818');
      ctx.fillStyle = bandGrad;
      ctx.beginPath();
      ctx.roundRect(-10, -14, 20, 5, 2);
      ctx.fill();

      // Crown spikes
      const crownGrad = ctx.createLinearGradient(-10, -28, 10, -13);
      crownGrad.addColorStop(0, '#fff4b0');
      crownGrad.addColorStop(0.45, '#f8d040');
      crownGrad.addColorStop(1, '#c88c18');
      ctx.fillStyle = crownGrad;
      ctx.beginPath();
      ctx.moveTo(-10, -13);
      ctx.lineTo(-8, -21);
      ctx.lineTo(-4.5, -16);
      ctx.lineTo(0, -27);
      ctx.lineTo(4.5, -16);
      ctx.lineTo(8, -21);
      ctx.lineTo(10, -13);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#a87010';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore(); // remove shadow for sharp gems

      // Crown gems
      const gemColors = [
        { x: -8, y: -20, r: 1.8, c: '#ff80e0' },
        { x:  0, y: -26, r: 2.2, c: '#7cf2ff' },
        { x:  8, y: -20, r: 1.8, c: '#ff80e0' },
      ];
      for (const g of gemColors) {
        const gg = ctx.createRadialGradient(g.x - 0.5, g.y - 0.5, 0, g.x, g.y, g.r * 1.6);
        gg.addColorStop(0, '#ffffff');
        gg.addColorStop(0.35, g.c);
        gg.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = gg;
        ctx.beginPath();
        ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
        ctx.fill();
        // Gem glow
        ctx.fillStyle = g.c.replace(')', ', 0.25)').replace('rgb', 'rgba').replace('#', 'rgba(').replace(/,/,'');
        const gglow = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, 6);
        gglow.addColorStop(0, g.c + '60');
        gglow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gglow;
        ctx.beginPath();
        ctx.arc(g.x, g.y, 6, 0, Math.PI * 2);
        ctx.fill();
      }

      // ─────────────────────────────────────────────────────────────────────
      // MOTION TRAIL (speed streak behind body)
      // ─────────────────────────────────────────────────────────────────────
      if (speedPulse > 0.12) {
        const trailLen = 10 + speedPulse * 22;
        const trailA   = speedPulse * 0.38;
        const trailWave = Math.sin(bob * 1.4) * 1.8;

        const trailG = ctx.createLinearGradient(0, 0, -trailLen, 0);
        trailG.addColorStop(0, `rgba(120, 230, 255, ${trailA})`);
        trailG.addColorStop(0.6, `rgba(90, 200, 255, ${trailA * 0.4})`);
        trailG.addColorStop(1, 'rgba(60, 160, 255, 0)');
        ctx.strokeStyle = trailG;
        ctx.lineWidth = 2.8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, trailWave);
        ctx.quadraticCurveTo(-trailLen * 0.55, trailWave * 0.5, -trailLen, 0);
        ctx.stroke();

        // Second thinner streak
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(2, -3 + trailWave);
        ctx.quadraticCurveTo(-trailLen * 0.45, -2 + trailWave * 0.3, -trailLen * 0.8, -1);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawOrchidFlower(f) {
      const t = performance.now();
      const sway = Math.sin((f.x * 0.013 + t * 0.00048)) * 0.18;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(sway);

      // Stem with gentle curve
      ctx.strokeStyle = '#2e7a3c';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(0, f.radius * 0.7);
      ctx.quadraticCurveTo(sway * 6, f.radius * 0.2, 0, -f.radius * 0.18);
      ctx.stroke();

      // Outer petals (5) – dark purple base layer for depth
      const petals = 5;
      for (let i = 0; i < petals; i++) {
        const a = (Math.PI * 2 / petals) * i - Math.PI * 0.5;
        const dist = f.radius * 0.58;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const pg = ctx.createRadialGradient(px * 0.3, py * 0.3, 0, px, py, f.radius * 0.80);
        pg.addColorStop(0, '#c9b8ff');
        pg.addColorStop(0.55, '#8b68e8');
        pg.addColorStop(1, '#4a2db0');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.58, f.radius * 0.32, a, 0, Math.PI * 2);
        ctx.fill();
      }

      // Inner petals (5) – lighter, slightly rotated
      for (let i = 0; i < petals; i++) {
        const a = (Math.PI * 2 / petals) * i - Math.PI * 0.5 + Math.PI / petals;
        const dist = f.radius * 0.38;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const pg2 = ctx.createRadialGradient(px * 0.4, py * 0.4, 0, px, py, f.radius * 0.52);
        pg2.addColorStop(0, '#ede5ff');
        pg2.addColorStop(0.6, '#b49af5');
        pg2.addColorStop(1, '#7355d0');
        ctx.fillStyle = pg2;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.38, f.radius * 0.22, a, 0, Math.PI * 2);
        ctx.fill();

        // Petal vein
        ctx.strokeStyle = 'rgba(100, 60, 200, 0.22)';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(px, py);
        ctx.stroke();
      }

      // Labellum (lower lip petal) – teardrop shape
      const lipGrad = ctx.createRadialGradient(0, f.radius * 0.22, 1, 0, f.radius * 0.28, f.radius * 0.48);
      lipGrad.addColorStop(0, '#fff4d6');
      lipGrad.addColorStop(0.5, '#f5c0e0');
      lipGrad.addColorStop(1, '#d060a0');
      ctx.fillStyle = lipGrad;
      ctx.beginPath();
      ctx.ellipse(0, f.radius * 0.28, f.radius * 0.26, f.radius * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      // Labellum spots
      ctx.fillStyle = 'rgba(140, 30, 100, 0.30)';
      for (let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.arc((s - 1) * f.radius * 0.10, f.radius * 0.24 + s * f.radius * 0.08, f.radius * 0.05, 0, Math.PI * 2);
        ctx.fill();
      }

      // Stamen column
      ctx.fillStyle = '#fff8e8';
      ctx.beginPath();
      ctx.ellipse(0, -f.radius * 0.08, f.radius * 0.10, f.radius * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180, 130, 220, 0.6)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Stamen tip glow
      const stamGlow = ctx.createRadialGradient(0, -f.radius * 0.14, 0, 0, -f.radius * 0.14, f.radius * 0.13);
      stamGlow.addColorStop(0, 'rgba(255, 245, 200, 0.95)');
      stamGlow.addColorStop(1, 'rgba(255, 200, 100, 0)');
      ctx.fillStyle = stamGlow;
      ctx.beginPath();
      ctx.arc(0, -f.radius * 0.14, f.radius * 0.13, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawDaisyFlower(f) {
      const t = performance.now();
      const sway = Math.sin((f.x * 0.011 + t * 0.00055)) * 0.14;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(sway);

      // Stem
      ctx.strokeStyle = '#3a8240';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(0, f.radius * 0.65);
      ctx.quadraticCurveTo(sway * 5, f.radius * 0.25, 0, -f.radius * 0.12);
      ctx.stroke();

      // Petals – 16, two-toned with outline
      const petals = 16;
      for (let i = 0; i < petals; i++) {
        const a = (Math.PI * 2 / petals) * i;
        const dist = f.radius * 0.76;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;

        const light = i % 2 === 0;
        const pg = ctx.createLinearGradient(0, 0, px, py);
        pg.addColorStop(0, light ? '#ffffff' : '#f0edde');
        pg.addColorStop(0.55, light ? '#f8f8ef' : '#e8e5d4');
        pg.addColorStop(1, light ? '#dedad0' : '#ccc8b8');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.72, f.radius * 0.26, a, 0, Math.PI * 2);
        ctx.fill();
        // Subtle petal outline
        ctx.strokeStyle = 'rgba(180, 175, 150, 0.28)';
        ctx.lineWidth = 0.6;
        ctx.stroke();

        // Center vein
        ctx.strokeStyle = 'rgba(210, 200, 160, 0.20)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(px * 0.25, py * 0.25);
        ctx.lineTo(px * 0.88, py * 0.88);
        ctx.stroke();
      }

      // Disc – textured golden center
      const discR = f.radius * 0.46;
      const disc = ctx.createRadialGradient(-discR * 0.18, -discR * 0.18, 1, 0, 0, discR);
      disc.addColorStop(0, '#ffe87a');
      disc.addColorStop(0.45, '#f5c430');
      disc.addColorStop(0.78, '#d99a18');
      disc.addColorStop(1, '#a86a08');
      ctx.fillStyle = disc;
      ctx.beginPath();
      ctx.arc(0, 0, discR, 0, Math.PI * 2);
      ctx.fill();

      // Disc seed dots
      const seedRows = [
        { r: discR * 0.14, count: 5 },
        { r: discR * 0.30, count: 10 },
        { r: discR * 0.46, count: 14 },
      ];
      ctx.fillStyle = 'rgba(100, 58, 5, 0.50)';
      for (const row of seedRows) {
        for (let s = 0; s < row.count; s++) {
          const sa = (Math.PI * 2 / row.count) * s;
          ctx.beginPath();
          ctx.arc(Math.cos(sa) * row.r, Math.sin(sa) * row.r, discR * 0.058, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // Disc highlight
      ctx.fillStyle = 'rgba(255, 255, 200, 0.28)';
      ctx.beginPath();
      ctx.ellipse(-discR * 0.22, -discR * 0.22, discR * 0.32, discR * 0.22, -0.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawCamelliaFlower(f) {
      const t = performance.now();
      const sway = Math.sin((f.x * 0.014 + t * 0.00043)) * 0.16;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(sway);

      // Stem
      ctx.strokeStyle = '#2f7538';
      ctx.lineWidth = 1.7;
      ctx.beginPath();
      ctx.moveTo(0, f.radius * 0.70);
      ctx.quadraticCurveTo(sway * 5, f.radius * 0.28, 0, -f.radius * 0.14);
      ctx.stroke();

      // Outer petals (5) – deep rose
      const outerPetals = 5;
      for (let i = 0; i < outerPetals; i++) {
        const a = (Math.PI * 2 / outerPetals) * i - Math.PI / 2;
        const dist = f.radius * 0.52;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const og = ctx.createRadialGradient(px * 0.28, py * 0.28, 0, px, py, f.radius * 0.88);
        og.addColorStop(0, '#ffb8d0');
        og.addColorStop(0.45, '#f05888');
        og.addColorStop(1, '#b82058');
        ctx.fillStyle = og;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.68, f.radius * 0.44, a, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(220, 80, 120, 0.30)';
        ctx.lineWidth = 0.7;
        ctx.stroke();
        // Petal midrib
        ctx.strokeStyle = 'rgba(255, 180, 200, 0.22)';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(px * 0.85, py * 0.85);
        ctx.stroke();
      }

      // Middle petals (5) – rotated, lighter
      for (let i = 0; i < outerPetals; i++) {
        const a = (Math.PI * 2 / outerPetals) * i - Math.PI / 2 + Math.PI / outerPetals;
        const dist = f.radius * 0.34;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const mg = ctx.createRadialGradient(px * 0.35, py * 0.35, 0, px, py, f.radius * 0.60);
        mg.addColorStop(0, '#ffe8f2');
        mg.addColorStop(0.5, '#f890b8');
        mg.addColorStop(1, '#d0407a');
        ctx.fillStyle = mg;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.44, f.radius * 0.28, a, 0, Math.PI * 2);
        ctx.fill();
      }

      // Inner curl petals (3) – tightly wound rose center
      for (let i = 0; i < 3; i++) {
        const a = (Math.PI * 2 / 3) * i;
        const dist = f.radius * 0.14;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const ig = ctx.createRadialGradient(0, 0, 1, px, py, f.radius * 0.28);
        ig.addColorStop(0, '#ffd0e8');
        ig.addColorStop(1, '#e05080');
        ctx.fillStyle = ig;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.22, f.radius * 0.15, a + 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Stamen burst
      const stamCount = 18;
      for (let i = 0; i < stamCount; i++) {
        const sa = (Math.PI * 2 / stamCount) * i;
        const sr = f.radius * (0.10 + (i % 3) * 0.04);
        ctx.strokeStyle = `rgba(255, 220, 100, ${0.70 + (i % 2) * 0.20})`;
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(Math.cos(sa) * f.radius * 0.06, Math.sin(sa) * f.radius * 0.06);
        ctx.lineTo(Math.cos(sa) * sr, Math.sin(sa) * sr);
        ctx.stroke();
        // Anther tip
        ctx.fillStyle = '#ffe060';
        ctx.beginPath();
        ctx.arc(Math.cos(sa) * sr, Math.sin(sa) * sr, f.radius * 0.035, 0, Math.PI * 2);
        ctx.fill();
      }

      // Dark center disc
      const centerDisc = ctx.createRadialGradient(0, 0, 0, 0, 0, f.radius * 0.12);
      centerDisc.addColorStop(0, '#7a1030');
      centerDisc.addColorStop(1, '#3a0818');
      ctx.fillStyle = centerDisc;
      ctx.beginPath();
      ctx.arc(0, 0, f.radius * 0.12, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawShadowFlower(f) {
      const sway = Math.sin(performance.now() * 0.0018 + f.x) * 4.8;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.strokeStyle = '#1e382d';
      ctx.lineWidth = 3.4;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(sway * 0.5, -f.radius * 0.4, sway, -f.radius);
      ctx.stroke();
      ctx.translate(sway, -f.radius);

      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, f.radius * 1.4);
      glow.addColorStop(0, 'rgba(148, 66, 255, 0.28)');
      glow.addColorStop(1, 'rgba(148, 66, 255, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, f.radius * 1.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#21132e';
      ctx.strokeStyle = '#6a2c8a';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 5; i++) {
        ctx.save();
        ctx.rotate((i * Math.PI * 2) / 5 + performance.now() * 0.0003);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-f.radius * 0.24, -f.radius * 0.4, 0, -f.radius * 0.85);
        ctx.quadraticCurveTo(f.radius * 0.24, -f.radius * 0.4, 0, 0);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = '#4a2c5a';
      for (let i = 0; i < 5; i++) {
        ctx.save();
        ctx.rotate((i * Math.PI * 2) / 5 - performance.now() * 0.0002 + Math.PI / 5);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-f.radius * 0.16, -f.radius * 0.28, 0, -f.radius * 0.6);
        ctx.quadraticCurveTo(f.radius * 0.16, -f.radius * 0.28, 0, 0);
        ctx.fill();
        ctx.restore();
      }

      const cGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, f.radius * 0.18);
      cGrad.addColorStop(0, '#ffd870');
      cGrad.addColorStop(1, '#6a2c8a');
      ctx.fillStyle = cGrad;
      ctx.beginPath();
      ctx.arc(0, 0, f.radius * 0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSunroseFlower(f) {
      const t = performance.now();
      const sway = Math.sin((f.x * 0.012 + t * 0.0005)) * 0.12;
      const glowPulse = 0.85 + Math.sin(t * 0.002 + f.x) * 0.15;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(sway);

      // Golden glow aura
      const aura = ctx.createRadialGradient(0, 0, f.radius * 0.3, 0, 0, f.radius * 2.2);
      aura.addColorStop(0, `rgba(255, 200, 50, ${0.25 * glowPulse})`);
      aura.addColorStop(0.5, `rgba(255, 150, 20, ${0.12 * glowPulse})`);
      aura.addColorStop(1, 'rgba(255, 100, 0, 0)');
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(0, 0, f.radius * 2.2, 0, Math.PI * 2);
      ctx.fill();

      // Stem
      ctx.strokeStyle = '#4a7a2a';
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(0, f.radius * 0.65);
      ctx.quadraticCurveTo(sway * 4, f.radius * 0.2, 0, -f.radius * 0.12);
      ctx.stroke();

      // Outer petals (8) – golden-orange with fire tips
      const petals = 8;
      for (let i = 0; i < petals; i++) {
        const a = (Math.PI * 2 / petals) * i - Math.PI * 0.5;
        const dist = f.radius * 0.62;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const pg = ctx.createRadialGradient(px * 0.3, py * 0.3, 0, px, py, f.radius * 0.85);
        pg.addColorStop(0, '#ffee88');
        pg.addColorStop(0.4, '#ffaa22');
        pg.addColorStop(0.8, '#ff6600');
        pg.addColorStop(1, '#cc3300');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.55, f.radius * 0.28, a, 0, Math.PI * 2);
        ctx.fill();
        // Fire tip
        ctx.fillStyle = `rgba(255, 255, 200, ${0.4 * glowPulse})`;
        ctx.beginPath();
        ctx.ellipse(px * 1.15, py * 1.15, f.radius * 0.12, f.radius * 0.06, a, 0, Math.PI * 2);
        ctx.fill();
      }

      // Inner petals (8) – brighter, smaller
      for (let i = 0; i < petals; i++) {
        const a = (Math.PI * 2 / petals) * i - Math.PI * 0.5 + Math.PI / petals;
        const dist = f.radius * 0.38;
        const px = Math.cos(a) * dist;
        const py = Math.sin(a) * dist;
        const pg2 = ctx.createRadialGradient(0, 0, 1, px, py, f.radius * 0.5);
        pg2.addColorStop(0, '#ffffcc');
        pg2.addColorStop(0.6, '#ffdd44');
        pg2.addColorStop(1, '#ff8800');
        ctx.fillStyle = pg2;
        ctx.beginPath();
        ctx.ellipse(px, py, f.radius * 0.32, f.radius * 0.18, a, 0, Math.PI * 2);
        ctx.fill();
      }

      // Sun center
      const sunR = f.radius * 0.22;
      const sunGrad = ctx.createRadialGradient(-sunR * 0.2, -sunR * 0.2, 1, 0, 0, sunR);
      sunGrad.addColorStop(0, '#ffffee');
      sunGrad.addColorStop(0.4, '#ffee44');
      sunGrad.addColorStop(0.8, '#ffaa00');
      sunGrad.addColorStop(1, '#cc6600');
      ctx.fillStyle = sunGrad;
      ctx.beginPath();
      ctx.arc(0, 0, sunR, 0, Math.PI * 2);
      ctx.fill();

      // Sun rays
      ctx.strokeStyle = `rgba(255, 220, 80, ${0.35 * glowPulse})`;
      ctx.lineWidth = 1.2;
      const rayCount = 12;
      for (let i = 0; i < rayCount; i++) {
        const ra = (Math.PI * 2 / rayCount) * i + t * 0.0008;
        const rInner = sunR * 1.1;
        const rOuter = sunR * (1.4 + Math.sin(t * 0.003 + i) * 0.2);
        ctx.beginPath();
        ctx.moveTo(Math.cos(ra) * rInner, Math.sin(ra) * rInner);
        ctx.lineTo(Math.cos(ra) * rOuter, Math.sin(ra) * rOuter);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawFlowerByType(f) {
      if (f.type === 'orchid') {
        drawOrchidFlower(f);
      } else if (f.type === 'daisy') {
        drawDaisyFlower(f);
      } else if (f.type === 'camellia') {
        drawCamelliaFlower(f);
      } else if (f.type === 'shadowflower') {
        drawShadowFlower(f);
      } else if (f.type === 'sunrose') {
        drawSunroseFlower(f);
      } else {
        ctx.fillStyle = '#ffd97a';
        ctx.beginPath();
        ctx.arc(f.x, f.y, Math.max(2.5, f.radius * 0.35), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawEggShop(cx, cy) {
      if (state.areaIndex !== 0) return; // Only visible in Area 1
      ctx.save();
      ctx.translate(cx, cy);

      // Base shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
      ctx.beginPath();
      ctx.ellipse(0, 36, 42, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wooden beams
      ctx.strokeStyle = '#5a3d28';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-28, 36); ctx.lineTo(-28, -10);
      ctx.moveTo(28, 36); ctx.lineTo(28, -10);
      ctx.moveTo(-34, -10); ctx.lineTo(34, -10);
      ctx.stroke();

      // Honeycomb/Gold Canopy roof
      const roof = ctx.createLinearGradient(-36, -20, 36, -10);
      roof.addColorStop(0, '#f5be32');
      roof.addColorStop(1, '#ff9910');
      ctx.fillStyle = roof;
      ctx.beginPath();
      ctx.moveTo(-36, -10);
      ctx.lineTo(0, -32);
      ctx.lineTo(36, -10);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#d48008';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Golden nest/egg inside the stall
      const nest = ctx.createRadialGradient(0, 15, 2, 0, 15, 26);
      nest.addColorStop(0, '#ffd88d');
      nest.addColorStop(1, '#a66508');
      ctx.fillStyle = nest;
      ctx.beginPath();
      ctx.arc(0, 15, 20, 0, Math.PI * 2);
      ctx.fill();

      // Glowing display egg
      const pulse = 1.0 + Math.sin(performance.now() * 0.0035) * 0.08;
      ctx.save();
      ctx.scale(pulse, pulse);
      const eggGrad = ctx.createLinearGradient(0, -12, 0, 12);
      eggGrad.addColorStop(0, '#ffebc2');
      eggGrad.addColorStop(1, '#ffbe5b');
      ctx.fillStyle = eggGrad;
      ctx.strokeStyle = '#a66508';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 12, 8, 11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // Shop Signboard
      drawRoundedRect(-32, -44, 64, 14, 4, 'rgba(6, 14, 24, 0.88)', '#ffd678');
      ctx.fillStyle = '#ffdf93';
      ctx.font = 'bold 8px Segoe UI';
      ctx.fillText('HUEVOS', -16, -34);

      // Check distance to player. If player is close, show prompt.
      const d = Math.hypot(player.x - cx, player.y - cy);
      if (d < 65) {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 11px Segoe UI';
        ctx.fillText('PRESIONA E PARA ABRIR MERCADO', -82, 54);
      }

      ctx.restore();
    }

    function drawField() {
      const area = getCurrentArea();
      const g = ctx.createLinearGradient(0, 0, 0, world.h);
      if (area.id === 2) {
        g.addColorStop(0, '#10101a');
        g.addColorStop(0.45, '#1b1226');
        g.addColorStop(1, '#122416');
      } else {
        // Weather-affected sky
        if (state.weather === 'rain') {
          g.addColorStop(0, '#4a5568');
          g.addColorStop(0.45, '#5a6a7a');
          g.addColorStop(1, '#3d5a40');
        } else if (state.weather === 'sunset') {
          g.addColorStop(0, '#ff8c42');
          g.addColorStop(0.35, '#ff6b35');
          g.addColorStop(0.65, '#f7b538');
          g.addColorStop(1, '#5a8a3a');
        } else {
          g.addColorStop(0, '#87ceeb');
          g.addColorStop(0.45, '#c9f0ff');
          g.addColorStop(1, '#58a85a');
        }
      }
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, world.splitX, world.h);

      // Background & Midground Rain, Splashes and Ambient overlay
      if (area.id !== 2) {
        // Ambient wet-weather overlay for mood
        if (state.weather === 'rain') {
          ctx.fillStyle = 'rgba(80, 100, 120, 0.07)';
          ctx.fillRect(0, 0, world.splitX, world.h);
        }

        // Draw background (layer 0) and midground (layer 1) rain drops
        for (const d of rainDrops) {
          if (d.layer !== 2 && d.x >= 0 && d.x <= world.splitX) {
            ctx.strokeStyle = `rgba(180, 200, 220, ${d.opacity})`;
            ctx.lineWidth = d.width;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            const dx = d.length * Math.sin(-0.1);
            ctx.lineTo(d.x + dx, d.y + d.length);
            ctx.stroke();
          }
        }
        
        // Draw splashes (expanding ripples) on the ground
        for (const s of rainSplashes) {
          ctx.strokeStyle = `rgba(180, 200, 220, ${s.opacity})`;
          ctx.lineWidth = s.layer === 0 ? 0.4 : (s.layer === 1 ? 0.7 : 1.0);
          ctx.beginPath();
          ctx.ellipse(s.x, s.y, s.radius, s.radius * 0.35, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // Sunset overlay glow
      if (state.weather === 'sunset' && area.id !== 2) {
        const sunGlow = ctx.createRadialGradient(world.splitX * 0.3, world.h * 0.15, 0, world.splitX * 0.3, world.h * 0.15, world.splitX * 0.6);
        sunGlow.addColorStop(0, 'rgba(255, 140, 60, 0.18)');
        sunGlow.addColorStop(0.5, 'rgba(255, 100, 40, 0.08)');
        sunGlow.addColorStop(1, 'rgba(255, 80, 20, 0)');
        ctx.fillStyle = sunGlow;
        ctx.fillRect(0, 0, world.splitX, world.h);
      }

      for (const biome of area.biomes) {
        const x = world.splitX * biome.x0;
        const w = world.splitX * (biome.x1 - biome.x0);
        const tint = biome.type === 'orchid'
          ? 'rgba(143, 120, 255, 0.08)'
          : (biome.type === 'daisy' ? 'rgba(250, 249, 225, 0.08)' : (biome.type === 'camellia' ? 'rgba(255, 99, 145, 0.08)' : (biome.type === 'sunrose' ? 'rgba(255, 170, 50, 0.10)' : 'rgba(128, 66, 255, 0.08)')));
        ctx.fillStyle = tint;
        ctx.fillRect(x, 0, w, world.h);

        ctx.fillStyle = 'rgba(5, 15, 22, 0.55)';
        ctx.fillRect(x + 10, world.h - 34, Math.max(120, w - 20), 24);
        ctx.fillStyle = '#e6f5ff';
        ctx.font = '12px Segoe UI';
        ctx.fillText(biome.name, x + 16, world.h - 17);
      }

      ctx.fillStyle = area.id === 2 ? 'rgba(128, 90, 180, 0.12)' : 'rgba(255,255,255,0.75)';
      for (let i = 0; i < 5; i++) {
        const cx = 120 + i * 160 + Math.sin(performance.now() * 0.0002 + i) * 18;
        const cy = 70 + (i % 2) * 20;
        ctx.beginPath();
        if (area.id === 2) {
          ctx.ellipse(cx, cy + 120, 70, 26, 0, 0, Math.PI * 2);
        } else {
          ctx.ellipse(cx, cy, 44, 17, 0, 0, Math.PI * 2);
        }
        ctx.fill();
      }

      for (const f of flowers) drawFlowerByType(f);
      drawEggShop(world.splitX * 0.495, 220);
    }

    // ─── Altar del Nectar – 2D renderer ────────────────────────────────────────
    function drawAltarDelNectar(cx, baseY) {
      const t = performance.now();
      const pollenActive = state.zone === 'hive' && state.pollen > 0;

      ctx.save();

      // ── Ambient ground glow ──────────────────────────────────────────────────
      const groundGlow = ctx.createRadialGradient(cx, baseY + 4, 4, cx, baseY + 4, 88);
      groundGlow.addColorStop(0, 'rgba(255, 185, 60, 0.32)');
      groundGlow.addColorStop(1, 'rgba(255, 130, 30, 0)');
      ctx.fillStyle = groundGlow;
      ctx.beginPath();
      ctx.ellipse(cx, baseY + 4, 88, 22, 0, 0, Math.PI * 2);
      ctx.fill();

      // ── Pollen-deposit pulse ring ────────────────────────────────────────────
      if (pollenActive) {
        const pulseR = 52 + Math.sin(t * 0.007) * 8;
        const pulseA = 0.18 + Math.sin(t * 0.012) * 0.10;
        ctx.strokeStyle = `rgba(255, 220, 90, ${pulseA})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, baseY - 46, pulseR, 0, Math.PI * 2);
        ctx.stroke();
      }

      // ── Step 3 – bottom slab (widest) ───────────────────────────────────────
      const s3W = 82, s3H = 12, s3Y = baseY - 12;
      const slabGrad3 = ctx.createLinearGradient(cx - s3W / 2, s3Y, cx + s3W / 2, s3Y + s3H);
      slabGrad3.addColorStop(0, '#8b6a3e');
      slabGrad3.addColorStop(0.5, '#6e4f2a');
      slabGrad3.addColorStop(1, '#3e2912');
      ctx.fillStyle = slabGrad3;
      ctx.beginPath();
      ctx.roundRect(cx - s3W / 2, s3Y, s3W, s3H, [4, 4, 2, 2]);
      ctx.fill();
      ctx.strokeStyle = 'rgba(210, 160, 80, 0.55)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // ── Step 2 – middle slab ─────────────────────────────────────────────────
      const s2W = 66, s2H = 11, s2Y = s3Y - s2H;
      const slabGrad2 = ctx.createLinearGradient(cx - s2W / 2, s2Y, cx + s2W / 2, s2Y + s2H);
      slabGrad2.addColorStop(0, '#9a7546');
      slabGrad2.addColorStop(0.5, '#7a5832');
      slabGrad2.addColorStop(1, '#4a3018');
      ctx.fillStyle = slabGrad2;
      ctx.beginPath();
      ctx.roundRect(cx - s2W / 2, s2Y, s2W, s2H, [3, 3, 2, 2]);
      ctx.fill();
      ctx.strokeStyle = 'rgba(230, 175, 90, 0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // ── Step 1 – top slab / pedestal face ────────────────────────────────────
      const s1W = 52, s1H = 38, s1Y = s2Y - s1H;
      const slabGrad1 = ctx.createLinearGradient(cx - s1W / 2, s1Y, cx + s1W / 2, s1Y + s1H);
      slabGrad1.addColorStop(0, '#b8904e');
      slabGrad1.addColorStop(0.45, '#8a6230');
      slabGrad1.addColorStop(1, '#4e3418');
      ctx.fillStyle = slabGrad1;
      ctx.beginPath();
      ctx.roundRect(cx - s1W / 2, s1Y, s1W, s1H, [5, 5, 3, 3]);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 210, 120, 0.6)';
      ctx.lineWidth = 1.4;
      ctx.stroke();

      // Pedestal bevel highlight
      ctx.strokeStyle = 'rgba(255, 230, 160, 0.30)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - s1W / 2 + 4, s1Y + 2);
      ctx.lineTo(cx + s1W / 2 - 4, s1Y + 2);
      ctx.stroke();

      // ── Runes on pedestal ────────────────────────────────────────────────────
      const runeA = 0.28 + Math.sin(t * 0.003 + 0.0) * 0.16;
      const runeB = 0.28 + Math.sin(t * 0.003 + 2.1) * 0.16;
      const runeC = 0.28 + Math.sin(t * 0.003 + 4.2) * 0.16;
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255, 230, 130, ${runeA})`;
      ctx.fillText('᛭', cx - 14, s1Y + 22);
      ctx.fillStyle = `rgba(255, 200, 80, ${runeB})`;
      ctx.fillText('ᛝ', cx, s1Y + 22);
      ctx.fillStyle = `rgba(255, 230, 130, ${runeC})`;
      ctx.fillText('᛭', cx + 14, s1Y + 22);

      // ── Chalice base ring ────────────────────────────────────────────────────
      const bowlCY = s1Y - 4;
      const chaliceBaseGrad = ctx.createLinearGradient(cx - 14, bowlCY - 3, cx + 14, bowlCY + 3);
      chaliceBaseGrad.addColorStop(0, '#d4a84a');
      chaliceBaseGrad.addColorStop(0.5, '#a07830');
      chaliceBaseGrad.addColorStop(1, '#5c4018');
      ctx.fillStyle = chaliceBaseGrad;
      ctx.beginPath();
      ctx.ellipse(cx, bowlCY, 16, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 210, 100, 0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Chalice stem
      const stemGrad = ctx.createLinearGradient(cx - 4, bowlCY - 16, cx + 4, bowlCY);
      stemGrad.addColorStop(0, '#c4922a');
      stemGrad.addColorStop(1, '#7a5818');
      ctx.fillStyle = stemGrad;
      ctx.beginPath();
      ctx.moveTo(cx - 4, bowlCY);
      ctx.lineTo(cx - 5, bowlCY - 16);
      ctx.lineTo(cx + 5, bowlCY - 16);
      ctx.lineTo(cx + 4, bowlCY);
      ctx.closePath();
      ctx.fill();

      // ── Nectar bowl cup ──────────────────────────────────────────────────────
      const cupTop = bowlCY - 28;
      const cupBottomY = bowlCY - 16;
      const cupGrad = ctx.createLinearGradient(cx - 22, cupTop, cx + 22, cupBottomY);
      cupGrad.addColorStop(0, '#e8b040');
      cupGrad.addColorStop(0.6, '#b07820');
      cupGrad.addColorStop(1, '#6a4010');
      ctx.fillStyle = cupGrad;
      ctx.beginPath();
      ctx.moveTo(cx - 18, cupBottomY);
      ctx.quadraticCurveTo(cx - 22, cupBottomY - 6, cx - 20, cupTop);
      ctx.lineTo(cx + 20, cupTop);
      ctx.quadraticCurveTo(cx + 22, cupBottomY - 6, cx + 18, cupBottomY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 220, 130, 0.80)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Cup inner shadow
      ctx.fillStyle = 'rgba(50, 25, 5, 0.35)';
      ctx.beginPath();
      ctx.moveTo(cx - 16, cupBottomY - 2);
      ctx.quadraticCurveTo(cx - 19, cupBottomY - 8, cx - 17, cupTop + 4);
      ctx.lineTo(cx + 17, cupTop + 4);
      ctx.quadraticCurveTo(cx + 19, cupBottomY - 8, cx + 16, cupBottomY - 2);
      ctx.closePath();
      ctx.fill();

      // ── Animated nectar liquid inside the cup ────────────────────────────────
      const nectarLevel = cupTop + 6;
      const wave1 = Math.sin(t * 0.004) * 2.5;
      const wave2 = Math.sin(t * 0.0055 + 1.2) * 1.8;
      const nectarGrad = ctx.createLinearGradient(cx, nectarLevel, cx, cupBottomY - 3);
      nectarGrad.addColorStop(0, 'rgba(255, 195, 50, 0.95)');
      nectarGrad.addColorStop(0.55, 'rgba(235, 145, 20, 0.92)');
      nectarGrad.addColorStop(1, 'rgba(200, 100, 10, 0.88)');
      ctx.fillStyle = nectarGrad;
      ctx.beginPath();
      ctx.moveTo(cx - 16, nectarLevel + wave1);
      ctx.quadraticCurveTo(cx - 8, nectarLevel - 2 + wave2, cx, nectarLevel + wave1 * 0.5);
      ctx.quadraticCurveTo(cx + 8, nectarLevel - 2 + wave2, cx + 16, nectarLevel + wave1);
      ctx.lineTo(cx + 16, cupBottomY - 3);
      ctx.lineTo(cx - 16, cupBottomY - 3);
      ctx.closePath();
      ctx.fill();

      // Nectar surface sheen
      ctx.fillStyle = 'rgba(255, 240, 180, 0.38)';
      ctx.beginPath();
      ctx.ellipse(cx - 4, nectarLevel + wave1 + 1, 8, 2.5, -0.2, 0, Math.PI * 2);
      ctx.fill();

      // ── Flame crown (5 flames) ───────────────────────────────────────────────
      const flamePositions = [-18, -9, 0, 9, 18];
      const flameBaseY = cupTop + 1;
      for (let fi = 0; fi < flamePositions.length; fi++) {
        const fx = cx + flamePositions[fi];
        const flicker = Math.sin(t * 0.009 + fi * 1.4) * 2.8 + Math.sin(t * 0.016 + fi * 2.3) * 1.6;
        const fh = (fi === 2 ? 22 : fi % 2 === 0 ? 16 : 13) + flicker;
        const fw = fi === 2 ? 9 : 7;
        const ftopY = flameBaseY - fh;

        // Outer flame
        const flameGrad = ctx.createRadialGradient(fx, ftopY + fh * 0.6, 1, fx, ftopY + fh * 0.6, fh * 0.85);
        flameGrad.addColorStop(0, 'rgba(255, 245, 180, 0.95)');
        flameGrad.addColorStop(0.4, 'rgba(255, 165, 30, 0.88)');
        flameGrad.addColorStop(1, 'rgba(220, 70, 0, 0)');
        ctx.fillStyle = flameGrad;
        ctx.beginPath();
        ctx.moveTo(fx - fw / 2, flameBaseY);
        ctx.quadraticCurveTo(fx - fw, ftopY + fh * 0.5, fx + Math.sin(t * 0.008 + fi) * 2, ftopY);
        ctx.quadraticCurveTo(fx + fw, ftopY + fh * 0.5, fx + fw / 2, flameBaseY);
        ctx.closePath();
        ctx.fill();

        // Inner hot core
        const coreGrad = ctx.createRadialGradient(fx, ftopY + fh * 0.7, 0, fx, ftopY + fh * 0.7, fw * 0.65);
        coreGrad.addColorStop(0, 'rgba(255, 255, 230, 0.98)');
        coreGrad.addColorStop(1, 'rgba(255, 200, 80, 0)');
        ctx.fillStyle = coreGrad;
        ctx.beginPath();
        ctx.ellipse(fx, ftopY + fh * 0.68, fw * 0.42, fh * 0.38, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // ── Amber aura glow above cup ────────────────────────────────────────────
      const auraG = ctx.createRadialGradient(cx, cupTop - 14, 4, cx, cupTop - 14, 38);
      auraG.addColorStop(0, `rgba(255, 200, 70, ${0.18 + Math.sin(t * 0.006) * 0.08})`);
      auraG.addColorStop(1, 'rgba(255, 130, 0, 0)');
      ctx.fillStyle = auraG;
      ctx.beginPath();
      ctx.arc(cx, cupTop - 14, 38, 0, Math.PI * 2);
      ctx.fill();

      // ── Label ────────────────────────────────────────────────────────────────
      const labelY = baseY + 12;
      ctx.textAlign = 'center';
      ctx.font = 'bold 11px "Segoe UI", sans-serif';
      // Shadow
      ctx.fillStyle = 'rgba(10, 5, 0, 0.70)';
      ctx.fillText('Altar del Nectar', cx + 1, labelY + 1);
      // Text with golden shimmer
      const txtShimmer = 0.82 + Math.sin(t * 0.005) * 0.12;
      ctx.fillStyle = `rgba(255, ${Math.floor(220 + txtShimmer * 18)}, 100, ${txtShimmer})`;
      ctx.fillText('Altar del Nectar', cx, labelY);

      ctx.restore();
    }

    function drawHiveArea() {
      const hiveW = world.w - world.splitX;
      const vanX = world.splitX + hiveW * 0.58;
      const vanY = world.h * 0.16;
      const g = ctx.createLinearGradient(world.splitX, 0, world.w, world.h);
      g.addColorStop(0, '#6a432d');
      g.addColorStop(0.55, '#4a2d1e');
      g.addColorStop(1, '#2b1a12');
      ctx.fillStyle = g;
      ctx.fillRect(world.splitX, 0, world.w - world.splitX, world.h);

      // Wall divider with glowing hive seam.
      const seam = ctx.createLinearGradient(world.splitX - 6, 0, world.splitX + 8, 0);
      seam.addColorStop(0, 'rgba(250, 193, 98, 0.02)');
      seam.addColorStop(0.5, 'rgba(255, 216, 135, 0.45)');
      seam.addColorStop(1, 'rgba(255, 255, 255, 0.05)');
      ctx.fillStyle = seam;
      ctx.fillRect(world.splitX - 6, 0, 14, world.h);

      // Interior perspective floor lines.
      ctx.strokeStyle = 'rgba(255, 205, 126, 0.20)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 11; i++) {
        const y = world.h * (0.36 + i * 0.062);
        ctx.beginPath();
        ctx.moveTo(world.splitX + 6, y);
        ctx.lineTo(world.w - 10, y + (i * 1.1));
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255, 186, 105, 0.18)';
      for (let i = 0; i < 10; i++) {
        const x = world.splitX + 18 + i * (hiveW - 44) / 9;
        ctx.beginPath();
        ctx.moveTo(x, world.h);
        ctx.lineTo(vanX + (x - vanX) * 0.12, vanY + 20);
        ctx.stroke();
      }

      // ── HIVE ENTRANCE – compact wall-embedded portal ──────────────────────
      const gateY   = world.h * 0.50;          // vertical center of the gate
      const gateOW  = 38;                        // opening half-width
      const gateOH  = 86;                        // opening total height
      const gateX   = world.splitX + gateOW;     // gate center (opening starts flush with wall seam)
      const gateR   = gateOW;                    // top radius (semicircle)

      const t_e = performance.now();
      const breathe_e = 0.82 + Math.sin(t_e * 0.0009) * 0.18;

      // ── 1. Warm glow bleeding into the field (subtle, directional) ──────────
      const fieldGlow = ctx.createRadialGradient(gateX, gateY, 4, gateX, gateY, 72);
      fieldGlow.addColorStop(0,   `rgba(255, 178, 70, ${0.18 * breathe_e})`);
      fieldGlow.addColorStop(0.5, `rgba(220, 120, 28, ${0.08 * breathe_e})`);
      fieldGlow.addColorStop(1,   'rgba(180, 80, 10, 0)');
      ctx.fillStyle = fieldGlow;
      ctx.beginPath();
      ctx.ellipse(gateX - 14, gateY, 72, 62, 0, 0, Math.PI * 2);
      ctx.fill();

      // ── 2. Portal frame – dark wood planks embedded in the wall ─────────────
      // Outer frame border: 10px thick around opening
      const fL = gateX - gateOW - 10;
      const fT = gateY - gateOH / 2 - 10;
      const fW = gateOW * 2 + 20;
      const fH = gateOH + 20;

      // Drop shadow behind frame
      ctx.save();
      ctx.filter = 'blur(6px)';
      ctx.fillStyle = 'rgba(6, 2, 1, 0.60)';
      ctx.beginPath();
      ctx.roundRect(fL + 3, fT + 4, fW, fH, gateR + 10);
      ctx.fill();
      ctx.filter = 'none';
      ctx.restore();

      // Wood frame gradient: left-lit (from field) to dark right
      const woodGrad = ctx.createLinearGradient(fL, gateY, fL + fW, gateY);
      woodGrad.addColorStop(0,    '#8b5c2a');
      woodGrad.addColorStop(0.3,  '#6b4220');
      woodGrad.addColorStop(0.7,  '#4a2c12');
      woodGrad.addColorStop(1,    '#2e1a0a');
      ctx.fillStyle = woodGrad;
      ctx.beginPath();
      ctx.roundRect(fL, fT, fW, fH, gateR + 10);
      ctx.fill();

      // Top bevel highlight (light from above-left)
      ctx.strokeStyle = 'rgba(200, 140, 60, 0.40)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(fL + 2, fT + 2, fW - 4, fH - 4, gateR + 9);
      ctx.stroke();

      // Inner shadow bevel
      ctx.strokeStyle = 'rgba(8, 3, 1, 0.55)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(fL + 5, fT + 5, fW - 10, fH - 10, gateR + 7);
      ctx.stroke();

      // Wood grain lines on frame (horizontal)
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(fL, fT, fW, fH, gateR + 10);
      ctx.clip();
      ctx.strokeStyle = 'rgba(40, 18, 6, 0.22)';
      ctx.lineWidth = 1;
      for (let gy = fT + 8; gy < fT + fH; gy += 9) {
        ctx.beginPath();
        ctx.moveTo(fL, gy + Math.sin(gy * 0.3) * 1.5);
        ctx.lineTo(fL + fW, gy + Math.sin((gy + fW) * 0.3) * 1.5);
        ctx.stroke();
      }
      ctx.restore();

      // ── 3. Nail / rivet accents on frame corners ─────────────────────────────
      const nailColor = 'rgba(180, 120, 40, 0.70)';
      const nailHL    = 'rgba(255, 210, 120, 0.55)';
      [[fL + 9, fT + 9], [fL + fW - 9, fT + 9],
       [fL + 9, fT + fH - 9], [fL + fW - 9, fT + fH - 9]].forEach(([nx, ny]) => {
        ctx.fillStyle = nailColor;
        ctx.beginPath();
        ctx.arc(nx, ny, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = nailHL;
        ctx.beginPath();
        ctx.arc(nx - 1, ny - 1, 1.4, 0, Math.PI * 2);
        ctx.fill();
      });
