name: Release Android (Universal)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project slug (e.g., floretshop)'
        required: true
        type: string
      version_name:
        description: 'Version name (e.g., 2026.5.22-t0029)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve project config
        id: resolve
        shell: pwsh
        run: |
          $slug = '${{ inputs.project }}'
          $dir = ''
          $targetRepo = 'owsdatabase'
          $packageId = ''
          switch ($slug) {
            'ows-store'            { $dir = 'OWS Store';            $targetRepo = 'owsdatabase';          $packageId = 'com.oceanandwild.owsstore' }
            'oceanpay'             { $dir = 'Ocean Pay';            $targetRepo = 'oceanpay';             $packageId = 'com.oceanwildstudios.oceanpay' }
            'floretshop'           { $dir = 'Floret Shop';          $targetRepo = 'floretshop';           $packageId = 'com.ows.floretshop' }
            'wildtransfer'         { $dir = 'WildTransfer';         $targetRepo = 'wildtransfer';         $packageId = 'com.oceanandwild.wildtransfer' }
            'a-wild-question-game' { $dir = 'A Wild Question Game'; $targetRepo = 'a-wild-question-game'; $packageId = 'com.oceanandwild.awildquestiongame' }
            default { $dir = ''; $targetRepo = '' }
          }
          if (-not $dir) { throw "Unknown project slug: $slug" }
          "project_dir=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target_repo=$targetRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "package_id=$packageId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v${{ inputs.version_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install JS dependencies
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: npm ci

      - name: Sync Capacitor web assets
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: |
          # Copy index.html to www/ (Capacitor webDir)
          mkdir -p www
          cp index.html www/
          # Also copy any assets directory if present
          if [ -d assets ]; then cp -r assets www/; fi
          # Run capacitor sync if available
          npx cap sync android || true

      - name: Set version in build.gradle
        working-directory: ${{ steps.resolve.outputs.project_dir }}/android
        run: |
          VERSION_CODE=$(date +%s | tail -c 9)
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ inputs.version_name }}\"/" app/build.gradle
          echo "Version set: code=$VERSION_CODE, name=${{ inputs.version_name }}"

      - name: Build Release APK
        working-directory: ${{ steps.resolve.outputs.project_dir }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        env:
          SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: ${{ steps.resolve.outputs.project_dir }}/android
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 -d > keystore.jks
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
            SIGNED_APK="app/build/outputs/apk/release/${{ inputs.project }}-${{ inputs.version_name }}-release.apk"
            $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/zipalign -v -p 4 "$APK_PATH" aligned.apk
            if $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner sign \
              --ks keystore.jks \
              --ks-pass "env:KEY_STORE_PASSWORD" \
              --key-pass "env:KEY_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --out "$SIGNED_APK" \
              aligned.apk; then
              rm -f keystore.jks aligned.apk "$APK_PATH"
              echo "APK signed: $SIGNED_APK"
            else
              echo "::warning::APK signing failed — keystore credentials may be wrong. Falling back to unsigned APK."
              rm -f keystore.jks
              SIGNED_APK="$APK_PATH"
              echo "Using unsigned APK: $SIGNED_APK"
            fi
          else
            echo "No keystore secret found — using unsigned APK"
            find app/build/outputs/apk/release -name "*.apk" | head -1
          fi

      - name: Collect APK path
        id: apk
        working-directory: ${{ steps.resolve.outputs.project_dir }}/android
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK ($(stat -c%s $APK) bytes)"

      - name: Create release metadata
        working-directory: ${{ steps.resolve.outputs.project_dir }}
        run: |
          cat > android-release-metadata.json << EOF
          {
            "package_id": "${{ steps.resolve.outputs.package_id }}",
            "version_name": "${{ inputs.version_name }}",
            "version_code": $(date +%s),
            "project": "${{ inputs.project }}"
          }
          EOF

      - name: Create or update GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          REPO="OceanandWild/${{ steps.resolve.outputs.target_repo }}"
          TAG="${{ steps.resolve.outputs.tag }}"
          APK_PATH="${{ steps.resolve.outputs.project_dir }}/android/${{ steps.apk.outputs.path }}"
          META_PATH="${{ steps.resolve.outputs.project_dir }}/android-release-metadata.json"

          # Create release if it doesn't exist yet
          if ! gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Creating release $TAG in $REPO"
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "${{ inputs.project }} ${{ inputs.version_name }}" \
              --notes "${{ inputs.release_notes }}" \
              --latest=false
          else
            echo "Release $TAG already exists in $REPO — uploading assets"
          fi

          # Upload APK and metadata
          gh release upload "$TAG" --repo "$REPO" --clobber \
            "$APK_PATH" \
            "$META_PATH"

          echo "Done: https://github.com/$REPO/releases/tag/$TAG"
