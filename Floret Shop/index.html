<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floret Shop - Tienda</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
    <style>
        :root {
            --pri: #8B5CF6;
            --pri-d: #7C3AED;
            --pri-l: #A78BFA;
            --glow: rgba(139, 92, 246, 0.4);
            --bg: #0F0A1A;
            --card: rgba(30, 20, 50, 0.9);
            --txt: #F8F5FF;
            --muted: #A89EC8;
            --pink: #EC4899;
            --green: #10B981;
            --warn: #F59E0B
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            overflow-x: hidden
        }

        body::before {
            content: "";
            position: fixed;
            inset: -10%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 12% 18%, rgba(139, 92, 246, 0.14), transparent 45%),
                radial-gradient(circle at 82% 76%, rgba(236, 72, 153, 0.12), transparent 42%),
                radial-gradient(circle at 48% 102%, rgba(16, 185, 129, 0.1), transparent 44%);
            filter: blur(14px);
            animation: ambientDrift 20s ease-in-out infinite alternate;
        }

        @keyframes ambientDrift {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0.88;
            }
            100% {
                transform: translate3d(1.8%, -1.6%, 0) scale(1.05);
                opacity: 1;
            }
        }

        #flowers {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        #app {
            position: relative;
            z-index: 1
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(15, 10, 26, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            z-index: 100
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pri), var(--pink));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .hdr-btns {
            display: flex;
            gap: 10px
        }

        .hdr-btn {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--txt);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: .9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: .3s;
            white-space: nowrap;
            flex-shrink: 0
        }

        .hdr-btn:hover {
            background: var(--pri);
            border-color: var(--pri);
            transform: translateY(-2px)
        }

        .quota-text {
            display: inline-block;
        }

        @media(max-width: 600px) {
            .header {
                padding: 10px 12px;
            }

            .header-core {
                grid-template-columns: auto auto;
                justify-content: space-between;
                gap: 10px;
            }

            .header-status {
                display: none;
            }

            .logo-kicker {
                display: none;
            }

            .logo-title {
                font-size: 1rem;
            }

            .hdr-btns {
                gap: 6px;
            }

            .hdr-btn {
                padding: 8px 10px;
                font-size: .8rem;
            }

            .quota-label {
                display: none;
            }
        }

        .cart-btn {
            position: relative
        }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--pink);
            font-size: .7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .rework-header {
            position: sticky;
            overflow: hidden;
            --header-sheen-x: -130%;
            --header-sheen-o: 0;
            border-bottom-color: rgba(236, 72, 153, 0.26);
            background:
                linear-gradient(120deg, rgba(12, 8, 24, 0.95), rgba(20, 12, 34, 0.95) 42%, rgba(26, 14, 38, 0.95)),
                radial-gradient(circle at 8% 25%, rgba(236, 72, 153, 0.14), transparent 42%),
                radial-gradient(circle at 86% 12%, rgba(139, 92, 246, 0.14), transparent 36%);
            box-shadow: 0 8px 34px rgba(0, 0, 0, 0.34), inset 0 -1px 0 rgba(255, 255, 255, 0.04);
        }

        .rework-header::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(100deg, transparent 22%, rgba(255, 255, 255, 0.08) 46%, transparent 70%);
            transform: translateX(var(--header-sheen-x));
            opacity: var(--header-sheen-o);
        }

        .header-core {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .logo.logo-rework {
            gap: 10px;
            min-width: 0;
            background: none;
            -webkit-text-fill-color: initial;
        }

        .logo-mark {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(236, 72, 153, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25), 0 0 16px rgba(236, 72, 153, 0.25);
            color: #f9ebff;
            flex: 0 0 auto;
        }

        .logo-copy {
            display: grid;
            gap: 0;
            min-width: 0;
            line-height: 1.05;
            color: var(--txt);
        }

        .logo-kicker {
            font-size: 0.64rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #cbb4f8;
            opacity: 0.9;
            font-weight: 600;
        }

        .logo-title {
            font-size: 1.18rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e9ddff, #ffdcf0 55%, #d6c4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .header-status {
            justify-self: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.1);
            color: #d7cbf5;
            font-size: 0.78rem;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-status-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.65);
            flex: 0 0 auto;
        }

        .hdr-btn.fx-btn {
            position: relative;
            overflow: hidden;
            background: rgba(139, 92, 246, 0.12);
            border-color: rgba(139, 92, 246, 0.36);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        .hdr-btn.fx-btn::after {
            content: "";
            position: absolute;
            inset: -40% auto -40% -60%;
            width: 44%;
            pointer-events: none;
            transform: rotate(17deg);
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.24), transparent);
            opacity: 0;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto
        }

        .title {
            font-size: 1.6rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .title i {
            color: var(--pri)
        }

        .catalog-meta {
            margin-top: -6px;
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 0.84rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sync-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 0.75rem;
            color: #d8c9ff;
        }

        .catalog-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .catalog-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(139, 92, 246, 0.22);
            border-radius: 12px;
            color: var(--txt);
            padding: 10px 11px;
            font-size: 0.86rem;
            outline: none;
        }

        .catalog-control:focus {
            border-color: var(--pri);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.18);
        }

        .seller-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .seller-stat-card {
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
        }

        .seller-stat-card b {
            display: block;
            font-size: 1.1rem;
            margin-top: 4px;
        }

        .order-line {
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
        }

        .order-status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid rgba(139, 92, 246, 0.25);
            padding: 2px 10px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #d8c9ff;
        }

        @media(max-width:640px) {
            .catalog-controls {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .seller-stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .order-line {
                padding: 9px;
            }

            .order-line .btn {
                max-width: 100% !important;
            }
        }

        .swipe {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 16px;
            padding-bottom: 16px;
            -webkit-overflow-scrolling: touch
        }

        .swipe::-webkit-scrollbar {
            display: none
        }

        .card {
            flex: 0 0 calc(100vw - 50px);
            scroll-snap-align: center;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.15);
            transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease, filter .35s ease;
            transform-style: preserve-3d;
            will-change: transform;
            position: relative
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(120deg, transparent 18%, rgba(255, 255, 255, 0.11) 46%, transparent 70%);
            transform: translateX(-140%);
            opacity: 0;
            transition: opacity .2s ease;
            z-index: 4;
        }

        .card:hover::before {
            opacity: 1;
            animation: cardSheen 1.1s ease;
        }

        @keyframes cardSheen {
            0% {
                transform: translateX(-140%);
            }
            100% {
                transform: translateX(140%);
            }
        }

        @media(min-width:768px) {
            .swipe {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                overflow: visible
            }

            .card {
                flex: none
            }
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 30px var(--glow);
            border-color: var(--pri)
        }

        .card.is-reveal {
            opacity: 0;
            transform: translateY(16px) scale(0.985);
        }

        .card.is-reveal.in {
            animation: cardReveal .55s cubic-bezier(.2, .75, .2, 1) forwards;
            animation-delay: calc(var(--reveal-index, 0) * 58ms);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1));
            transition: transform .45s ease, filter .45s ease;
            will-change: transform;
        }

        .card:hover .card-img {
            transform: scale(1.045);
            filter: saturate(1.08) contrast(1.04);
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase
        }

        .badge-new {
            background: var(--green);
            color: #fff
        }

        .badge-used {
            background: var(--warn);
            color: #1a1a1a
        }

        .card-body {
            padding: 16px
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px
        }

        .card-desc {
            font-size: .85rem;
            color: var(--muted);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .card-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--pri);
            margin-bottom: 12px
        }

        .card-btns {
            display: flex;
            gap: 8px
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: .3s;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: "";
            position: absolute;
            inset: 0 auto 0 -140%;
            width: 120%;
            background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.3) 46%, transparent 72%);
            transform: skewX(-18deg);
            pointer-events: none;
            opacity: 0;
        }

        .btn:hover::after {
            opacity: 1;
            animation: btnShine .85s ease;
        }

        @keyframes btnShine {
            from {
                left: -140%;
            }
            to {
                left: 145%;
            }
        }

        .btn-p {
            background: linear-gradient(135deg, var(--pri), var(--pri-d));
            color: #fff
        }

        .btn-p:hover {
            box-shadow: 0 4px 15px var(--glow)
        }

        .btn-s {
            background: transparent;
            border: 1px solid var(--pri);
            color: var(--pri)
        }

        .btn-s:hover {
            background: var(--pri);
            color: #fff
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: .3s
        }

        .modal-bg.on {
            opacity: 1;
            visibility: visible
        }

        .modal {
            background: var(--card);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            /* Flex layout para separar header/body/footer */
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(139, 92, 246, 0.3);
            transform: scale(.9);
            transition: .3s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-bg.on .modal {
            transform: scale(1)
        }

        .modal-hd {
            padding: 16px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .modal-hd h3 {
            font-size: 1.2rem
        }

        .modal-cl {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer
        }

        .modal-cl:hover {
            color: var(--pink)
        }

        .modal-bd {
            padding: 16px;
            overflow-y: auto;
            /* Scroll aquí */
            flex: 1;
            /* Ocupa el espacio restante */
            min-height: 0;
            /* Fix para Firefox flex items */
        }

        .frm-grp {
            margin-bottom: 14px
        }

        .frm-lbl {
            display: block;
            margin-bottom: 6px;
            font-weight: 500
        }

        .frm-inp,
        .frm-sel,
        .frm-txt {
            width: 100%;
            padding: 12px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: var(--txt);
            font-family: inherit;
            transition: .3s
        }

        .frm-inp:focus,
        .frm-sel:focus,
        .frm-txt:focus {
            outline: none;
            border-color: var(--pri);
            box-shadow: 0 0 0 3px var(--glow)
        }

        .frm-txt {
            min-height: 80px;
            resize: vertical
        }

        .cart-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 380px;
            height: 100vh;
            background: var(--card);
            border-left: 1px solid rgba(139, 92, 246, 0.3);
            z-index: 200;
            transition: .4s;
            display: flex;
            flex-direction: column
        }

        .cart-panel.on {
            right: 0
        }

        .cart-hd {
            padding: 16px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px
        }

        .cart-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 10px;
            margin-bottom: 10px
        }

        .cart-item img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover
        }

        .cart-item-info {
            flex: 1
        }

        .cart-item-name {
            font-weight: 600;
            font-size: .9rem
        }

        .cart-item-price {
            color: var(--pri);
            font-weight: 700
        }

        .cart-item-rm {
            background: none;
            border: none;
            color: var(--pink);
            cursor: pointer;
            font-size: 1.1rem
        }

        .cart-ft {
            padding: 16px;
            border-top: 1px solid rgba(139, 92, 246, 0.2)
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px
        }

        .cart-total span:last-child {
            color: var(--pri)
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 14px 20px;
            background: var(--card);
            border: 1px solid var(--green);
            border-radius: 10px;
            z-index: 3000;
            transform: translateX(150%);
            transition: .4s;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .toast.show {
            transform: translateX(0)
        }

        .admin-fab {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, var(--pri), var(--pink));
            color: #fff;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px var(--glow);
            z-index: 100
        }

        .admin-fab:hover {
            transform: scale(1.05)
        }

        .fly-cart {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3.5rem;
            opacity: 0;
            z-index: 2000;
            transition: .5s
        }

        .fly-cart.on {
            opacity: 1;
            animation: bounce .5s
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(-50%) scale(1)
            }

            50% {
                transform: translateY(-50%) scale(1.2)
            }
        }

        .fly-ball {
            position: fixed;
            width: 18px;
            height: 18px;
            background: var(--pink);
            border-radius: 50%;
            z-index: 2001;
            box-shadow: 0 0 15px var(--pink)
        }

        .cart-spark {
            position: fixed;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--pri) 62%, rgba(139, 92, 246, 0.2));
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.45);
            pointer-events: none;
            z-index: 2100;
            will-change: transform, opacity;
        }

        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--muted)
        }

        .empty i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: .5
        }

        .size-sel {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px
        }

        .size-btn {

<body>
    <canvas id="flowers"></canvas>
    <div id="app"></div>

    <script>
        const mp = new MercadoPago('APP_USR-60b879df-a71d-40eb-9366-f018d03cd83a', { locale: 'es-UY' }); // PRODUCCIÓN
        // const mp = new MercadoPago('TEST-6fa2a1c5-2d99-4fb5-8b73-9fafc9d8f50a', { locale: 'es-UY' }); // PRUEBA

        // ========== CONFIG ==========
        const API = 'https://owsdatabase.onrender.com';
        (function initOwsProjectGuard() {
            const mountGuard = () => {
                if (!window.OWSProjectRestrictionGuard || typeof window.OWSProjectRestrictionGuard.mount !== 'function') return;
                window.OWSProjectRestrictionGuard.mount({
                    apiBaseUrl: API,

            if (window.OWSProjectRestrictionGuard) {
                mountGuard();

            }
            const s = document.createElement('script');
            s.src = 'https://owsdatabase.onrender.com/shared/ows-project-guard.js';
            s.async = true;
            s.onload = mountGuard;
            document.head.appendChild(s);
        })();
        const WA_NUM1 = '59898725223'; // Ajustado sin el 0 extra si es internacional (+598 98...)
        const WA_NUM2 = '59893994250';

        // ========== STATE ==========
        function safeParseJSON(value, fallback = null) {
            try { return value ? JSON.parse(value) : fallback; } catch (_) { return fallback; }
        }
        function saveAuthUser(nextUser, remember = true) {
            const payload = nextUser ? JSON.stringify(nextUser) : '';
            if (!nextUser) {
                localStorage.removeItem('floret_user');
                sessionStorage.removeItem('floret_user');
                return;
            }
            if (remember) {
                localStorage.setItem('floret_user', payload);
                sessionStorage.removeItem('floret_user');
            } else {
                sessionStorage.setItem('floret_user', payload);
                localStorage.removeItem('floret_user');
            }
        }

        let user = safeParseJSON(localStorage.getItem('floret_user')) || safeParseJSON(sessionStorage.getItem('floret_user')) || null;
        let cart = JSON.parse(localStorage.getItem('floret_cart')) || [];
        let products = [];
        const FLORET_MAIN_SELLER_EMAIL = 'karatedojor@gmail.com';
        function isFloretCoreAdminAccount(account) {
            if (!account) return false;
            const email = String(account.email || '').trim().toLowerCase();
            const username = String(account.username || '').trim().toLowerCase();
            return email === FLORET_MAIN_SELLER_EMAIL || username === 'malevo' || username === 'oceanandwild';
        }
        let isAdmin = isFloretCoreAdminAccount(user);
        let quota = null;
        let catalogLastSync = null;
        let catalogSyncState = 'idle';
        let catalogSyncError = '';
        let productReviewsCache = {};
        let sellerReviewsCache = null;
        let allReviewsCache = null;
        let malevoNotifications = [];
        let malevoUnreadCount = 0;
        let malevoSessionInsights = null;
        let malevoQuotaWatcher = null;
        let malevoLastRemaining = null;
        let filteredProducts = [];
        let catalogFilters = {
            query: '',
            condition: 'all',
            stock: 'all',
            minPrice: '',
            maxPrice: '',
            sort: 'recent'
        };
        let sellerDashboardCache = null;
        let sellerOrdersCache = [];
        let sellerOrdersStatusFilter = 'all';

        async function loadQuota() {
            if (!user || user.power_level !== 1) return;
            try {
                const res = await fetch(`${API}/floret/quota/${user.id}`);
                quota = await res.json();
                render();
            } catch (e) {
                console.error("Error cargando cuota:", e);
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatStars(rating = 0) {
            const safeRating = Math.max(0, Math.min(5, Number(rating) || 0));
            const full = Math.round(safeRating);
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += `<i class="fas fa-star" style="opacity:${i <= full ? 1 : 0.28}"></i>`;
            }
            return html;
        }

        function isMalevoSession() {
            return isFloretCoreAdminAccount(user);
        }

        function formatDateTime(dateValue) {
            try {
                return new Date(dateValue).toLocaleString();
            } catch (_e) {
                return String(dateValue || '');
            }
        }

        async function loadProductReviews(productId, force = false) {
            const safeId = Number(productId);
            if (!safeId) return { summary: { count: 0, avgRating: 0 }, reviews: [] };
            if (!force && productReviewsCache[safeId]) return productReviewsCache[safeId];
            const res = await fetch(`${API}/floret/reviews/product/${safeId}`, { cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'No se pudieron cargar reviews');
            productReviewsCache[safeId] = data;
            return data;
        }

        async function loadSellerReviews(force = false) {
            if (!force && sellerReviewsCache) return sellerReviewsCache;
            const res = await fetch(`${API}/floret/reviews/seller?sellerEmail=${encodeURIComponent(FLORET_MAIN_SELLER_EMAIL)}`, { cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'No se pudieron cargar reviews de vendedor');
            sellerReviewsCache = data;
            return data;
        }

        async function loadAllReviews(force = false) {
            if (!user || !isMalevoSession()) throw new Error('Acceso restringido');
            if (!force && allReviewsCache) return allReviewsCache;
            const res = await fetch(`${API}/floret/reviews/all?userId=${encodeURIComponent(user.id)}&email=${encodeURIComponent(user.email || '')}`, { cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'No se pudo cargar centro de reviews');
            allReviewsCache = data;
            return data;
        }

        async function loadMalevoNotifications(force = false) {
            if (!user || !isMalevoSession()) return { notifications: [], unreadCount: 0 };
            if (!force && malevoNotifications.length > 0) {
                return { notifications: malevoNotifications, unreadCount: malevoUnreadCount };
            }
            const res = await fetch(`${API}/floret/notifications?userId=${encodeURIComponent(user.id)}&email=${encodeURIComponent(user.email || '')}`, { cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'No se pudieron cargar notificaciones');
            malevoNotifications = Array.isArray(data.notifications) ? data.notifications : [];
            malevoUnreadCount = Number(data.unreadCount || 0);
            return { notifications: malevoNotifications, unreadCount: malevoUnreadCount };
        }

        function normalizeCatalogNumber(value) {
            const raw = String(value ?? '').trim();
            if (!raw) return null;
            const parsed = Number(raw);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function applyCatalogFilters(options = {}) {
            const { rerender = true } = options;
            const query = String(catalogFilters.query || '').trim().toLowerCase();
            const minPrice = normalizeCatalogNumber(catalogFilters.minPrice);
            const maxPrice = normalizeCatalogNumber(catalogFilters.maxPrice);

            filteredProducts = products.filter((product) => {
                const conditionOk = catalogFilters.condition === 'all' || String(product.condition || '').toLowerCase() === catalogFilters.condition;
                const stockValue = Number(product.stock || 0);
                const stockOk =
                    catalogFilters.stock === 'all' ||
                    (catalogFilters.stock === 'in' && stockValue > 0) ||
                    (catalogFilters.stock === 'low' && stockValue > 0 && stockValue <= 4) ||
                    (catalogFilters.stock === 'out' && stockValue <= 0);
                const queryOk = !query || [product.name, product.description, product.condition]
                    .map((v) => String(v || '').toLowerCase())
                    .some((v) => v.includes(query));
                const minOk = minPrice === null || Number(product.price || 0) >= minPrice;
                const maxOk = maxPrice === null || Number(product.price || 0) <= maxPrice;
                return conditionOk && stockOk && queryOk && minOk && maxOk;
            });

            const sortMode = String(catalogFilters.sort || 'recent');
            filteredProducts.sort((a, b) => {
                if (sortMode === 'price-asc') return Number(a.price || 0) - Number(b.price || 0);
                if (sortMode === 'price-desc') return Number(b.price || 0) - Number(a.price || 0);
                if (sortMode === 'stock-desc') return Number(b.stock || 0) - Number(a.stock || 0);
                if (sortMode === 'rating-desc') return Number((b.reviewSummary || {}).avgRating || 0) - Number((a.reviewSummary || {}).avgRating || 0);
                return Number(b.id || 0) - Number(a.id || 0);
            });

            if (rerender) {
                renderProducts();
            }

            const summary = document.getElementById('catalog-results');
            if (summary) {
                summary.textContent = `${filteredProducts.length} resultados de ${products.length}`;
            }
        }

        function updateCatalogFilter(field, value) {
            catalogFilters[field] = value;
            applyCatalogFilters({ rerender: true });
        }

        async function loadSellerDashboard(force = false) {
            if (!user || !isMalevoSession()) throw new Error('Solo perfiles de venta autorizados');
            if (!force && sellerDashboardCache) return sellerDashboardCache;
            const res = await fetch(`${API}/floret/seller/dashboard?userId=${encodeURIComponent(user.id)}&email=${encodeURIComponent(user.email || '')}`, { cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'No se pudo cargar el dashboard');
            sellerDashboardCache = data;
            return data;
        }

        async function loadSellerOrders(force = false) {
            if (!user || !isMalevoSession()) throw new Error('Solo perfiles de venta autorizados');
            if (!force && sellerOrdersCache.length) return sellerOrdersCache;
            const statusParam = sellerOrdersStatusFilter !== 'all' ? `&status=${encodeURIComponent(sellerOrdersStatusFilter)}` : '';
            const res = await fetch(`${API}/floret/seller/orders?userId=${encodeURIComponent(user.id)}&email=${encodeURIComponent(user.email || '')}${statusParam}&limit=120`, { cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'No se pudieron cargar ordenes');
            sellerOrdersCache = Array.isArray(data.orders) ? data.orders : [];
            return sellerOrdersCache;
        }

        // ========== FLOWERS CANVAS ==========
        const canvas = document.getElementById('flowers');
        const ctx = canvas.getContext('2d');
        let flowers = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createFlower(x, y) {
            return {
                x, y,
                size: Math.random() * 20 + 15,
                petals: Math.floor(Math.random() * 3) + 5,
                color: `hsla(${270 + Math.random() * 40}, 70%, 60%, ${Math.random() * 0.3 + 0.1})`,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.01
            };
        }

        function initFlowers() {
            flowers = [];
            for (let i = 0; i < 25; i++) {
                flowers.push(createFlower(Math.random() * canvas.width, Math.random() * canvas.height));
            }
        }

        function drawFlower(f) {
            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.rotate(f.rotation);
            ctx.fillStyle = f.color;
            for (let i = 0; i < f.petals; i++) {
                ctx.beginPath();
                ctx.ellipse(0, -f.size * 0.6, f.size * 0.3, f.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate((Math.PI * 2) / f.petals);
            }
            ctx.beginPath();
            ctx.arc(0, 0, f.size * 0.25, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(45, 80%, 60%, 0.5)`;
            ctx.fill();
            ctx.restore();
        }

        function animateFlowers() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            flowers.forEach(f => {
                f.rotation += f.rotSpeed;
                drawFlower(f);
            });
            requestAnimationFrame(animateFlowers);
        }

        // ========== RENDER ==========
        function render() {

            }
            const catalogSyncTag = getCatalogSyncLabel();

            app.innerHTML = `
    <header class="header rework-header" id="main-header">

        </div>

          ${user && user.power_level === 1 ? `<div class="hdr-btn fx-btn" style="background:rgba(236,72,153,0.15);border-color:var(--pink);cursor:default" title="Cuota"><i class="fas fa-fire" style="color:var(--pink)"></i> <b style="margin-left:5px;color:#fff;font-size:0.85rem">${quotaText}</b></div>` : ''}
          ${user ? `<button class="hdr-btn fx-btn" onclick="openProfile()"><i class="fas fa-user"></i> ${user.username}${isMalevoSession() && malevoUnreadCount > 0 ? `<span class="notif-badge">${malevoUnreadCount}</span>` : ''}</button>` : `<button class="hdr-btn fx-btn" onclick="openAuth()"><i class="fas fa-user"></i> <span>Entrar</span></button>`}
          <button class="hdr-btn fx-btn" onclick="refreshCatalog()" title="Sincronizar catalogo"><i class="fas fa-rotate"></i> Sync</button>
          <button class="hdr-btn fx-btn cart-btn" onclick="openCart()">
            <i class="fas fa-shopping-cart"></i>
            ${cart.length > 0 ? `<span class="cart-count">${cart.length}</span>` : ''}
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <h2 class="title"><i class="fas fa-store"></i> Productos</h2>
      <div class="catalog-meta">
        <span class="sync-tag" id="catalog-sync-tag">${catalogSyncTag}</span>

      </div>
      <div class="catalog-controls">
        <input class="catalog-control" placeholder="Buscar por nombre o descripcion" value="${escapeHtml(catalogFilters.query)}" oninput="updateCatalogFilter('query', this.value)">
        <select class="catalog-control" onchange="updateCatalogFilter('condition', this.value)">
          <option value="all" ${catalogFilters.condition === 'all' ? 'selected' : ''}>Condicion: todas</option>
          <option value="nuevo" ${catalogFilters.condition === 'nuevo' ? 'selected' : ''}>Solo nuevo</option>

        </select>
        <select class="catalog-control" onchange="updateCatalogFilter('stock', this.value)">
          <option value="all" ${catalogFilters.stock === 'all' ? 'selected' : ''}>Stock: todos</option>
          <option value="in" ${catalogFilters.stock === 'in' ? 'selected' : ''}>Con stock</option>
          <option value="low" ${catalogFilters.stock === 'low' ? 'selected' : ''}>Stock bajo (1-4)</option>
          <option value="out" ${catalogFilters.stock === 'out' ? 'selected' : ''}>Agotados</option>
        </select>
        <input class="catalog-control" type="number" min="0" placeholder="Precio min" value="${escapeHtml(catalogFilters.minPrice)}" oninput="updateCatalogFilter('minPrice', this.value)">
        <input class="catalog-control" type="number" min="0" placeholder="Precio max" value="${escapeHtml(catalogFilters.maxPrice)}" oninput="updateCatalogFilter('maxPrice', this.value)">
        <select class="catalog-control" onchange="updateCatalogFilter('sort', this.value)">
          <option value="recent" ${catalogFilters.sort === 'recent' ? 'selected' : ''}>Orden: mas recientes</option>
          <option value="price-asc" ${catalogFilters.sort === 'price-asc' ? 'selected' : ''}>Precio: menor a mayor</option>

        function renderProducts() {

        let slideshowInterval;
        function startSlideshow() {
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(() => {
                document.querySelectorAll('.slideshow-img').forEach(img => {
                    const srcList = img.dataset.imgs ? img.dataset.imgs.split(',') : [];
                    if (srcList.length > 1) {
                        let currentIdx = parseInt(img.dataset.idx || 0);
                        let nextIdx = (currentIdx + 1) % srcList.length;

                        // Efecto simple de cambio
                        img.style.opacity = '0.7';
                        setTimeout(() => {
                            img.src = srcList[nextIdx];
                            img.dataset.idx = nextIdx;
                            img.style.opacity = '1';
                        }, 200);
                    }
                });
            }, 3000); // Cambia cada 3 segundos
        }

        function initProductFx() {
            const cards = Array.from(document.querySelectorAll('#products-grid .card.is-reveal'));
            if (!cards.length) return;
            const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            cards.forEach((card, idx) => {
                card.style.setProperty('--reveal-index', String(idx % 12));
            });
            if (reduceMotion || !('IntersectionObserver' in window)) {
                cards.forEach((card) => card.classList.add('in'));
            } else {
                const observer = new IntersectionObserver((entries, obs) => {
                    entries.forEach((entry) => {
                        if (!entry.isIntersecting) return;
                        entry.target.classList.add('in');
                        obs.unobserve(entry.target);
                    });
                }, { threshold: 0.12 });
                cards.forEach((card) => observer.observe(card));
            }

            if (reduceMotion) return;
            cards.forEach((card) => {
                card.addEventListener('pointermove', (ev) => {
                    const rect = card.getBoundingClientRect();
                    const cx = rect.left + rect.width * 0.5;
                    const cy = rect.top + rect.height * 0.5;
                    const dx = (ev.clientX - cx) / Math.max(rect.width, 1);
                    const dy = (ev.clientY - cy) / Math.max(rect.height, 1);
                    const rotateY = Math.max(-5, Math.min(5, dx * 8));
                    const rotateX = Math.max(-4, Math.min(4, -dy * 8));
                    card.style.transform = `translateY(-6px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });
                card.addEventListener('pointerleave', () => {
                    card.style.transform = '';
                });
            });
        }

        function initHeaderFx() {
            const header = document.getElementById('main-header');
            if (!header) return;
            const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const logo = document.getElementById('header-logo');
            const status = document.getElementById('header-status-pill');
            const buttons = Array.from(header.querySelectorAll('.hdr-btn.fx-btn'));

            if (typeof window.gsap !== 'undefined') {
                window.gsap.killTweensOf([header, logo, status, ...buttons]);
                window.gsap.set([logo, status, ...buttons], { clearProps: 'all' });
                if (!reduceMotion) {
                    window.gsap.fromTo(header, { y: -18, opacity: 0 }, { y: 0, opacity: 1, duration: 0.46, ease: 'power2.out' });
                    window.gsap.fromTo([logo, status], { y: 10, opacity: 0 }, {
                        y: 0, opacity: 1, duration: 0.4, ease: 'power2.out', stagger: 0.07
                    });
                    window.gsap.fromTo(buttons, { y: 10, opacity: 0 }, {
                        y: 0, opacity: 1, duration: 0.34, ease: 'power2.out', stagger: 0.05, delay: 0.06
                    });

                    if (status) {
                        window.gsap.to(status, { y: -1.5, duration: 1.9, yoyo: true, repeat: -1, ease: 'sine.inOut' });
                    }

                    buttons.forEach((btn) => {
                        btn.addEventListener('pointermove', (ev) => {
                            const rect = btn.getBoundingClientRect();
                            const dx = ((ev.clientX - rect.left) / Math.max(rect.width, 1)) - 0.5;
                            const dy = ((ev.clientY - rect.top) / Math.max(rect.height, 1)) - 0.5;
                            window.gsap.to(btn, { x: dx * 5, y: dy * 3, duration: 0.18, ease: 'power2.out' });
                        });
                        btn.addEventListener('pointerleave', () => {
                            window.gsap.to(btn, { x: 0, y: 0, duration: 0.22, ease: 'power2.out' });
                        });
                    });
                }
            }

            if (!reduceMotion && typeof window.anime !== 'undefined') {
                const mark = logo?.querySelector('.logo-mark');
                const headerSheen = header;
                if (mark) {
                    window.anime({
                        targets: mark,
                        scale: [1, 1.045, 1],
                        rotate: [0, -2, 0, 2, 0],
                        duration: 3000,
                        easing: 'easeInOutSine',
                        loop: true
                    });
                }
                if (headerSheen) {
                    window.anime({
                        targets: headerSheen,
                        duration: 1100,
                        easing: 'easeOutQuad',
                        begin: () => {
                            headerSheen.style.setProperty('--header-sheen-active', '1');
                            const sheen = getComputedStyle(headerSheen, '::before');
                            if (sheen) {
                                headerSheen.style.setProperty('--header-sheen-active', '1');
                            }
                        },
                        complete: () => {
                            headerSheen.style.setProperty('--header-sheen-active', '0');
                        }
                    });
                    header.style.setProperty('--header-sheen-active', '1');
                    if (typeof window.gsap !== 'undefined') {
                        window.gsap.fromTo(header, { '--header-sheen-x': '-130%', '--header-sheen-o': 0 }, {
                            '--header-sheen-x': '130%',
                            '--header-sheen-o': 1,
                            duration: 1.1,
                            ease: 'power1.out',
                            onComplete: () => header.style.setProperty('--header-sheen-o', '0')
                        });
                    }
                }
            }
        }

        function renderCart() {
            const itemsEl = document.getElementById('cart-items');

        // ========== CART FUNCTIONS ==========
        function openCart() { document.getElementById('cart-panel').classList.add('on'); }
        function closeCart() { document.getElementById('cart-panel').classList.remove('on'); }

        function addToCart(idx, evt) {
            const p = products[idx];
            if ((p.stock || 0) <= 0) return showToast('Producto agotado', true);

            // Verificar si ya agregamos más del stock disponible
            const inCart = cart.filter(c => c.name === p.name).length;
            if (inCart >= p.stock) return showToast('No hay más unidades disponibles', true);

            const item = { name: p.name, price: p.price, image: p.images[0] || '', size: null, originalIdx: idx, productId: p.id }; // Guardamos idx para referencias

            if (p.requiresSize && p.sizes?.length) {
                openSizeModal(idx);
                return;
            }

            cart.push(item);
            localStorage.setItem('floret_cart', JSON.stringify(cart));
            animateAddToCart(evt, item.image, idx, p.id);
            render();
            showToast('Agregado al carrito');
        }

        function addToCartWithSize(idx, size) {
            const p = products[idx];
            // Verificar stock nuevamente
            const inCart = cart.filter(c => c.name === p.name).length;
            if (inCart >= p.stock) {
                closeModal();
                return showToast('No hay más unidades disponibles', true);
            }

            cart.push({ name: p.name, price: p.price, image: p.images[0] || '', size, originalIdx: idx, productId: p.id });
            localStorage.setItem('floret_cart', JSON.stringify(cart));
            triggerCartBurst(window.innerWidth * 0.5, window.innerHeight * 0.58);
            animateAddToCart(null, p.images[0] || '', idx, p.id);
            closeModal();
            render();
            showToast('Agregado al carrito');
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            localStorage.setItem('floret_cart', JSON.stringify(cart));
            renderCart();
        }

        function isAndroidTouchRuntime() {
            const ua = String(navigator.userAgent || '').toLowerCase();
            const touchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            return ua.includes('android') || (touchDevice && window.matchMedia('(max-width: 980px)').matches);
        }

        function getEventClientPoint(evt) {
            if (!evt) return null;
            const touch = evt.touches?.[0] || evt.changedTouches?.[0];
            if (touch) return { x: touch.clientX, y: touch.clientY };
            if (typeof evt.clientX === 'number' && typeof evt.clientY === 'number') {
                return { x: evt.clientX, y: evt.clientY };
            }
            return null;
        }

        function resolveCardImage(productId = 0, evt = null) {
            if (Number(productId) > 0) {
                const byProductId = document.querySelector(`#products-grid .card[data-product-id="${Number(productId)}"] .card-img`);
                if (byProductId) return byProductId;
            }
            const eventTarget = evt?.target;
            if (eventTarget?.closest) {
                const fromCard = eventTarget.closest('.card')?.querySelector('.card-img');
                if (fromCard) return fromCard;
            }
            return document.querySelector('#products-grid .card .card-img');
        }

        function animateAddToCart(evt, imageSrc = '', idx = -1, productId = 0) {
            const flyCart = document.getElementById('fly-cart');
            flyCart.classList.add('on');
            const point = getEventClientPoint(evt);
            const originX = point?.x || window.innerWidth / 2;
            const originY = point?.y || window.innerHeight / 2;
            triggerCartBurst(originX, originY);

            const cartBtn = document.querySelector('.cart-btn');
            const cartRect = cartBtn?.getBoundingClientRect?.();
            const targetX = cartRect ? (cartRect.left + cartRect.width * 0.5) : 60;
            const targetY = cartRect ? (cartRect.top + cartRect.height * 0.5) : (window.innerHeight / 2);

            const cardImage = resolveCardImage(productId, evt);
            const imgRect = cardImage?.getBoundingClientRect?.();
            const androidMode = isAndroidTouchRuntime();
            const startW = imgRect ? Math.min(androidMode ? 108 : 130, Math.max(androidMode ? 64 : 80, imgRect.width * (androidMode ? 0.26 : 0.36))) : (androidMode ? 80 : 96);
            const startH = imgRect ? Math.min(androidMode ? 84 : 104, Math.max(androidMode ? 44 : 60, imgRect.height * (androidMode ? 0.26 : 0.36))) : (androidMode ? 58 : 72);
            const startX = imgRect ? (imgRect.left + imgRect.width * 0.5 - startW * 0.5) : (originX - startW * 0.5);
            const startY = imgRect ? (imgRect.top + imgRect.height * 0.5 - startH * 0.5) : (originY - startH * 0.5);

            const ghost = document.createElement('img');
            ghost.className = 'fly-product-ghost';
            ghost.src = imageSrc || cardImage?.getAttribute('src') || 'https://via.placeholder.com/300x220/1a1025/8B5CF6?text=Producto';
            ghost.alt = '';
            ghost.draggable = false;
            Object.assign(ghost.style, {
                position: 'fixed',
                left: `${startX}px`,
                top: `${startY}px`,
                width: `${startW}px`,
                height: `${startH}px`,
                borderRadius: '12px',
                border: '1px solid rgba(255,255,255,0.26)',
                objectFit: 'cover',
                zIndex: '2400',
                pointerEvents: 'none',
                boxShadow: '0 14px 34px rgba(0,0,0,0.35), 0 0 18px rgba(139,92,246,0.36)'
            });
            document.body.appendChild(ghost);

            if (typeof window.gsap === 'undefined') {
                const ball = document.createElement('div');
                ball.className = 'fly-ball';
                ball.style.left = originX + 'px';
                ball.style.top = originY + 'px';
                document.body.appendChild(ball);
                ball.animate([
                    { left: ball.style.left, top: ball.style.top },
                    { left: targetX + 'px', top: targetY + 'px' }
                ], { duration: 500, easing: 'ease-in' }).onfinish = () => {
                    ball.remove();
                    ghost.remove();
                    flyCart.classList.remove('on');
                };
                return;
            }

            if (androidMode) {
                const midX = startX + (targetX - startX) * 0.58;
                const midY = startY - Math.max(42, Math.min(110, Math.abs(targetY - startY) * 0.26));
                const tl = window.gsap.timeline({
                    onComplete: () => {
                        ghost.remove();
                        window.gsap.fromTo(flyCart, { scale: 1 }, { scale: 1.12, duration: 0.12, yoyo: true, repeat: 1, ease: 'power1.inOut' });
                        setTimeout(() => flyCart.classList.remove('on'), 180);
                    }
                });
                tl.to(ghost, {
                    duration: 0.24,
                    left: midX,
                    top: midY,
                    width: Math.max(36, startW * 0.58),
                    height: Math.max(26, startH * 0.58),
                    opacity: 0.9,
                    ease: 'power1.out'
                }).to(ghost, {
                    duration: 0.3,
                    left: targetX - 12,
                    top: targetY - 12,
                    width: 24,
                    height: 18,
                    opacity: 0.2,
                    ease: 'power2.inOut'
                });
                return;
            }

            window.gsap.to(ghost, {
                duration: 0.62,
                left: targetX - 18,
                top: targetY - 18,
                width: 34,
                height: 26,
                opacity: 0.28,
                rotate: 12,
                ease: 'power2.inOut',
                onComplete: () => {
                    ghost.remove();
                    window.gsap.fromTo(flyCart, { scale: 1 }, { scale: 1.18, duration: 0.16, yoyo: true, repeat: 1, ease: 'power1.inOut' });
                    setTimeout(() => flyCart.classList.remove('on'), 220);
                }
            });
        }

        function triggerCartBurst(x, y) {
            const count = 10;
            for (let i = 0; i < count; i++) {
                const spark = document.createElement('div');
                spark.className = 'cart-spark';
                spark.style.left = `${x}px`;
                spark.style.top = `${y}px`;
                document.body.appendChild(spark);
                const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.35);
                const distance = 26 + Math.random() * 42;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                spark.animate([
                    { transform: 'translate3d(0,0,0) scale(1)', opacity: 1 },
                    { transform: `translate3d(${dx}px, ${dy}px, 0) scale(0.2)`, opacity: 0 }
                ], { duration: 460 + Math.random() * 180, easing: 'cubic-bezier(0.2,0.8,0.2,1)' }).onfinish = () => spark.remove();
            }
        }

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">

      <div style="font-size:1.6rem;font-weight:700;color:var(--pri);margin-top:16px">$${p.price.toLocaleString()}</div>

            } catch (error) {

        function renderStarPicker(selected = 5, inputId = 'review-stars') {
            const safeSelected = Math.max(1, Math.min(5, Number(selected) || 5));
            return `

    <div class="star-picker" data-target="${inputId}">
      ${[1, 2, 3, 4, 5].map(v => `<i class="fas fa-star ${v <= safeSelected ? 'on' : ''}" onclick="setStarValue('${inputId}', ${v}, this)"></i>`).join('')}
    </div>
  `;
        }

        function setStarValue(inputId, value, iconEl) {
            const input = document.getElementById(inputId);
            if (!input) return;
            input.value = String(value);
            const root = iconEl?.parentElement;
            if (!root) return;
            const stars = root.querySelectorAll('i');
            stars.forEach((star, idx) => star.classList.toggle('on', idx < value));
        }

            await markMalevoNotificationRead(notificationId);
            malevoNotifications = malevoNotifications.map(n => n.id === notificationId ? { ...n, is_read: true } : n);
            malevoUnreadCount = malevoNotifications.filter(n => !n.is_read).length;
            render();

            if (scope === 'order' || String(type || '').startsWith('order_')) {
                return openSellerOperationsPanel(Number(orderId || 0) || null);
            }
            if (scope === 'stock' || type === 'stock_low') {
                return openSellerOperationsPanel(null);

                return openSellerReviewsPanel();
            }

        async function saveEditedProduct(productId) {
            const btn = document.getElementById('edit-p-save');
            if (!btn) return;
            const payload = {
                name: document.getElementById('edit-p-name')?.value || '',
                description: document.getElementById('edit-p-desc')?.value || '',
                price: Number(document.getElementById('edit-p-price')?.value || 0),
                stock: Math.max(0, Number(document.getElementById('edit-p-stock')?.value || 0)),
                condition: document.getElementById('edit-p-cond')?.value || 'Nuevo',
                requiresSize: !!document.getElementById('edit-p-size')?.checked,
                sizes: String(document.getElementById('edit-p-sizes')?.value || '').split(',').map((s) => s.trim()).filter(Boolean),
                measurements: document.getElementById('edit-p-meas')?.value || ''
            };
            if (!payload.name.trim()) return showToast('El nombre es obligatorio', true);
            if (!Number.isFinite(payload.price) || payload.price <= 0) return showToast('Precio invalido', true);

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            try {
                await updateAdminProduct(productId, payload);
                sellerDashboardCache = null;
                await loadProducts({ silent: true, showErrorToast: false });
                showToast('Producto actualizado');
                openSellerOperationsPanel();
            } catch (error) {
                showToast(error.message || 'No se pudo guardar', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Guardar cambios';
            }
        }

        function setActiveAuthTab(type) {
            document.querySelectorAll('.auth-tab').forEach((tab) => {
                tab.classList.toggle('on', tab.dataset.auth === type);
            });
        }

        function switchAuth(type, el) {
            if (el) setActiveAuthTab(type);
            if (type === 'login') return showLoginForm();
            if (type === 'register') return showRegisterForm();
            return showResetForm();
        }

        function togglePasswordVisibility(inputId, buttonEl) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const reveal = input.type === 'password';
            input.type = reveal ? 'text' : 'password';
            if (buttonEl) buttonEl.innerHTML = reveal ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        }

        function isValidPassword(pass) {
            const value = String(pass || '');
            return value.length >= 8 && /[A-Za-z]/.test(value) && /\d/.test(value);
        }

        function normalizeAuthField(value, maxLen = 120) {
            return String(value || '').normalize('NFKC').replace(/\s+/g, ' ').trim().slice(0, maxLen);
        }

        function isValidAuthUsername(username) {
            const clean = normalizeAuthField(username, 32);
            return /^[\p{L}\p{N}._-]{3,32}$/u.test(clean);
        }

        function isValidAuthEmail(email) {
            const clean = normalizeAuthField(email, 120).toLowerCase();
            return !clean || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clean);
        }

        function setAuthModalOverlay(active, label = 'Validando...', subline = '') {

        function formatDurationText(ms = 0) {
            const safe = Math.max(0, Number(ms || 0));
            if (!safe) return 'menos de 1 minuto';
            const totalSeconds = Math.floor(safe / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            if (hours > 0) return `${hours}h ${minutes}m ${seconds}s`;
            return `${minutes}m ${seconds}s`;
        }

        function getQuotaRemainingValue(quotaData) {
            if (!quotaData) return 0;
            if (Number.isFinite(Number(quotaData.remaining))) return Math.max(0, Number(quotaData.remaining));
            const maxDaily = Number(quotaData.max_daily || 0);
            const used = Number(quotaData.uploads_today || 0);
            return Math.max(0, maxDaily - used);
        }

        async function typeLine(el, text, speed = 22) {
            if (!el) return;
            el.textContent = '';
            const content = String(text || '');
            for (let i = 0; i < content.length; i++) {
                el.textContent += content[i];
                await waitMs(speed);
            }
        }

        async function renderMalevoGrantIcon(targetId) {
            const el = document.getElementById(targetId);
            if (!el || !window.PIXI) return null;
            const app = new PIXI.Application();
            await app.init({ resizeTo: el, backgroundAlpha: 0, antialias: true });
            el.appendChild(app.canvas);
            const badge = new PIXI.Graphics();
            badge.roundRect(20, 20, 48, 48, 12).fill({ color: 0xec4899, alpha: 0.3 }).stroke({ color: 0xf8d2eb, width: 2, alpha: 0.8 });
            const star = new PIXI.Graphics();
            const cx = 44;
            const cy = 42;
            const outer = 14;
            const inner = 6;
            const points = [];
            for (let i = 0; i < 10; i++) {
                const angle = (-Math.PI / 2) + (i * Math.PI / 5);
                const r = i % 2 === 0 ? outer : inner;
                points.push(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
            }
            star.poly(points).fill({ color: 0xfff1a8, alpha: 1 });
            app.stage.addChild(badge, star);
            app.ticker.add((ticker) => {
                const t = ticker.lastTime / 1000;
                star.scale.set(1 + Math.sin(t * 3.2) * 0.08);
                star.rotation = Math.sin(t * 1.8) * 0.08;
            });
            return app;
        }

        async function showMalevoQuotaGrantedModal(delta = 0, remaining = 0, maxDaily = 4) {
            openModal(`
      <div class="modal-hd"><h3><i class="fas fa-gift"></i> Felicidades</h3><button class="modal-cl" onclick="closeModal()"><i class="fas fa-times"></i></button></div>

          <p class="malevo-grant-text" style="margin-top:8px">Incremento detectado: +${Math.max(0, Number(delta || 0))}<br>Disponible ahora: ${remaining}/${maxDaily}</p>
          <button class="btn btn-p" style="width:100%;margin-top:14px" onclick="closeModal()"><i class="fas fa-check"></i> Entendido</button>
        </div>
      </div>
    `, 'malevo-grant-modal');
            let pixi = null;
            try {
                pixi = await renderMalevoGrantIcon('malevo-grant-icon');
            } catch (_e) {
                pixi = null;
            }
            const cleanup = () => {
                if (pixi) {
                    try { pixi.destroy(true); } catch (_err) { }
                    pixi = null;
                }
                document.removeEventListener('keydown', onEsc, true);
            };
            const modalBg = document.getElementById('modal');
            const observer = new MutationObserver(() => {
                if (!modalBg.classList.contains('on')) {
                    observer.disconnect();
                    cleanup();
                }
            });
            observer.observe(modalBg, { attributes: true, attributeFilter: ['class'] });
            const onEsc = (ev) => {
                if (ev.key === 'Escape') cleanup();
            };
            document.addEventListener('keydown', onEsc, true);
        }

        function startMalevoQuotaWatcher() {
            stopMalevoQuotaWatcher();
            if (!malevoSessionInsights?.flags?.server_verified_malevo || !user?.id) return;
            malevoLastRemaining = getQuotaRemainingValue(malevoSessionInsights?.quota);
            const tick = async () => {
                if (!user?.id) return;
                try {
                    const res = await fetch(`${API}/floret/quota/${user.id}`, { cache: 'no-store' });
                    const nextQuota = await res.json();
                    if (!res.ok) return;
                    const nextRemaining = getQuotaRemainingValue(nextQuota);
                    if (Number.isFinite(malevoLastRemaining) && nextRemaining > malevoLastRemaining) {
                        const delta = nextRemaining - malevoLastRemaining;
                        malevoLastRemaining = nextRemaining;
                        malevoSessionInsights = { ...(malevoSessionInsights || {}), quota: nextQuota };
                        showMalevoQuotaGrantedModal(delta, nextRemaining, Number(nextQuota.max_daily || 4));
                    } else {
                        malevoLastRemaining = nextRemaining;
                        malevoSessionInsights = { ...(malevoSessionInsights || {}), quota: nextQuota };
                    }
                } catch (_e) {
                    // noop
                }
            };
            tick();
            malevoQuotaWatcher = setInterval(tick, 7000);
        }

        async function doLogin() {
            const identifier = normalizeAuthField(document.getElementById('login-user').value, 120);
            const password = String(document.getElementById('login-pass').value || '').normalize('NFKC');
            const remember = document.getElementById('login-remember')?.checked !== false;
            if (!identifier || !password) return showToast('Completa todos los campos', true);
            if (identifier.length < 3) return showToast('El usuario o email es demasiado corto', true);
            setLoginButtonState('loading');

            try {
                const res = await fetch(API + '/floret/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, username: identifier, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                setLoginButtonState('success');
                await waitMs(280);
                setAuthModalOverlay(true, 'Sincronizando sesión...', 'Validando acceso');
                user = data.user;
                isAdmin = isFloretCoreAdminAccount(user);
                saveAuthUser(user, remember);
                malevoSessionInsights = await fetchSessionInsights();
                const isMalevoVerified = Boolean(malevoSessionInsights?.flags?.server_verified_malevo);
                if (isMalevoVerified) {
                    await playMalevoModalIntro(malevoSessionInsights);
                } else {
                    await waitMs(520);
                }
                closeModal();
                await showWelcomeSequence(user?.username || 'Usuario');
                render();
                if (user.power_level === 1) loadQuota();
                if (isMalevoSession()) {
                    await loadMalevoNotifications(true).catch(() => null);
                    render();
                }
                if (isMalevoVerified) {
                    showToast('Verificando si hay cambios en tu cuota...');
                    // Detect pre-existing quota grant: if remaining > base max_daily (4),
                    // OceanandWild already granted extra quota before this login
                    const loginQuota = malevoSessionInsights?.quota;
                    const loginRemaining = getQuotaRemainingValue(loginQuota);
                    const baseMaxDaily = 4;
                    if (loginRemaining > baseMaxDaily) {
                        const delta = loginRemaining - baseMaxDaily;
                        await showMalevoQuotaGrantedModal(delta, loginRemaining, Number(loginQuota?.max_daily || baseMaxDaily));
                    }
                    startMalevoQuotaWatcher();
                } else {
                    stopMalevoQuotaWatcher();
                }
                showToast('¡Bienvenido!');
            } catch (e) {
                setAuthModalOverlay(false);
                setLoginButtonState('idle');
                showToast(e.message || 'Error al iniciar sesión', true);
            }
        }

        async function doRegister() {
            const username = normalizeAuthField(document.getElementById('reg-user').value, 32);
            const email = normalizeAuthField(document.getElementById('reg-email').value, 120).toLowerCase();
            const password = String(document.getElementById('reg-pass').value || '').normalize('NFKC');
            if (!username || !email || !password) return showToast('Completa todos los campos', true);
            if (!isValidAuthUsername(username)) return showToast('Usuario inválido. Usa 3-32 caracteres (letras, números, punto, guion o _).', true);
            if (!isValidAuthEmail(email)) return showToast('Ingresa un email válido.', true);
            if (!isValidPassword(password)) {
                return showToast('La contraseña debe tener 8+ caracteres e incluir números', true);
            }

            try {
                const res = await fetch(API + '/floret/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                user = data.user;
                isAdmin = isFloretCoreAdminAccount(user);
                saveAuthUser(user, true);
                closeModal();
                render();
                if (isMalevoSession()) {
                    await loadMalevoNotifications(true).catch(() => null);
                    render();
                }
                showToast('¡Cuenta creada!');
            } catch (e) {
                showToast(e.message || 'Error al registrar', true);
            }
        }

        async function doResetPassword() {
            const identifier = normalizeAuthField(document.getElementById('reset-id').value, 120);
            const email = normalizeAuthField(document.getElementById('reset-email').value, 120).toLowerCase();
            const pass = String(document.getElementById('reset-pass').value || '').normalize('NFKC');
            const pass2 = String(document.getElementById('reset-pass-2').value || '').normalize('NFKC');
            if (!identifier || !email || !pass || !pass2) return showToast('Completa todos los campos', true);
            if (!isValidAuthEmail(email)) return showToast('Ingresa un email válido.', true);
            if (pass !== pass2) return showToast('Las contraseñas no coinciden', true);
            if (!isValidPassword(pass)) {
                return showToast('La nueva contraseña debe tener 8+ caracteres e incluir números', true);
            }
            try {
                const res = await fetch(API + '/floret/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, email, newPassword: pass })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'No se pudo restablecer la contraseña');
                showToast('Contraseña actualizada. Inicia sesión con la nueva clave.');
                showLoginForm();
                const loginInput = document.getElementById('login-user');
                if (loginInput) loginInput.value = identifier;
            } catch (e) {

        async function saveProduct() {
            const btn = document.getElementById('save-btn');
            if (!user) return showToast("Debes iniciar sesión", true);

            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const files = document.getElementById('p-files').files;

            if (!name || !price) return showToast('Nombre y precio son obligatorios', true);
            if (files.length === 0) return showToast('Debes subir al menos una imagen', true);

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo a Cloudinary...';

            const formData = new FormData();
            formData.append('name', name);
            formData.append('description', document.getElementById('p-desc').value);
            formData.append('price', price);
            formData.append('stock', document.getElementById('p-stock').value || 1);
            formData.append('condition', document.getElementById('p-cond').value);
            formData.append('requiresSize', document.getElementById('p-size').checked);
            formData.append('sizes', document.getElementById('p-sizes').value);
            formData.append('measurements', document.getElementById('p-meas').value);
            formData.append('userId', user.id);

            for (let i = 0; i < files.length; i++) {
                formData.append('images', files[i]);
            }

            try {
                const res = await fetch(`${API}/floret/products`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error al guardar');

                showToast('¡Producto publicado exitosamente!');
                closeModal();
                loadProducts();
                if (user.power_level === 1) loadQuota();
            } catch (e) {
                console.error(e);
                showToast(e.message, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Publicar en Servidor';
            }
        }

                checkoutData.name = document.getElementById('ch-name')?.value || checkoutData.name;

                checkoutData.address = document.getElementById('ch-address')?.value || checkoutData.address;
