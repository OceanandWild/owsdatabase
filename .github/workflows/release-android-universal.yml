name: Build Android Universal

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Slug del proyecto"
        required: true
        type: choice
        options:
          - floretshop
          - wildtransfer
          - a-wild-question-game
          - oceanpay
      version_name:
        description: "Version (YYYY.M.D-tHHMM)"
        required: true
        default: "2026.3.20-t1400"
      release_notes:
        description: "Notas del release"
        required: false
        default: "Nueva version disponible"
      promote_to_release:
        description: "Publicar release al terminar"
        required: true
        type: boolean
        default: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Configurar proyecto
        id: config
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ github.event.inputs.project }}"

          case "$PROJECT" in
            floretshop)
              echo "repo=OceanandWild/floretshop" >> "$GITHUB_OUTPUT"
              echo "source_dir=Floret Shop" >> "$GITHUB_OUTPUT"
              echo "package_id=com.oceanandwild.floretshop" >> "$GITHUB_OUTPUT"
              echo "app_name=Floret Shop" >> "$GITHUB_OUTPUT"
              ;;
            wildtransfer)
              echo "repo=OceanandWild/wildtransfer" >> "$GITHUB_OUTPUT"
              echo "source_dir=WildTransfer" >> "$GITHUB_OUTPUT"
              echo "package_id=com.oceanandwild.wildtransfer" >> "$GITHUB_OUTPUT"
              echo "app_name=WildTransfer" >> "$GITHUB_OUTPUT"
              ;;
            a-wild-question-game)
              echo "repo=OceanandWild/a-wild-question-game" >> "$GITHUB_OUTPUT"
              echo "source_dir=A Wild Question Game" >> "$GITHUB_OUTPUT"
              echo "package_id=com.oceanandwild.awqg" >> "$GITHUB_OUTPUT"
              echo "app_name=A Wild Question Game" >> "$GITHUB_OUTPUT"
              ;;
            oceanpay)
              echo "repo=OceanandWild/oceanpay" >> "$GITHUB_OUTPUT"
              echo "source_dir=Ocean Pay" >> "$GITHUB_OUTPUT"
              echo "package_id=com.oceanwildstudios.oceanpay" >> "$GITHUB_OUTPUT"
              echo "app_name=Ocean Pay" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Proyecto desconocido: $PROJECT" >&2
              exit 1
              ;;
          esac

          echo "version_code=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout owsdatabase
        uses: actions/checkout@v4
        with:
          path: owsdatabase

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools (29.0.3 for signer)
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "build-tools;29.0.3" "build-tools;34.0.0" "platforms;android-34"

      - name: Install dependencies
        working-directory: owsdatabase/${{ steps.config.outputs.source_dir }}
        run: npm install

      - name: Preparar proyecto Capacitor
        working-directory: owsdatabase/${{ steps.config.outputs.source_dir }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p www
          if [ -f "index.html" ]; then
            cp index.html www/index.html
          fi

          if [ ! -x "node_modules/.bin/cap" ]; then
            npm install --save-dev @capacitor/core @capacitor/cli @capacitor/android
          fi

          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "${{ steps.config.outputs.app_name }}" "${{ steps.config.outputs.package_id }}" --web-dir=www
          fi

          if [ ! -d "android" ]; then
            npx cap add android
          fi

          npx cap sync android

          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ] && ! grep -q "OWS_KOTLIN_STD_FIX" "$APP_GRADLE"; then
            printf '\n// OWS_KOTLIN_STD_FIX\nconfigurations.all {\n  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n}\n' >> "$APP_GRADLE"
          fi

      - name: Build APK Release
        working-directory: owsdatabase/${{ steps.config.outputs.source_dir }}/android
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK (manual)
        shell: bash
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APP_DIR="owsdatabase/${{ steps.config.outputs.source_dir }}"
          UNSIGNED_APK="$APP_DIR/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="$APP_DIR/android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED_APK="$APP_DIR/android/app/build/outputs/apk/release/app-release-signed.apk"
          KEYSTORE_PATH="$RUNNER_TEMP/ows-signing.jks"
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/34.0.0/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner"

          printf "%s" "$ANDROID_SIGNING_KEY_BASE64" | tr -d "\r\n\t " | base64 -d > "$KEYSTORE_PATH"
          if [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            ANDROID_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          fi

          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled false \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify --verbose --print-certs "$SIGNED_APK" >/dev/null

      - name: Renombrar APK
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ github.event.inputs.project }}"
          VERSION="${{ github.event.inputs.version_name }}"
          SIGNED_APK="owsdatabase/${{ steps.config.outputs.source_dir }}/android/app/build/outputs/apk/release/app-release-signed.apk"
          APK_NAME="${PROJECT}-${VERSION}.apk"
          cp "$SIGNED_APK" "$APK_NAME"
          echo "APK_PATH=$APK_NAME" >> "$GITHUB_ENV"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project }}-apk-${{ github.event.inputs.version_name }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Publicar release en GitHub
        if: ${{ github.event.inputs.promote_to_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          TAG="${{ steps.config.outputs.tag }}"
          REPO="${{ steps.config.outputs.repo }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          APK="${{ env.APK_PATH }}"

          gh release create "$TAG" "$APK" \
            --repo "$REPO" \
            --title "${{ steps.config.outputs.app_name }} ${{ github.event.inputs.version_name }}" \
            --notes "$NOTES" \
            --latest=false

          APK_URL="https://github.com/$REPO/releases/download/$TAG/${{ env.APK_NAME }}"
          echo "APK_URL=$APK_URL" >> "$GITHUB_ENV"

      - name: Registrar release en OWS Store DB
        if: ${{ github.event.inputs.promote_to_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          API="https://owsdatabase.onrender.com"
          TOKEN="${{ secrets.OWS_ADMIN_SECRET }}"
          PROJECT="${{ github.event.inputs.project }}"
          VERSION="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ steps.config.outputs.version_code }}"
          PACKAGE_ID="${{ steps.config.outputs.package_id }}"
          APK_URL="${{ env.APK_URL }}"
          NOTES="${{ github.event.inputs.release_notes }}"

          curl -s -X POST "$API/ows-store/android/releases" \
            -H "Content-Type: application/json" \
            -H "x-ows-admin-token: $TOKEN" \
            -d "{
              \"project_slug\": \"$PROJECT\",
              \"package_id\": \"$PACKAGE_ID\",
              \"version_name\": \"$VERSION\",
              \"version_code\": $VERSION_CODE,
              \"apk_url\": \"$APK_URL\",
              \"release_notes\": \"$NOTES\",
              \"status\": \"published\",
              \"is_mandatory\": false
            }"

          curl -s -X PATCH "$API/ows-store/projects/$PROJECT/version" \
            -H "Content-Type: application/json" \
            -H "x-ows-admin-token: $TOKEN" \
            -d "{\"version\":\"$VERSION\"}"

      - name: Resumen
        run: |
          echo "ANDROID RELEASE COMPLETADO"
          echo "Proyecto: ${{ github.event.inputs.project }}"
          echo "Version:  ${{ github.event.inputs.version_name }}"
          echo "APK:      ${{ env.APK_URL }}"
